<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>muk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Josefin+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="translations.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #0a0c10;
  --bg-primary: #0f1218;
  --bg-surface: #151921;
  --bg-elevated: #1a1f2b;
  --bg-hover: #1e2433;
  --border-subtle: #1e2433;
  --border-medium: #2a3142;
  --text-primary: #e8eaf0;
  --text-secondary: #8b92a5;
  --text-muted: #565e73;
  --accent-amber: #d4a43e;
  --accent-amber-dim: #b8912e;
  --accent-amber-glow: rgba(212, 164, 62, 0.12);
  --accent-green: #3dd68c;
  --accent-green-dim: rgba(61, 214, 140, 0.15);
  --accent-red: #e85c5c;
  --accent-blue: #5c9ee8;
  --accent-blue-dim: rgba(92, 158, 232, 0.1);
  --sidebar-width: 300px;
  --font-body: 'Josefin Sans', -apple-system, sans-serif;
  --font-display: 'Josefin Sans', -apple-system, sans-serif;
  --font-mono: 'DM Mono', 'SF Mono', monospace;
}

[data-theme="light"] {
  --bg-deep: #f5f5f0;
  --bg-primary: #edede8;
  --bg-surface: #f0f0eb;
  --bg-elevated: #e6e6e0;
  --bg-hover: #deded8;
  --border-subtle: #d8d8d0;
  --border-medium: #c8c8c0;
  --text-primary: #1a1a18;
  --text-secondary: #4a4a45;
  --text-muted: #8a8a82;
  --accent-amber: #a67c1a;
  --accent-amber-dim: #8c6814;
  --accent-amber-glow: rgba(166, 124, 26, 0.08);
  --accent-green: #1a8a50;
  --accent-green-dim: rgba(26, 138, 80, 0.1);
  --accent-red: #c43c3c;
  --accent-blue: #2a6cb8;
  --accent-blue-dim: rgba(42, 108, 184, 0.08);
}

html { font-size: 15px; }
body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-body);
  line-height: 1.65;
  overflow: hidden;
  height: 100vh;
}

/* ── LAYOUT ── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--bg-primary);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}

.sidebar-brand {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.08em;
  text-transform: lowercase;
  line-height: 1.2;
}

.sidebar-subtitle {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-top: 6px;
}

/* ── MODULE LIST ── */
.module-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border-medium) transparent;
}

.module-list::-webkit-scrollbar { width: 4px; }
.module-list::-webkit-scrollbar-track { background: transparent; }
.module-list::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 2px; }

.module-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
  border-left: 2px solid transparent;
}

.module-item:hover { background: var(--bg-hover); }

.module-item.active {
  background: var(--accent-amber-glow);
  border-left-color: var(--accent-amber);
}

.module-item.active .module-name { color: var(--text-primary); }
.module-item.active .module-num { color: var(--accent-amber); }

.module-num {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  min-width: 22px;
  font-weight: 500;
}

.module-info { flex: 1; min-width: 0; }

.module-name {
  font-size: 0.82rem;
  color: var(--text-secondary);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.15s ease;
}

.sidebar-section-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding: 16px 20px 6px;
  border-top: 1px solid var(--border-subtle);
  margin-top: 4px;
}

.module-item .source-icon {
  font-size: 0.7rem;
  min-width: 22px;
  text-align: center;
  color: var(--text-muted);
}

.module-item.active .source-icon { color: var(--accent-amber); }

/* ── MAIN CONTENT ── */
.main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── CONTENT AREA ── */
.content-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: var(--border-medium) transparent;
}

.content-scroll::-webkit-scrollbar { width: 6px; }
.content-scroll::-webkit-scrollbar-track { background: transparent; }
.content-scroll::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 3px; }

.content-area {
  max-width: 780px;
  margin: 0 auto;
  padding: 48px 40px 120px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── MARKDOWN CONTENT ── */
.content-area { --content-scale: 1; }
.content-area.font-md { --content-scale: 1.15; }
.content-area.font-lg { --content-scale: 1.32; }

.content-area h1 {
  font-family: var(--font-display);
  font-size: calc(1.8rem * var(--content-scale));
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 8px;
  line-height: 1.3;
  letter-spacing: 0.01em;
}

.content-area h2 {
  font-family: var(--font-display);
  font-size: calc(1.35rem * var(--content-scale));
  font-weight: 600;
  color: var(--text-primary);
  margin: 40px 0 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-subtle);
  letter-spacing: 0.01em;
}

.content-area h3 {
  font-family: var(--font-display);
  font-size: calc(1rem * var(--content-scale));
  font-weight: 600;
  color: var(--accent-amber);
  margin: 28px 0 10px;
  letter-spacing: 0.02em;
}

.content-area p {
  margin-bottom: 14px;
  color: var(--text-secondary);
  font-size: calc(0.92rem * var(--content-scale));
}

.content-area strong { color: var(--text-primary); font-weight: 600; }

.content-area ul, .content-area ol {
  margin: 8px 0 16px 20px;
  color: var(--text-secondary);
  font-size: calc(0.92rem * var(--content-scale));
}

.content-area li {
  margin-bottom: 6px;
  padding-left: 4px;
}

.content-area li::marker { color: var(--text-muted); }

/* ── INLINE GRAPHICS ── */
.graphic {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 6px;
  padding: 24px 20px 16px;
  margin: 20px 0 24px;
  overflow-x: auto;
}
.graphic svg { display: block; margin: 0 auto; max-width: 100%; height: auto; }
.graphic-caption {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-muted);
  text-align: center;
  margin-top: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.content-area table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0 20px;
  font-size: calc(0.82rem * var(--content-scale));
}

.content-area thead th {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border-medium);
  font-weight: 500;
}

.content-area tbody td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-subtle);
  color: var(--text-secondary);
}

.content-area tbody tr:hover { background: var(--accent-amber-glow); }

.content-area code {
  font-family: var(--font-mono);
  font-size: calc(0.82rem * var(--content-scale));
  background: var(--bg-elevated);
  padding: 2px 6px;
  border-radius: 3px;
  color: var(--accent-amber);
}

.content-area pre {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 6px;
  padding: 18px 20px;
  margin: 14px 0 20px;
  overflow-x: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-medium) transparent;
}

.content-area pre code {
  background: none;
  padding: 0;
  color: var(--text-secondary);
  font-size: calc(0.8rem * var(--content-scale));
  line-height: 1.7;
}

.content-area a {
  color: var(--text-secondary);
  text-decoration: none;
  pointer-events: none;
  cursor: text;
  border-bottom: none;
}

.content-area a.source-link {
  color: var(--accent-amber);
  pointer-events: auto;
  cursor: pointer;
  border-bottom: 1px solid rgba(212, 164, 62, 0.3);
  transition: border-color 0.15s;
}

.content-area a.source-link:hover {
  border-bottom-color: var(--accent-amber);
}

.content-area blockquote {
  border-left: 3px solid var(--accent-amber);
  padding: 12px 20px;
  margin: 16px 0;
  background: var(--accent-amber-glow);
  border-radius: 0 6px 6px 0;
}

.content-area blockquote p { color: var(--text-secondary); margin-bottom: 0; }

/* ── MOBILE ── */
@media (max-width: 900px) {
  :root { --sidebar-width: 260px; }
  .content-area { padding: 32px 24px 100px; }
}

@media (max-width: 640px) {
  .sidebar {
    position: fixed;
    left: -100%;
    top: 0;
    z-index: 100;
    width: 85vw;
    max-width: 320px;
    height: 100vh;
    transition: left 0.25s ease;
    box-shadow: 8px 0 32px rgba(0,0,0,0.15);
  }
  .sidebar.open { left: 0; }
  .mobile-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 99;
  }
  .mobile-overlay.show { display: block; }
  .mobile-toggle {
    display: flex !important;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: 5px;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 1.1rem;
  }
  .content-area { padding: 60px 16px 80px; }
}

.mobile-toggle {
  display: none;
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 50;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: 5px;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 1.1rem;
}
.mobile-toggle:hover { color: var(--accent-amber); border-color: var(--border-medium); }

/* Desktop: show toggle only when sidebar is hidden */
@media (min-width: 641px) {
  .app.sidebar-hidden .sidebar { display: none; }
  .app.sidebar-hidden .mobile-toggle { display: flex; }
}

/* ── SCROLLBAR GUTTER ── */
.content-scroll { scrollbar-gutter: stable; }

/* ── MODULE PREV/NEXT NAV ── */
.module-nav {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  margin-top: 56px;
  padding-top: 24px;
  border-top: 1px solid var(--border-subtle);
}
.module-nav-btn {
  flex: 1 1 0;
  max-width: 280px;
  padding: 12px 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 5px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  text-decoration: none;
  display: block;
}
.module-nav-btn:hover { border-color: var(--accent-amber); background: var(--bg-elevated); }
.module-nav-btn.next { text-align: right; margin-left: auto; }
.module-nav-btn.prev { margin-right: auto; }
.module-nav-label {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 4px;
}
.module-nav-title {
  font-family: var(--font-display);
  font-size: 0.95rem;
  color: var(--text-primary);
  font-weight: 500;
  line-height: 1.3;
}
@media (max-width: 640px) {
  .module-nav { gap: 8px; margin-top: 40px; }
  .module-nav-btn { padding: 10px 12px; }
  .module-nav-title { font-size: 0.82rem; }
}

/* ── THEME TOGGLE ── */
.theme-toggle {
  background: none;
  border: 1px solid var(--border-subtle);
  border-radius: 5px;
  cursor: pointer;
  color: var(--text-muted);
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  transition: color 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.theme-toggle:hover { color: var(--accent-amber); border-color: var(--border-medium); }
.theme-toggle .icon-light { display: none; }
[data-theme="light"] .theme-toggle .icon-dark { display: none; }
[data-theme="light"] .theme-toggle .icon-light { display: inline; }

/* ── GLOSSARY TOOLTIPS ── */
.glossary {
  border-bottom: 1px dotted var(--accent-amber);
  cursor: help;
  position: relative;
  color: inherit;
}
.glossary:hover::after, .glossary:focus::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-deep);
  border: 1px solid var(--border-medium);
  color: var(--text-primary);
  padding: 10px 14px;
  border-radius: 5px;
  font-size: 0.78rem;
  font-weight: 400;
  white-space: normal;
  width: max-content;
  max-width: 320px;
  z-index: 1000;
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  font-family: var(--font-body);
  line-height: 1.5;
  pointer-events: none;
  text-align: left;
}
.glossary:hover::before, .glossary:focus::before {
  content: '';
  position: absolute;
  bottom: calc(100% + 2px);
  left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: var(--border-medium);
  z-index: 1001;
  pointer-events: none;
}
@media (max-width: 640px) {
  .glossary:hover::after, .glossary:focus::after {
    max-width: 240px;
    left: 0;
    transform: none;
  }
  .glossary:hover::before, .glossary:focus::before {
    left: 12px;
    transform: none;
  }
}

/* ── DASHBOARD ── */
.dashboard {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  max-width: 960px;
  margin: 0 auto;
  padding: 32px 24px 120px;
  animation: fadeIn 0.3s ease;
}

.dashboard h1 {
  grid-column: 1 / -1;
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--text-primary);
  margin: 0 0 4px;
  letter-spacing: 0.01em;
}

.dashboard .dash-subtitle {
  grid-column: 1 / -1;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

.dash-panel {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 6px;
  padding: 16px 18px;
}

.dash-panel-title {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-subtle);
}

.dash-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.dash-input-group label {
  display: block;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}

.dash-input-group label span {
  color: var(--text-muted);
  opacity: 0.6;
  margin-left: 4px;
}

.dash-input-group input {
  width: 100%;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: 4px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.82rem;
  padding: 6px 10px;
  outline: none;
  transition: border-color 0.15s;
}

.dash-input-group input:focus {
  border-color: var(--accent-amber);
}

.dash-input-group input::placeholder {
  color: var(--text-muted);
  opacity: 0.4;
}

.dash-spread-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid var(--border-subtle);
  gap: 8px;
}

.dash-spread-row:last-child { border-bottom: none; }

.dash-spread-label {
  font-size: 0.8rem;
  color: var(--text-secondary);
  flex: 1;
  min-width: 0;
}

.dash-spread-value {
  font-family: var(--font-mono);
  font-size: 0.82rem;
  color: var(--accent-amber);
  min-width: 90px;
  text-align: right;
}

.dash-indicator {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.58rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 2px 7px;
  border-radius: 3px;
  min-width: 58px;
  text-align: center;
}

.dash-indicator.bearish { background: rgba(232,92,92,0.15); color: var(--accent-red); }
.dash-indicator.neutral { background: var(--bg-elevated); color: var(--text-muted); }
.dash-indicator.bullish { background: var(--accent-green-dim); color: var(--accent-green); }

.dash-inv-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border-subtle);
}

.dash-inv-row:last-child { border-bottom: none; }

.dash-inv-row label {
  font-size: 0.78rem;
  color: var(--text-secondary);
  min-width: 110px;
  flex-shrink: 0;
}

.dash-inv-row input {
  width: 80px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: 4px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  padding: 4px 8px;
  outline: none;
  text-align: right;
}

.dash-inv-row input:focus { border-color: var(--accent-amber); }
.dash-inv-row input::placeholder { color: var(--text-muted); opacity: 0.4; }

.dash-inv-row .dash-unit {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text-muted);
  min-width: 40px;
}

.dash-event-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border-subtle);
}

.dash-event-row:last-child { border-bottom: none; }

.dash-event-day {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--accent-amber);
  min-width: 55px;
  text-transform: uppercase;
}

.dash-event-desc {
  font-size: 0.8rem;
  color: var(--text-secondary);
}

.dash-checklist label {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 0;
  font-size: 0.8rem;
  color: var(--text-secondary);
  cursor: pointer;
}

.dash-checklist label:hover { color: var(--text-primary); }

.dash-checklist input[type="checkbox"] {
  appearance: none;
  width: 16px;
  height: 16px;
  border: 1px solid var(--border-medium);
  border-radius: 3px;
  background: var(--bg-elevated);
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
}

.dash-checklist input[type="checkbox"]:checked {
  background: var(--accent-amber);
  border-color: var(--accent-amber);
}

.dash-checklist input[type="checkbox"]:checked::after {
  content: '';
  position: absolute;
  left: 4px;
  top: 1px;
  width: 5px;
  height: 9px;
  border: solid var(--bg-deep);
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

.dash-checklist input[type="checkbox"]:checked + span {

## The Energy Value Chain

Every energy commodity moves through a value chain. Each step creates a market, and price dislocations between steps create trading opportunities.

**Exploration**: Geologists identify potential reserves. Cost: $5M-100M+ per exploration well. Success rate: 10-30%. Lead time to first production: 3-10 years. This is why supply cannot respond quickly to price signals.

**Production**: Extracting oil, gas, or coal from the ground. Global crude production: ~103 million bbl/d. US crude: ~13.6 million bbl/d. US dry gas: ~105 Bcf/d. Production data is reported monthly by the EIA with a 2-month lag — traders estimate real-time production from weekly proxy data.

**Transportation**: Pipelines ($2-5/bbl for crude), tankers ($0.50-3.00/bbl depending on route and vessel), rail ($5-10/bbl), and truck ($10-15/bbl). Transportation constraints create locational price differences (basis). Every basis spread is ultimately a transportation economics question.

**Refining/Processing**: Crude → gasoline, diesel, jet fuel, fuel oil. Gas → dry gas + NGLs (ethane, propane, butane). The refiner's margin (crack spread) is the spread between input and output prices. US refining capacity: ~18 million bbl/d across ~130 refineries.

**Distribution**: Wholesale and retail. Product moves from refineries to terminals to gas stations. The retail gasoline price includes: crude cost + refining margin + transportation + taxes + retail margin. Taxes alone are $0.50-1.00/gallon in most US states.

**Consumption**: Transportation (~60% of oil demand), power generation (~35% of gas demand), industrial (~25% of gas demand), residential/commercial heating. Each end-use sector has different demand drivers and seasonality.

## Market Participants

Understanding who is in the market and what motivates them is essential for understanding price behavior and flow dynamics.

**Producers** — Sell oil/gas. Their natural position is long physical, so they hedge by selling futures/forwards. They are the structural sellers in the futures market.
- Supermajors: ExxonMobil, Shell, Chevron, BP, TotalEnergies. Integrated (E&P + refining + marketing).
- Pure E&P: Pioneer, Devon, Diamondback (US shale). ConocoPhillips.
- National Oil Companies (NOCs): Saudi Aramco (largest global producer), ADNOC (UAE), NIOC (Iran), Rosneft/Gazprom (Russia), Petrobras (Brazil). NOCs control ~55% of global production and ~90% of proven reserves.

**Consumers** — Buy energy. Natural position is short physical, so they hedge by buying futures/forwards.
- Airlines: hedge jet fuel. Southwest was famously profitable in 2008 because of aggressive fuel hedging.
- Utilities: buy natural gas for power generation. Largest single category of US gas demand.
- Industrials: petrochemical plants (naphtha, ethane), fertilizer (ammonia from gas), steel (coal/coke).
- Trucking/shipping: diesel consumers.

**Physical Traders** — The middlemen who move actual cargoes. They profit from logistics, arbitrage, and optionality.
- Top 5 by revenue: Vitol (~$500B), Trafigura, Glencore, Gunvor, Mercuria. These firms move millions of barrels per day.
- Physical traders have deep knowledge of pipeline capacity, tanker routes, storage availability, and quality differentials. This operational knowledge is their edge.
- Many physical traders also have significant financial trading operations.

**Banks** — Commodity trading desks at Goldman Sachs, Morgan Stanley, JPMorgan, Citigroup, Macquarie. Provide hedging products to corporate clients, make markets in OTC swaps, and run proprietary trading books. Bank participation has declined since Dodd-Frank and Volcker Rule restrictions.

**Hedge Funds** — Speculative capital. Multiple strategy types:
- Macro/directional: Andurand Capital, Westbeck. Take large bets on price direction.
- Relative value/spread: Citadel, Millennium pods. Focus on mispricings between related products.
- Systematic/CTA: AQR, Winton, Man Group. Algorithmic trend-following or mean-reversion.
- Multi-strat pods: Citadel, Millennium, Balyasny, Point72. Portfolio managers run independent "pods" with allocated risk budgets.

**Market Makers** — Provide liquidity on exchanges by continuously quoting bids and offers. Profit from the bid-ask spread. Include proprietary trading firms (DRW, Optiver, Flow Traders) and bank market-making desks.

**Exchanges** — Where futures and options trade.
- CME Group/NYMEX: WTI, Henry Hub, RBOB, ULSD. Dominant for US energy.
- ICE (Intercontinental Exchange): Brent, Gasoil, TTF gas. Dominant for international energy.
- DME (Dubai Mercantile Exchange): Oman crude. Asian crude benchmark.

## Physical vs. Financial Markets

**Physical market**: Actual molecules changing hands. Governed by logistics — how do you move 2 million barrels from the Gulf of Mexico to Rotterdam? Physical traders deal with vessel chartering, pipeline scheduling, storage tank allocation, quality testing, letters of credit, and delivery logistics. Physical prices are assessed daily by price reporting agencies (Platts, Argus).

**Financial market**: Futures, options, and swaps that reference a physical commodity but settle in cash or via financial delivery. Daily trading volume in WTI futures alone is ~1 billion barrels — roughly 10x actual global production. The financial market is far larger than the physical market.

**The connection**: Futures prices converge to physical prices at expiry through the delivery mechanism. If futures are overpriced relative to physical, arbitrageurs sell futures and buy physical for delivery. If futures are underpriced, they buy futures and sell physical. This arbitrage keeps the two markets linked — but short-term divergences happen and create opportunities.

**Where the edge is**: Most hedge fund trading is financial, but understanding the physical market is what gives you informational edge. Knowing that a pipeline is at capacity, that a specific refinery is in turnaround, or that a tanker fleet is fully booked tells you something about supply/demand that pure financial analysis misses. The best energy traders combine physical knowledge with financial execution.

## Benchmarks

A benchmark is a standardized reference price that the entire market prices off of. Every physical cargo in the world is quoted as a benchmark plus or minus a quality/location differential.

| Commodity | Benchmark | Exchange | Contract | Size | Key Characteristics |
|-----------|-----------|----------|----------|------|-------------------|
| US Crude | WTI | NYMEX | CL | 1,000 bbl | Physical delivery at Cushing, OK. Light sweet (39.6° API, 0.24% S). US domestic benchmark. |
| International Crude | Brent | ICE | B | 1,000 bbl | Cash settled. Based on BFOET basket. ~80% of global crude priced off Brent. |
| US Natural Gas | Henry Hub | NYMEX | NG | 10,000 MMBtu | Physical delivery in Erath, LA. Most liquid gas contract globally. |
| EU Natural Gas | TTF | ICE | TTF | 1 lot = 1 MWh thermal | Dutch Title Transfer Facility. European gas benchmark. Replaced UK NBP. |

| Diesel / Heating Oil | ULSD | NYMEX | HO | 42,000 gal | Physical delivery at NY Harbor. Ultra-low sulfur diesel (<15 ppm). |
| Asian Crude | Dubai/Oman | DME | OQD | 1,000 bbl | Physical delivery. Benchmark for Middle East crude to Asia. |

**Why benchmarks matter for trading**: Every spread you trade references benchmarks. The WTI-Brent spread, crack spreads (WTI vs. RBOB/ULSD), the spark spread (power vs. Henry Hub), and basis differentials (Henry Hub vs. regional hubs) are all defined relative to these benchmarks. Knowing the delivery mechanics, contract specs, and quirks of each benchmark is foundational.

## What Drives Energy Prices

### Supply Drivers

**OPEC+ decisions**: The single most impactful scheduled event for oil prices. OPEC+ controls ~40% of global production and sets quotas. Saudi Arabia has ~2-3 million bbl/d of spare capacity — more than any other country. A surprise cut of 1 million bbl/d can move crude $5-10/bbl. Meetings occur every 1-2 months. Always know the date, consensus expectation, and key internal disagreements.

**US shale production**: The US is the world's largest crude producer (~13.6 million bbl/d) and largest gas producer (~105 Bcf/d). Shale responds to price with a ~6 month lag (price rises → rig count rises → production rises). The Baker Hughes rig count (published every Friday) is the leading indicator. The EIA Drilling Productivity Report (monthly) estimates production by basin.

**Geopolitics and sanctions**: Wars, sanctions, regime changes, and chokepoint disruptions. The Strait of Hormuz (~21 million bbl/d), Suez Canal (~7-9 million bbl/d), and Strait of Malacca (~16 million bbl/d) are the critical chokepoints. Sanctions on Iran and Russia constrain supply but enforcement varies — watch shadow fleet tanker activity.

**Infrastructure**: Pipeline capacity, refinery outages, and LNG terminal operations. When pipeline capacity in the Permian is maxed, Midland crude trades at a steep discount to Cushing (basis blows out). When a Gulf Coast refinery has an unplanned outage, product cracks widen.

**Weather**: Hurricanes in the Gulf of Mexico disrupt offshore production and Gulf Coast refining. The Atlantic hurricane season (June-November) is a key risk period for crude and products.

### Demand Drivers

**Economic growth**: GDP growth drives energy demand, especially diesel (trucking, construction) and jet fuel (business travel). PMI (Purchasing Managers Index) is a leading indicator of diesel demand. Track monthly.

**Weather**: The dominant short-term driver of natural gas and power. Cold winters increase heating demand (gas, heating oil). Hot summers increase cooling demand (power → gas for generation). Heating Degree Days (HDD) and Cooling Degree Days (CDD) quantify weather impact. Traders watch GFS (American) and ECMWF (European) weather model runs obsessively.

**Seasonality**: Gasoline demand peaks during driving season (Memorial Day through Labor Day). Heating oil demand peaks in winter (Northeast US). Jet fuel demand peaks in summer (travel season). Natural gas has the strongest seasonality — injection season (April-October) vs. withdrawal season (November-March).

**Policy**: EV adoption reduces long-term gasoline demand. Carbon regulations affect coal-to-gas switching economics. Renewable energy mandates reshape power market dynamics. IMO 2020 shipping fuel regulations shifted fuel oil markets permanently.

### Inventory — The Key Variable

Inventory (storage) is the buffer between supply and demand. It is the most important short-term variable for energy prices.

- **When production > consumption**: Inventory builds. Spot prices weaken (contango). Market is "oversupplied."
- **When consumption > production**: Inventory draws. Spot prices strengthen (backwardation). Market is "tight."
- **What moves prices**: Not the absolute inventory level, but the **deviation from expectations and seasonal norms**. A 2 million barrel crude draw is bullish if the market expected a 1 million barrel build. A 2 million barrel draw is neutral if the market expected a 2 million barrel draw.
- **5-year average**: The most common benchmark for inventory levels. Inventories above the 5-year average = bearish. Below = bullish. The distance from the 5-year average (the surplus or deficit) is the key metric.

| IEA Oil Market Report | IEA | ~15th of month | Global S/D balance, OECD inventories, demand estimates | The most respected independent S/D analysis. Often contradicts OPEC's numbers. |

**How traders use these reports**: Before each report, consensus estimates circulate (via Bloomberg, Reuters, or analyst surveys). The market prices in the consensus ahead of the release. The price move after the report is driven by the **surprise** — actual minus consensus. Over time, build a model that tracks surprises and corresponding price moves. This is one of the first quantitative exercises you should do.

## The Crude Quality Spectrum

Crude oil is not one product — it is a spectrum of hydrocarbons that vary dramatically in quality. Two properties define a crude grade and determine its value:

**API Gravity** measures density. Higher API = lighter = more valuable (yields more gasoline and diesel, less heavy residual). The scale is inverse to specific gravity: water = 10° API.

- Light crude: > 31° API
- Medium crude: 22-31° API
- Heavy crude: < 22° API

**Sulfur Content** determines processing cost. Sweet crude (< 0.5% sulfur) can be refined with simpler equipment. Sour crude (> 0.5% sulfur) requires hydrotreating/hydrocracking units that cost hundreds of millions to build — this is why sour crude trades at a discount.

| Brent (BFOET basket) | 38.3° | 0.37% | Light sweet | North Sea | International benchmark, ~80% of global crude priced off Brent |
| LLS (Louisiana Light Sweet) | 36.1° | 0.39% | Light sweet | US Gulf Coast | Gulf Coast physical benchmark |
| Mars | 28.9° | 1.93% | Medium sour | US Gulf of Mexico | Key GOM offshore grade, US sour benchmark |
| Arab Light | 33.0° | 1.77% | Medium sour | Saudi Arabia | Largest single exported grade in the world |
| Arab Heavy | 27.4° | 2.83% | Medium sour | Saudi Arabia | Feeds complex refineries in Asia |

| Bonny Light | 35.4° | 0.14% | Light sweet | Nigeria | Premium sweet crude, popular in European refineries |

**Why this matters for trading**: Quality differentials are tradeable spreads. A simple refinery (atmospheric distillation only) needs light sweet crude. A complex refinery (with cokers, hydrocrackers, FCC units) can process cheap heavy sour crude and crack it into high-value products at wider margins. When light-heavy differentials widen (light sweet premium increases), complex refiners profit more. When differentials narrow, simple refiners benefit. Tracking these differentials tells you about refinery economics and marginal barrel economics globally.

| | WTI | Brent |

### The WTI-Brent Spread

The WTI-Brent spread (WTI minus Brent) is one of the most important spreads in energy. Its historical range is roughly **-$27 to +$5**, though it typically trades between **-$5 and +$3**.

**What drives it**:

- **US production growth**: When shale production surges and midcontinent logistics cannot move oil to export terminals fast enough, WTI weakens vs. Brent (spread goes more negative). This drove the blow-out to -$27 in 2011.
- **US export capacity**: After the 2015 repeal of the US crude export ban, US Gulf Coast export infrastructure expanded dramatically. Better export capacity tightens the spread (WTI strengthens toward Brent) because excess US crude can be sold internationally.
- **Cushing inventory levels**: High Cushing inventories weaken WTI specifically (since Cushing is the delivery point). When Cushing approaches operational capacity, the front spread collapses.
- **Global supply disruptions**: Middle East tensions, Libya outages, North Sea maintenance — these tighten global supply and push Brent higher relative to WTI.
- **Atlantic Basin arbitrage**: When the WTI-Brent spread exceeds the shipping cost from the US Gulf to Europe (~$1.50-3.00/bbl), US crude exports flow to Europe, which narrows the spread. When it contracts below shipping cost, flows slow and the spread widens again. This creates a natural floor/ceiling.

**How to trade it**: Long WTI / short Brent (or vice versa). On CME, you can trade this directly as the WTI-Brent spread futures contract. Most crude oil relative-value traders have an opinion on this spread.

## OPEC and OPEC+

### Members

**OPEC (13 members)**: Saudi Arabia, Iraq, Iran, UAE, Kuwait, Venezuela, Libya, Nigeria, Algeria, Angola, Congo, Gabon, Equatorial Guinea. Combined production: ~27 million bbl/d. Saudi Arabia alone: ~9-10 million bbl/d (can surge to ~12 million).

**OPEC+ allies (10 key non-OPEC partners)**: Russia (~9-10 million bbl/d), Kazakhstan, Mexico, Oman, Azerbaijan, Malaysia, Bahrain, Brunei, Sudan, South Sudan. Russia is by far the most important ally.

**OPEC+ combined**: ~40+ million bbl/d, roughly 40% of global crude production. This is enough market share to meaningfully influence prices.

### How Quotas Work

OPEC+ sets production quotas at ministerial meetings (every 1-2 months, or ad hoc). Each member gets a ceiling. The total OPEC+ cut is allocated across members based on baseline production levels.

**Compliance dynamics**: Compliance is uneven. Saudi Arabia and UAE tend to over-comply (cut more than their quota). Iraq, Nigeria, and Russia tend to under-comply (cheat and produce above quotas by 200-500K bbl/d). The market watches actual production data (secondary sources like Platts, Argus, IEA) vs. stated quotas to assess real compliance. Weak compliance undermines cuts and is bearish.

**Saudi spare capacity**: Saudi Arabia holds ~2-3 million bbl/d of spare capacity — production it could bring online within 90 days but chooses not to. This is the world's strategic supply buffer. No other country has spare capacity on this scale. When spare capacity is high, the market has a cushion against disruptions. When spare capacity drops below ~1.5 million bbl/d, the risk premium in crude rises sharply.

### How to Read OPEC Meetings

**The price move = decision minus expectation**. If the market expects a 500K bbl/d cut and OPEC delivers 1 million, crude rallies. If the market expects a cut and OPEC does nothing, crude sells off. Always know the consensus expectation before the meeting.

Watch for:
- Rumors 24-48 hours before the meeting (delegations leak)
- Saudi-Russia alignment (when they agree, the decision is usually decisive)
- Internal fractures (UAE and Iraq have pushed back on quotas repeatedly)
- Timing of the next meeting (short intervals = monitoring mode, signals instability)
- The communique language: "monitor the market" = no action; "adjust output" = cut or hike

### Historical OPEC Price Wars

**1985-1986**: Saudi Arabia abandoned its swing producer role and opened the taps to punish quota cheaters. Crude crashed from $30+ to under $10. Devastated non-OPEC producers (North Sea, US stripper wells). Saudi revenue collapsed but they regained market share. Lesson: Saudi Arabia has the lowest production costs and can outlast anyone in a price war.

**2014-2016**: Saudi Arabia refused to cut production in the face of the US shale revolution, seeking to test shale breakevens and drive out high-cost producers. Brent dropped from $115 to $28 (Jan 2016). Shale producers went bankrupt in waves, but survivors cut costs and got more efficient — breakevens fell from $70-90 to $40-55. Led to the OPEC+ alliance with Russia in late 2016 as Saudi realized it could not kill shale.

**March 2020**: Saudi Arabia and Russia failed to agree on COVID-era production cuts. Saudi launched a price war, slashing official selling prices by $6-8/bbl and pledging to increase output to 12+ million bbl/d. Coming on top of COVID demand destruction (~20 million bbl/d lost in weeks), this pushed WTI to -$37.63 on April 20, 2020. OPEC+ agreed to the largest cut in history (9.7 million bbl/d) days later.

**Key lesson**: OPEC price wars destroy value for everyone but eventually end. The recovery trades (going long crude, long calendar spreads into backwardation) after capitulation have historically been some of the best risk/reward trades in energy.

## US Shale — The Marginal Barrel

### Basin-by-Basin Production

| Basin | Location | Production (bbl/d) | Primary Product | Key Feature |
|-------|----------|-------------------|-----------------|-------------|
| Permian | West Texas / SE New Mexico | ~6.0 million | Light sweet crude + associated gas | Largest and most prolific. Multiple stacked pay zones (Spraberry, Wolfcamp, Bone Spring). Still growing. |
| Eagle Ford | South Texas | ~1.1 million | Light sweet crude + condensate + gas | More mature. High initial rates but steep declines. Significant condensate production. |
| Bakken | North Dakota / Montana | ~1.1 million | Light sweet crude | Logistics-constrained (limited pipeline capacity, rail to Gulf Coast). Harsh winters affect operations. |
| DJ-Niobrara | Colorado | ~450K | Light crude + gas | Regulatory risk (Colorado state rules). Suburban encroachment limits drilling locations. |
| Anadarko | Oklahoma | ~400K | Oil + gas + NGLs | SCOOP/STACK plays. More gas-weighted. |

**Total US crude production**: ~13.6 million bbl/d (world's largest producer). Of this, shale/tight oil is ~9+ million bbl/d.

### Shale Economics

**Breakeven costs**: The WTI price needed for a new shale well to earn its cost of capital.
- Permian Tier 1 acreage: $35-45/bbl
- Permian Tier 2/3 acreage: $50-60/bbl
- Eagle Ford core: $45-50/bbl
- Bakken core: $50-55/bbl

These breakevens have fallen dramatically since 2014 (from $70-90 to current levels) due to efficiency gains: longer laterals (now 10,000-15,000+ feet vs. 5,000 in 2014), more proppant per stage, faster drilling times, and pad drilling (multiple wells from one location).

**Typical well economics**: Cost $5-8M to drill and complete. Initial production (IP) rate of 500-1,500 bbl/d. Estimated ultimate recovery (EUR) of 500K-1.5M barrels over the well's life.

**Decline rates**: Shale wells decline extremely fast compared to conventional wells.
- Year 1 decline: 60-75% (a well producing 1,000 bbl/d at peak might produce 250-400 bbl/d after 12 months)
- Year 2 decline: 30-40%
- Year 3+: 10-15% per year

This means shale production requires **constant drilling** just to stay flat. If rigs stop drilling for 6 months, production falls significantly. This is fundamentally different from conventional production (which declines 3-8% per year).

**DUC wells (Drilled but Uncompleted)**: Wells that have been drilled but not yet hydraulically fractured. These are essentially latent supply that can be brought online in 2-4 weeks (vs. 4-6 months for a new well from scratch). The DUC count is a leading indicator of near-term supply. When DUCs are drawn down aggressively, it signals operators are accelerating production without adding rigs. When DUCs build, operators are banking wells for later.

**Rig count-to-production lag**: ~6 months total (price signal to rig count ~2-3 months, rig count to production ~3-6 months). When rig counts rise, production growth follows with a lag. When rig counts fall (e.g., price crash), production declines follow. The Baker Hughes rig count (Friday 1:00 ET) is the leading indicator. The EIA Drilling Productivity Report (monthly) converts rig count into production estimates by basin.

**How shale acts as a price ceiling**: When WTI rises above $70-80, shale drilling accelerates, production grows, and within 6-12 months the additional supply caps prices. This is why crude has struggled to sustain prices above $90-100 for long periods in the shale era — shale supply is the structural price ceiling. Conversely, shale breakevens provide a soft price floor (~$40-50) because production declines fast once prices fall below breakeven.

## Cushing, Oklahoma — The Delivery Point

Cushing is the physical delivery point for WTI futures. It is the most important storage hub in the world for understanding WTI pricing mechanics.

**Key statistics**:
- Total shell capacity: ~90 million barrels
- Operational minimum (tank bottoms, working minimum): ~20-22 million barrels — below this level, oil physically cannot be pumped out
- Comfortable operating range: 25-60 million barrels
- Pipeline connectivity: Major hub connecting pipelines from the Permian, Midcontinent, Canada (Keystone/Marketlink), and running south to the Gulf Coast (Seaway, MarketLink reverse)

**How Cushing levels drive WTI**:
- **Rising inventories** (builds): Increase storage competition, push WTI front month lower relative to deferred months (contango widens)
- **Falling inventories** (draws): Reduce available supply for delivery, tighten the front month, can push WTI into backwardation
- **Near tank tops** (>75 million): Severe contango, potential for front-month collapse as deliverable supply exceeds demand
- **Near operational minimum** (<25 million): Sharp backwardation as barrels become scarce for delivery

### The April 2020 Event: WTI Goes Negative

On April 20, 2020, the May WTI futures contract settled at **-$37.63/bbl** — the first time a major crude benchmark traded below zero. Here is exactly what happened:

1. **COVID demand destruction**: Global oil demand fell by ~20-25 million bbl/d in April 2020 (from ~100 to ~75-80 million). The demand decline was unprecedented in speed and scale.
2. **OPEC+ price war**: Saudi Arabia and Russia flooded the market with extra barrels in March-April before agreeing to cut.
3. **Cushing filled up**: Inventories surged to ~65 million barrels approaching the ~76 million barrel operational limit. Physical traders could not find storage anywhere.
4. **Futures expiry mechanics**: The May WTI contract expired on April 21. Holders of long positions at expiry must take physical delivery at Cushing. If you cannot take delivery (no storage), you must sell at any price.
5. **Cascading liquidation**: Financial longs (ETFs like USO, retail traders, specs) who had no intention or ability to take physical delivery were forced to sell at any price on the last trading day. Buyers disappeared. The price went negative — meaning sellers were paying buyers to take oil off their hands.

**Trading lessons from April 2020**:
- Understand the delivery mechanism of any futures contract you trade
- Financial investors in physically-delivered contracts face real delivery risk at expiry
- Cushing capacity is a hard physical constraint on WTI pricing
- The spread between the first and second month (the prompt spread) is the key signal — when it blows out in contango, it signals physical market stress
- After the event, CME modified its systems to handle negative prices, and USO restructured its roll strategy

## Global Crude Flows and Chokepoints

### Major Trade Routes

| Route | Volume (million bbl/d) | Key Feature |
|-------|----------------------|-------------|
| Middle East to Asia | ~21 | Largest single crude flow. Saudi, Iraq, UAE, Kuwait to China, India, Japan, South Korea. Via Strait of Hormuz. |
| Russia to China / India | ~5-6 | Grown dramatically post-2022 sanctions. Pipe (ESPO) + seaborne (Urals via shadow fleet tankers). |
| West Africa to Asia / Europe | ~3-4 | Nigerian, Angolan crude. Competes with US shale for European market share. |
| US Gulf to Europe / Asia | ~4-5 | Post-export ban repeal (2015). Primarily light sweet crude (WTI Midland, Eagle Ford). Growing every year. |
| Canada to US | ~4 | Overwhelmingly heavy sour (WCS). Via Keystone, Enbridge mainline, now Trans Mountain to Pacific Coast. |
| North Sea to Europe | ~2-3 | Declining production. Brent basket underpins the benchmark but volumes are shrinking. |
| Latin America to US Gulf | ~1-2 | Heavy crudes (Maya, Castilla) feed Gulf Coast complex refiners. Declining as Venezuela output fell from 3M to <1M bbl/d. |

### Critical Chokepoints

| Chokepoint | Throughput (million bbl/d) | Risk | Historical Disruptions |
|------------|--------------------------|------|----------------------|
| Strait of Hormuz | ~21 | Iran could theoretically mine or blockade. 21% of global supply at risk. | Tanker wars (1980s), Iran tensions (2019 tanker attacks). Brent could spike $20-50 on closure. |
| Strait of Malacca | ~16 | Piracy risk, single route for China/Japan/Korea oil imports. | Rare disruption, but a military conflict scenario would be catastrophic for Asian energy security. |
| Suez Canal / SUMED Pipeline | ~7-9 | Disruption adds 10-15 days to Europe-Asia routes via Cape of Good Hope. | 2021 Ever Given blockage, 2023-24 Houthi attacks forced mass rerouting. |
| Bab el-Mandeb | ~7-8 | Gateway to Suez from the south. Yemen (Houthi) conflict zone. | 2023-24 Houthi missile/drone attacks on commercial tankers. |
| Turkish Straits (Bosphorus) | ~3-4 | Kazakh and some Russian crude exits Black Sea. Physical width constraint, ice risk. | Regular congestion, insurance cost spikes. |
| Panama Canal | ~1 | Smaller crude volumes, but LPG and LNG transits are significant. | 2023-24 drought reduced daily transits from 36 to ~22. |

**Trading implications**: Chokepoint disruptions create immediate risk premiums. Hormuz risk adds $2-10/bbl to Brent depending on severity. Suez rerouting widens the WTI-Brent spread (increases tanker demand and shipping costs) and pushes up freight rates. Track tanker rates (Baltic Dirty Tanker Index) and shipping route data for early signals.

The forward curve is the set of all futures prices from the front month out to the longest-dated contract (7+ years for crude). Its shape tells you about the physical market balance.

### Contango (Front Month < Deferred Months)

Signals oversupply or weak near-term demand. Storage is available and economically attractive.

**The storage trade (cash-and-carry arbitrage)**:

1. Buy physical crude at spot price
2. Store it (in tanks at Cushing, on tankers as floating storage, or in pipelines)
3. Simultaneously sell a deferred futures contract to lock in the higher future price
4. Deliver the physical crude against the futures contract at expiry

**Profit = Forward spread - Cost of carry**

Cost of carry = storage cost + financing cost + insurance + quality/loss allowance

**Example**:
- Spot WTI: $70.00/bbl
- 6-month forward WTI: $73.50/bbl
- Spread: $3.50/bbl
- Storage cost (Cushing): $0.40/bbl/month x 6 = $2.40
- Financing (5% annual on $70): $1.75
- Insurance/other: $0.15
- Total cost of carry: $4.30/bbl
- Profit: $3.50 - $4.30 = **-$0.80 (trade does NOT work — contango is too narrow)**

Now change the 6-month forward to $75.50:
- Spread: $5.50/bbl
- Same cost of carry: $4.30/bbl
- Profit: $5.50 - $4.30 = **+$1.20/bbl (trade works — lock in risk-free profit)**

When contango exceeds cost of carry, storage fills up. When it narrows below, storage draws down. This arbitrage mechanism links the physical and paper markets.

**Supercontango**: Rare extreme contango (>$10-15 spread to 6-month). Occurred in April 2020 ($15-20 1-month contango) and 2008-09. During supercontango, traders charter VLCCs (Very Large Crude Carriers, 2M barrels each) as floating storage at $30,000-80,000/day because land storage is full. If you can source storage during supercontango, the returns are exceptional.

### Backwardation (Front Month > Deferred Months)

Signals tight supply or strong near-term demand. Inventory is being drawn. The market is paying a premium for immediate delivery.

**Convenience yield**: The implicit benefit of holding physical inventory — the ability to meet immediate demand, avoid stockouts, or capitalize on spot market tightness. In backwardation, the convenience yield exceeds the cost of storage. Refineries pay a premium for prompt barrels because they need to keep running.

**Backwardation characteristics**:
- Discourages storage (why store when the front is worth more than deferred?)
- Incentivizes inventory drawdowns
- Producers benefit (they sell at higher prompt prices)
- Typically bullish for sentiment — associated with tight markets and higher absolute prices
- No theoretical limit — during crises, front month can be $10-15+ above deferred months

**Reading the curve**: Steep contango ($2+/month) = very oversupplied. Mild contango ($0.30-0.80/month) = balanced-to-loose. Flat = equilibrium. Mild backwardation ($0.50-1.50) = tight. Steep backwardation ($2+) = crisis or supply disruption.

**Key insight**: The shape of the curve often matters more for trading than the absolute price level. A market at $80 in backwardation is fundamentally tighter than a market at $80 in contango. Calendar spreads trade the curve shape directly.

## Key Crude Oil Trades

### 1. Flat Price (Directional)
Long or short outright WTI or Brent. Highest risk, highest reward. Margin requirement: ~$5,000-8,000 per contract ($1/bbl move = $1,000 P&L on 1 contract of 1,000 barrels). Daily ranges of $1-3/bbl are normal, $5+ on event days (OPEC decisions, geopolitical events, inventory surprises). Driven by macro, OPEC, geopolitics.

### 2. Calendar Spreads
Long one expiry, short another. These trade the curve shape (contango/backwardation), not the absolute price. Lower margin (~$1-2K vs ~$6K outright).

- **Prompt spread** (Month 1 vs. Month 2): Most liquid, most volatile calendar spread. Directly reflects near-term supply/demand tightness. Typical range: -$2.00 to +$2.00. Driven by Cushing levels, weekly EIA data, refinery demand.
- **Seasonal spread** (e.g., Dec vs. Jun): Captures summer driving season demand vs. winter. Longer-dated, smoother, mean-reverting.
- **Butterfly** (e.g., long Mar, short 2x Jun, long Sep): Trades the curvature of the forward curve. Lower risk, mean-reverting. Used to isolate kinks in the curve.

**Example**: You believe Cushing draws will tighten the front end over the next month. Buy the prompt spread (long Month 1, short Month 2). If backwardation increases from $0.50 to $1.50, you make $1.00/bbl = $1,000 per spread.

### 3. WTI-Brent Spread
Trade directly via CME's WTI-Brent spread futures contract or by going long CL / short B (or vice versa). A core macro crude oil trade reflecting US vs. international relative value. Driven by Cushing inventory, US export capacity utilization, and global disruptions.

### 4. Grade Differentials
Relative value between crude grades:
- **WTI vs. Mars (sour differential)**: Widens when light sweet is in high demand or sour supply is plentiful. Narrows when complex refinery demand is strong and they bid up sour crude.
- **LLS vs. WTI**: Gulf Coast vs. Cushing. Reflects pipeline logistics and export economics. When Gulf Coast exports are strong, LLS trades at a premium.
- **WCS vs. WTI**: Heavy-light differential. Driven by Canadian pipeline capacity (TMX, Keystone, Enbridge), diluent costs, and Gulf Coast complex refinery demand. Range: -$12 to -$25 normally, blew out to -$45 in late 2018 during pipeline constraints.
- **Brent vs. Dubai (EFS)**: Light sweet vs. medium sour international. Reflects Asian refinery demand for sour crude and Middle East supply.

### 5. Time Spreads with Physical Context
Experienced traders combine calendar spreads with physical knowledge. If you know a pipeline expansion will add 500K bbl/d of Permian takeaway capacity in Q3, you can trade the Midland-Cushing basis tightening and the impact on WTI calendar spreads. If you know a major refinery turnaround will reduce crude demand in March, you can position for the front spread to weaken. This is where physical understanding creates financial edge.

## Storage — The Most Important Variable

US working gas storage capacity: ~4.7 Tcf across ~400 underground storage facilities. Three facility types:
- **Depleted reservoirs** (~80% of capacity): Former gas fields. Large volume but slow injection/withdrawal rates.
- **Salt caverns** (~5% of capacity, mainly Gulf Coast): Fast cycling. Can inject/withdraw quickly. Used for short-term balancing.
- **Aquifers** (~15%, mainly Midwest): Moderate speed. Geological limitations on withdrawal rates.

### Key Storage Levels

| Level | Range | Market Implication |
|-------|-------|-------------------|
| Comfortable end-of-injection (Oct 31) | 3.5-3.8 Tcf | Well-supplied for winter. Prices stable. |
| Low end-of-injection | < 3.2 Tcf | Tight winter ahead. Prices rise, winter spreads widen. |
| High end-of-injection | > 3.9 Tcf | Oversupplied. Prices fall, contango deepens. Risk of hitting capacity (~4.7 Tcf). |
| Comfortable end-of-withdrawal (Mar 31) | 1.5-2.0 Tcf | Normal. Market relaxed about supply. |
| Danger zone end-of-withdrawal | < 1.2 Tcf | Acute shortage risk. Prices can spike dramatically. |

Published every Thursday at 10:30 ET. Reports the weekly change in US working gas in storage (net injection or withdrawal, in Bcf). Regional breakdown: East, Midwest, Mountain, Pacific, South Central (salt + non-salt).

**How to trade it**: Consensus estimates circulate beforehand (Bloomberg survey, analyst models). **The price move is driven by the surprise** — actual minus consensus.

- A 5-10 Bcf miss from consensus: $0.05-0.15/MMBtu move
- A 15-20 Bcf miss: $0.15-0.30 move
- A 25+ Bcf miss: $0.30+ move, sometimes $0.50+ on extreme surprises

Build your own storage model (tracking degree days, production, LNG feedgas, power burn) to estimate the weekly number independently. When your estimate diverges from consensus, that is a trading signal.

**Storage vs. 5-year average**: THE key metric. Storage 200+ Bcf above the 5-year average = very bearish. Storage 200+ Bcf below = very bullish. The surplus/deficit trajectory (whether you are moving toward or away from the 5-year average) matters as much as the absolute level.

**Storage economics**: When the summer-winter spread (e.g., Oct-Jan) exceeds the cost of injection + storage + withdrawal (typically $0.20-0.40/MMBtu total), it is profitable to inject gas in summer and withdraw in winter. This is the gas equivalent of the crude contango storage trade. The spread effectively prices in the market's view of winter scarcity.

## Weather — The Dominant Short-Term Driver

### Degree Day Definitions

**Heating Degree Days (HDD)**: For each day, HDD = max(0, 65°F - average daily temperature). A day with an average temperature of 30°F contributes 35 HDDs. More HDDs = more furnaces/boilers running = more gas burned for heating. Cumulative weekly HDDs drive storage withdrawals in winter.

**Cooling Degree Days (CDD)**: For each day, CDD = max(0, average daily temperature - 65°F). A day with an average of 90°F contributes 25 CDDs. More CDDs = more air conditioning = more gas-fired power generation.

**Gas-weighted degree days (GWDD)**: Population-weighted to reflect actual demand centers. A cold snap over the densely populated Northeast and Midwest matters far more than the same cold over rural Montana. Major gas demand centers: Northeast corridor (Boston to DC), Great Lakes/Midwest (Chicago, Detroit), Texas (both heating and cooling), and California.

### Weather Models

- **GFS (Global Forecast System)**: American model run by NOAA. Runs 4x daily (00z, 06z, 12z, 18z UTC). Free and publicly available. Provides forecasts out to 16 days. Traders watch every model run for changes.
- **ECMWF (European Centre for Medium-Range Weather Forecasts)**: European model. Generally considered more accurate for 6-10 day forecasts. Runs 2x daily (00z, 12z). Requires paid subscription. The "Euro model" is the gold standard.

**How traders use models**: The market reacts to **model shifts** — when a forecast changes from warm to cold (or vice versa), gas moves immediately. A significant cold shift in the 6-10 day forecast (e.g., going from 5 HDDs above normal to 15 HDDs above normal) can move Henry Hub $0.10-0.30 in hours. Traders compare the latest model run to the previous run and to the competing model.

**Impact timeline**:
- Same-day/next-day: Spot and cash market prices respond to real-time weather
- 1-5 day forecast: Drives prompt month volatility
- 6-14 day forecast: Primary driver of front-month futures. This is where most weather-based trading happens.
- Beyond 14 days: Forecasts lose skill rapidly. Market relies on seasonal norms and analogs (comparing current patterns to historical years).

## Supply

US dry gas production: ~105 Bcf/d — the world's largest. Key supply basins:

| Basin | Production | Type | Key Characteristic |
|-------|-----------|------|-------------------|
| Appalachia (Marcellus/Utica) | ~35 Bcf/d | Dry gas + some NGLs | Largest US gas basin by far. Low-cost, prolific wells. Pipeline-constrained heading eastward and southward. Dominion South basis often negative. |
| Permian (TX/NM) | ~15 Bcf/d | Associated gas | Produced alongside oil. Output tied to oil drilling, not gas price. When oil is $80+, associated gas floods the market regardless of gas price. Key bearish structural factor. |
| Haynesville (LA/TX) | ~14 Bcf/d | Dry gas | Most price-responsive basin — drilling ramps quickly when gas prices rise above $3.00-3.50. Near Gulf Coast LNG terminals, so minimal transportation discount. |
| Eagle Ford (TX) | ~7 Bcf/d | Associated gas + dry gas | Mix of oil and gas wells. Associated gas component tied to oil economics. |
| Other (DJ Basin, Bakken, conventional, Gulf of Mexico) | ~34 Bcf/d | Various | Conventional declining, GOM steady, DJ Basin regulatory risk. |

**Associated gas**: Gas produced as a byproduct of oil drilling (primarily Permian). When oil prices are high, oil drilling increases, and associated gas production rises regardless of gas prices — it is essentially free gas that must go somewhere. This can suppress Henry Hub even when gas demand is strong. The "call on associated gas" is a structural bearish factor for Henry Hub whenever oil prices are high and Permian drilling is active.

**Pipeline constraints**: Production can be stranded if pipeline takeaway capacity is insufficient. Appalachian gas has historically been constrained heading east and south due to regulatory opposition to new pipeline construction. Permian gas competes with oil for limited pipeline space out of West Texas. When constraints bind, local basis collapses (Waha has traded as low as -$10/MMBtu) while destination hubs like Henry Hub hold firm.

## Demand

US natural gas demand by sector (~105 Bcf/d total consumption + exports):

| Sector | Share | Volume | Characteristics |
|--------|-------|--------|----------------|
| Power generation | ~35% | ~37 Bcf/d | Largest and growing. Gas competes with coal and renewables in the dispatch stack. Weather-sensitive (summer cooling load). |
| Residential/commercial | ~25% | ~26 Bcf/d | Heating. Highly seasonal — winter demand is 3-4x summer. Driven by HDDs. |
| Industrial | ~22% | ~23 Bcf/d | Fertilizer (ammonia/urea), petrochemicals (ethylene), glass, cement. Relatively stable but price-sensitive at the margin. |
| LNG exports | ~13% | ~14 Bcf/d | Rapidly growing. The new structural demand source linking US gas to global prices. |
| Mexican pipeline exports | ~5% | ~5 Bcf/d | Steady growth as Mexico builds gas-fired power plants near the US border. |

### Gas-Coal Switching

The most important demand-side mechanism for gas prices. In the power generation sector, gas and coal compete for dispatch.

- **When Henry Hub falls below ~$2.00-2.50/MMBtu**: Gas plants are cheaper to run than most coal plants. Gas displaces coal from the generation stack. Gas demand for power rises.
- **When Henry Hub rises above ~$3.50-4.00/MMBtu**: Coal becomes competitive again. Coal displaces gas. Gas demand for power falls.

This switching dynamic creates a soft floor (~$2.00) and soft ceiling (~$4.00-4.50) for Henry Hub during periods of stable coal prices. It is a natural mean-reverting mechanism. The exact switching price depends on regional coal costs, heat rates of specific plants, and carbon/emissions regulations.

## LNG — The Globalizer

LNG (Liquefied Natural Gas): gas cooled to -260°F (-162°C), reducing its volume 600x for transport by specialized tankers. The liquefaction process is energy-intensive (uses ~10% of the gas as fuel).

### US LNG Export Capacity (~14 Bcf/d)

| Terminal | Location | Capacity (Bcf/d) | Operator | Notes |
|----------|----------|-------------------|---------|-------|
| Sabine Pass | Cameron Parish, LA | ~5.0 | Cheniere | First US LNG export terminal (2016). 6 trains. |
| Corpus Christi | TX | ~2.5 | Cheniere | 3 trains + Stage 3 expansion underway. |
| Cameron | Hackberry, LA | ~2.1 | Sempra | 3 trains. |
| Freeport | Freeport, TX | ~2.1 | Freeport LNG | 3 trains. Was offline Jun 2022 - Mar 2023 after an explosion. |
| Calcasieu Pass | Cameron Parish, LA | ~1.5 | Venture Global | Newer facility. |
| Additional under construction | Various | ~5-8 (by 2027-28) | Various | Golden Pass (ExxonMobil/QatarEnergy), Plaquemines (Venture Global), others. |

### Global Gas Benchmarks

- **JKM (Japan-Korea Marker)**: Asian LNG spot benchmark. Published by Platts. Quoted in $/MMBtu.
- **TTF (Title Transfer Facility)**: European gas benchmark. Traded on ICE. Dutch virtual hub. Replaced UK NBP as the European reference. Quoted in EUR/MWh (convert to $/MMBtu: divide by ~3.412 and adjust for EUR/USD).

### LNG Export Margin Calculation

\`\`\`
LNG Export Margin = Destination Price - Henry Hub - Shipping Cost - Liquefaction Fee

Example (US to Asia):
JKM:                $14.00/MMBtu
Henry Hub:          -$3.50/MMBtu
Shipping:           -$1.25/MMBtu (Gulf Coast to NE Asia, ~25 days)
Liquefaction:       -$2.50/MMBtu (tolling fee, varies by contract)
----------------------------------------------
Net margin:          $6.75/MMBtu  → PROFITABLE, terminal runs at full capacity

Example (margin collapse):
JKM:                $8.00/MMBtu
Henry Hub:          -$3.50/MMBtu
Shipping:           -$1.25/MMBtu
Liquefaction:       -$2.50/MMBtu
----------------------------------------------
Net margin:          $0.75/MMBtu  → Marginal. Some cargoes may be cancelled.
\`\`\`

**Impact on Henry Hub**: LNG exports have structurally lifted Henry Hub by ~$0.50-1.00/MMBtu compared to the pre-LNG era (pre-2016). When a major terminal goes offline — as when Freeport LNG was shut down June 2022 to March 2023 after an explosion — ~2 Bcf/d of demand disappears overnight, and Henry Hub drops. Conversely, when a new terminal comes online, it adds structural demand. Track daily LNG feedgas data (available from Marine Traffic/Kpler/Bloomberg) as a real-time demand signal.

## Basis Trading

Basis = Price at Location - Henry Hub. Basis differentials are driven by pipeline infrastructure, local supply/demand balances, and seasonal patterns. Basis trading is where deep physical knowledge creates the most trading edge.

### Key Regional Hubs

| Hub | Typical Basis to HH | Extreme Range | Primary Driver |
|-----|---------------------|---------------|----------------|
| Waha (Permian, TX) | -$0.50 to -$2.00 | Down to -$10+ (has gone negative outright) | Massive associated gas production from Permian oil drilling vs. limited pipeline takeaway to Gulf Coast. New pipelines narrow basis; pipeline delays widen it. |
| Algonquin Citygate (New England) | +$0.50 to +$2.00 | Up to +$20-50 in winter cold snaps | Very limited pipeline capacity into New England. No new pipelines built in decades (local opposition). Cold snaps cause acute gas shortage — LNG imports by tanker to Everett, MA fill the gap at extreme cost. |
| SoCal Citygate (California) | +$1.00 to +$3.00 | Up to +$10-20 during heat waves or pipeline outages | Limited pipeline into Southern California. Aliso Canyon storage facility restricted since 2015 leak. Heat waves spike power demand (AC) and gas burns. |
| Chicago Citygate | +$0.10 to +$0.50 | +$1-3 in polar vortex cold | Midwest heating demand center. Well-connected to multiple supply sources (Appalachia, Gulf Coast, Rockies), so normally tight basis. Blows out only in extreme cold. |
| Dominion South (Appalachia) | -$0.30 to -$1.00 | Down to -$2+ | Marcellus production exceeds pipeline takeaway heading east and south. New pipeline capacity narrows this basis; production growth widens it. |
| AECO (Alberta, Canada) | -$0.50 to -$2.00 | Down to -$5+ | Canadian gas supply exceeds regional demand and export pipeline capacity. LNG Canada terminal (under construction) could structurally shift this. |

**Basis is physical**: If you know the pipeline map — where the bottlenecks are, what new capacity is coming online (and when), what happens to flows in extreme cold or heat — you can form high-conviction basis views that the broader market may not have. This is where fundamental research on infrastructure creates the most edge.

## Key Natural Gas Trades

### 1. Flat Price (Directional)
Long/short Henry Hub. Driven by weather, storage trajectory, production trends, LNG demand. At $3.50/MMBtu, one NG contract = $35,000 notional. A $0.10 move = $1,000 per contract. Gas can move $0.20-0.50 in a single session on weather shifts or storage surprises.

### 2. Calendar Spreads
The heart of gas trading. The seasonal cycle creates predictable spread structures:
- **Summer/Winter** (e.g., Oct/Jan or Apr strip vs. Jan strip): The core seasonal trade. Buy the spread when you expect a tight winter; sell when you expect comfortable storage.
- **Winter/Winter** (e.g., Jan 2027 vs. Jan 2028): Trades the year-over-year fundamental outlook. Driven by production growth, LNG capacity additions, power demand trends.
- **March/April (Widowmaker)**: See below. The most dangerous and volatile calendar spread in energy.

### 3. Basis Spreads
Henry Hub vs. regional pricing points. Requires deep physical and infrastructure knowledge. Examples: Waha-Henry Hub (Permian takeaway), Algonquin-Henry Hub (New England winter), SoCal-Henry Hub (California heat).

### 4. Weather Trades
Positioning ahead of cold/warm model shifts. Traders monitor every GFS and ECMWF run and trade the prompt month (and sometimes the prompt week in physical markets) based on forecast changes. Short duration, high frequency. Requires real-time weather data subscriptions and fast execution.

### 5. Storage Report Trades
Building a proprietary storage estimate and positioning for the EIA Thursday release when your number diverges from consensus. If you estimate a 90 Bcf injection and consensus is 80 Bcf, you sell ahead of the report expecting a bearish surprise. Requires a storage model incorporating: degree days, production, LNG feedgas, power burn (from generation data), industrial demand, and imports/exports.

## The Widowmaker — March/April Spread

The March/April natural gas spread is called the "widowmaker" because it has destroyed traders and entire funds.

**Why it is so volatile**: March is the last month of winter (withdrawal season). April is the first month of summer (injection season). The price difference between them reflects the market's assessment of how tight supply will be at the very end of winter.

- **Mild winter**: Storage ends winter at comfortable levels (1.7-2.0+ Tcf). March premium to April is small ($0.20-0.50). Smooth transition.
- **Cold winter**: Storage draws deeply. March gas is scarce and expensive relative to April. Spread can blow out to $2-5+.
- **Catastrophic winter**: If storage approaches danger zone (<1.2 Tcf), the March premium can reach $5-10+ as the market prices in the possibility of physical shortage.

**The Amaranth Advisors disaster (2006)**: Amaranth, a multi-strategy hedge fund, accumulated a massive position in winter/summer natural gas calendar spreads — effectively betting that winter gas would be expensive relative to summer. Their position was enormous — reportedly ~100,000 contracts, representing a significant portion of open interest. When the market moved against them (a warm early fall reduced winter risk premium), they could not exit their position without moving the market further against themselves. They lost **$6 billion** in approximately two weeks — one of the largest trading losses in history. The fund collapsed entirely.

**Key lessons from Amaranth**: Position size relative to market liquidity is everything. Even a correct directional view is worthless if your position is too large to exit. The March/April spread can move $1-2+ in a single day during volatile periods. Respect the name.
