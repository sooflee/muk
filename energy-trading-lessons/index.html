## Crack Spreads — The Core Trade

A **crack spread** is the difference between the value of refined products and the cost of crude oil input. It represents the refiner's gross margin (before operating costs, which run ~$4-8/bbl for a US Gulf Coast refinery).

The name comes from the catalytic cracking process that "cracks" heavy hydrocarbon molecules into lighter ones.

### Crack Spread Structures with Worked Examples

Assume: **RBOB = $2.50/gal ($105.00/bbl), ULSD = $2.80/gal ($117.60/bbl), WTI = $78.00/bbl**

**1:1 Gasoline Crack** (simplest):
- Buy 1 barrel crude, sell 1 barrel gasoline
- = RBOB in $/bbl - WTI = $105.00 - $78.00 = **$27.00/bbl**
- On exchange: Buy 1 CL, Sell 1 RB

**1:1 Diesel Crack**:
- Buy 1 barrel crude, sell 1 barrel diesel
- = ULSD in $/bbl - WTI = $117.60 - $78.00 = **$39.60/bbl**
- On exchange: Buy 1 CL, Sell 1 HO

**3:2:1 Crack Spread** (industry standard — approximates typical refinery output):
- Buy 3 barrels crude, sell 2 barrels gasoline + 1 barrel diesel
- = (2 x RBOB $/bbl + 1 x ULSD $/bbl) / 3 - WTI $/bbl
- = (2 x $105.00 + 1 x $117.60) / 3 - $78.00
- = ($210.00 + $117.60) / 3 - $78.00
- = $327.60 / 3 - $78.00
- = $109.20 - $78.00 = **$31.20/bbl**
- On exchange: Buy 3 CL, Sell 2 RB + 1 HO

**2:1:1 Crack Spread**:
- Buy 2 barrels crude, sell 1 barrel gasoline + 1 barrel diesel
- = (1 x RBOB $/bbl + 1 x ULSD $/bbl) / 2 - WTI $/bbl
- = ($105.00 + $117.60) / 2 - $78.00
- = $111.30 - $78.00 = **$33.30/bbl**
- On exchange: Buy 2 CL, Sell 1 RB + 1 HO

**5:3:2 Crack Spread** (more realistic refinery yield):
- Buy 5 barrels crude, sell 3 barrels gasoline + 2 barrels diesel
- = (3 x RBOB $/bbl + 2 x ULSD $/bbl) / 5 - WTI $/bbl
- = (3 x $105.00 + 2 x $117.60) / 5 - $78.00
- = ($315.00 + $235.20) / 5 - $78.00
- = $550.20 / 5 - $78.00
- = $110.04 - $78.00 = **$32.04/bbl**
- On exchange: Buy 5 CL, Sell 3 RB + 2 HO

### Historical Crack Spread Ranges (3:2:1)

| Environment | 3:2:1 Crack ($/bbl) | Context |
|-------------|---------------------|---------|
| Depressed | < $10 | Demand destruction, oversupplied products. Refineries consider shutdowns at this level. |
| Normal/low | $10-15 | Below-average but sustainable for efficient refineries. |
| Normal | $15-25 | Typical operating range. Refineries profitable. |
| Strong | $25-35 | Tight product markets. High refinery margins. Incentivizes max utilization. |
| Extreme | > $35 | Supply crisis. Usually driven by low inventories + high demand + refinery outages. |
| 2022 peak | > $60 | Historic. Post-COVID demand recovery + Russian refining loss + low global inventories + COVID-era refinery closures. |

### What Drives Crack Spreads

- **Refinery utilization**: Lower utilization = less product supply = wider cracks. EIA reports weekly utilization data.
- **Turnaround season**: Spring (Feb-Apr) and fall (Sept-Nov) maintenance reduces throughput, supports cracks.
- **Product inventories vs. seasonal norms**: Low gasoline or distillate stocks relative to the 5-year average = wider cracks.
- **Seasonal demand**: Driving season (May-Sep) supports gasoline cracks. Winter supports diesel/heating oil cracks.
- **Crude quality mix**: If heavy/sour crude supply tightens, complex refineries lose their cheap feedstock advantage. If light sweet supply surges (Permian), simple refinery economics improve.
- **Refinery closures/additions**: COVID era saw ~1.5M bbl/d of global refinery closures. This structural capacity reduction supported cracks well into 2022-23.

## Gasoline Seasonality

### RVP (Reid Vapor Pressure) Specifications

Gasoline volatility is regulated to reduce evaporative emissions (smog). The allowable volatility changes seasonally:

- **Summer blend** (June 1 - September 15): RVP must not exceed **7.8 psi** (some reformulated gasoline areas require 7.0 psi). Lower volatility = harder to produce. Requires more alkylate, reformate, and removal of cheap high-RVP components like butane.
- **Winter blend** (September 16 - May 31): RVP allowed up to **15.0 psi**. Higher volatility = easier and cheaper to produce. Butane (cheap, ~4.5 psi contribution) can be blended in, effectively stretching the gasoline pool.

### The Seasonal Transition

- **February-March**: Refineries begin switching from winter to summer-grade production. Turnarounds are scheduled to coincide with the blend transition.
- **April-May**: Distribution system transitions to summer blend. Gas stations must sell summer-grade by June 1 in most markets.
- **During transition**: Supply of compliant summer gasoline can tighten before driving season begins. This is the period of highest seasonal crack premiums.

### The Seasonal Crack Pattern

Gasoline cracks typically begin rising in February as:
1. Refineries enter spring turnaround (reducing product output)
2. The market anticipates the costly summer-grade blend switch
3. Pre-season inventory building begins for driving season

Cracks peak in **April-May** (tightest supply of summer-grade gasoline ahead of driving season). They begin declining after the July 4th holiday as:
1. Refineries are at maximum summer utilization (90-95%)
2. Driving demand plateaus
3. The September RVP transition approaches (back to easier winter blend)

**Driving season**: Memorial Day (late May) through Labor Day (early September). US gasoline demand rises from ~8.5 million bbl/d in winter to ~9.5+ million bbl/d at the summer peak.

## Diesel / Heating Oil (ULSD)

### Specifications

**Ultra-Low Sulfur Diesel (ULSD)**: Maximum 15 ppm sulfur content (regulation since 2006, down from 500 ppm). This specification was a major regulatory shift that required billions in refinery hydrotreater upgrades.

**Cetane number**: Measures ignition quality (analogous to octane for gasoline, but higher = better for diesel). Minimum standard: 40. Premium diesel: 45-50. Higher cetane = smoother combustion, less noise, better cold-start performance.

### Demand Drivers

- **Trucking and freight**: ~75% of US diesel demand. On-highway diesel consumption is directly tied to economic activity. Key indicators: trucking tonnage index, rail carloads, PMI manufacturing data. When the economy is strong, diesel demand is strong — and vice versa.
- **Construction and mining**: Heavy equipment (excavators, dump trucks, generators) runs on diesel. Tied to infrastructure spending and housing starts.
- **Agriculture**: Tractors, combines, irrigation pumps. Seasonal peaks during planting (spring) and harvest (fall).
- **Heating oil**: Chemically identical to diesel but taxed differently. Concentrated in the **Northeast US (PADD 1)** — about 5.5 million households still use heating oil. Demand is sharply seasonal (November-March) and weather-dependent. Cold snaps in the Northeast can cause rapid inventory draws and price spikes.

### The 2022 Diesel Crisis

In 2022, US distillate inventories fell to their lowest levels since 1951. Contributing factors:
- Post-COVID demand recovery as the economy reopened
- Loss of ~1 million bbl/d of Russian diesel exports to Europe (sanctions)
- COVID-era refinery closures (~1.5M bbl/d global capacity permanently shut)
- Strong trucking demand during the post-COVID logistics boom

ULSD crack spread exceeded **$70/bbl** — unprecedented. Diesel was the tightest product globally and the primary driver of overall refining margins.

## Jet Fuel

**Jet A-1**: The standard commercial aviation fuel. Key specifications:
- Freeze point: below -47°C (must remain liquid at altitude)
- Flash point: above 38°C (safety — resistance to ignition)
- Energy density: ~18,400 BTU/pound (high energy per unit weight is critical for aircraft)
- Sulfur: maximum 0.3%

**Not exchange-tradeable** with liquid futures. Airlines hedge jet fuel exposure using crude oil futures, heating oil/ULSD futures (closest proxy), or OTC jet fuel swaps. The jet-ULSD basis risk is typically small ($0.05-0.15/gal) but can widen during supply dislocations.

**Demand tracks air travel**: COVID reduced jet fuel demand by ~70% in 2020. Recovery has been gradual, reaching ~95% of pre-COVID levels by 2024-25. Business travel recovery has been slower than leisure. Long-term, sustainable aviation fuel (SAF) mandates will reshape jet fuel markets.

## Fuel Oil and IMO 2020

### The IMO 2020 Regulation

The International Maritime Organization (IMO) mandated that ships use fuel with sulfur content **not exceeding 0.5%** (down from the prior 3.5% limit), effective January 1, 2020. Ships must comply by one of three methods:

1. **Burn VLSFO (Very Low Sulfur Fuel Oil)**: 0.5% sulfur. Most common choice. More expensive than HSFO.
2. **Burn MGO (Marine Gasoil)**: Distillate-quality fuel. Most expensive option but always compliant.
3. **Install scrubbers**: Exhaust gas cleaning systems that strip sulfur from stack emissions. Allows continued use of cheap HSFO (3.5% sulfur). Capex of $2-10M per vessel depending on size. Payback depends on the HSFO-VLSFO spread.

### The HSFO-VLSFO Spread as a Trade

HSFO demand dropped ~30% after IMO 2020. VLSFO and MGO demand surged. The **HSFO-VLSFO spread** widened dramatically in late 2019 (peaking at ~$300/MT) and has remained structurally wider since (typically $100-200/MT).

**Scrubber economics**: Ships with scrubbers can still burn cheap HSFO and pocket the HSFO-VLSFO differential. If the spread is $150/MT and a VLCC burns ~60 MT/day, the daily savings = $9,000/day. Over a year, that is ~$3.3 million — making the $5-8M scrubber investment a 2-year payback. When the spread narrows, scrubber economics weaken and fewer newbuilds install scrubbers.

## Refinery Operations

### US Refinery Capacity by PADD

US total: ~18 million bbl/d across ~130 operating refineries.

| PADD | Region | Refining Capacity | Key Characteristics |
|------|--------|-------------------|-------------------|
| PADD 1 | East Coast | ~1.3M bbl/d | Consumer region. Imports products from PADD 3 (Gulf Coast) and Europe. Philadelphia Energy Solutions closure (2019, ~335K bbl/d) was a major loss. |
| PADD 2 | Midwest | ~4.0M bbl/d | Processes Canadian heavy crude (WCS) via Enbridge/Keystone pipelines. Also runs Bakken light. Serves regional demand. Key refineries: Whiting (BP, ~440K bbl/d), Wood River (Phillips 66). |
| PADD 3 | Gulf Coast | ~10.0M bbl/d | **The US refining hub — ~55% of national capacity.** Largest, most complex refineries in the world. Processes everything from WTI light to imported heavy sour. Exports products globally. Hurricane-exposed. |
| PADD 4 | Rockies | ~0.7M bbl/d | Small, isolated market. Few refineries, local supply/demand. Higher product prices due to limited competition. |
| PADD 5 | West Coast | ~2.0M bbl/d | Isolated from other PADDs (no product pipelines connecting to PADD 3). California has strict fuel specifications (CARB gasoline). Higher product prices. Relies on Alaskan crude, California production, and waterborne imports. |

### Utilization and Turnarounds

**Normal utilization**: 90-95% during peak demand periods. US refineries are highly utilized compared to global average (~82%) because they are large, efficient, and well-positioned for export.

**Turnaround season**: Planned maintenance shutdowns ("turnarounds") cluster in two periods:
- **Spring (February-April)**: After winter heating oil demand subsides, before summer driving season. Refineries overhaul FCC units, cokers, and hydrotreaters.
- **Fall (September-November)**: After summer driving season, before winter heating demand. Switch crude slates and reconfigure for maximum distillate production.

Turnarounds typically take 3-6 weeks per unit and are planned 12-18 months in advance. Analyst firms (Turner Mason, IIR Energy) track and publish turnaround schedules. During heavy turnaround periods, national utilization drops to 85-88%, reducing product supply and supporting crack spreads.

**Unplanned outages**: Fires, equipment failures, and hurricanes. Gulf Coast refineries (PADD 3) are highly exposed to Atlantic hurricanes (June-November). An unplanned outage at a large refinery (200K+ bbl/d) can spike local product cracks by $2-5/bbl within hours. The 2017 Hurricane Harvey shut ~4.5M bbl/d of Gulf Coast refining for weeks — gasoline cracks spiked over $30/bbl.

## The Gasoline-Diesel Spread

The **gas-diesel spread** = RBOB ($/bbl) minus ULSD ($/bbl). This relative value spread reflects the tug-of-war between gasoline and diesel demand:

- **Diesel outperforms (spread narrows or goes negative)** when: economic activity is strong (trucking, construction drive diesel demand), winter heating demand surges (Northeast heating oil), distillate inventories are abnormally low, or diesel export demand is strong.
- **Gasoline outperforms (spread widens/goes more positive)** when: driving season demand is strong, gasoline inventories are tight (especially ahead of summer-grade RVP transition), economic slowdown reduces diesel demand while consumer driving holds up.

**Seasonal pattern**: Gasoline tends to outperform in spring/early summer (driving season anticipation + RVP transition). Diesel tends to outperform in fall/winter (heating oil demand + harvest diesel + holiday freight).

The spread also tracks macro cycles — making it a useful relative value trade and economic indicator. A sharp narrowing of the spread (diesel surging) often signals strong economic activity.

## PADDs — Petroleum Administration for Defense Districts

The US is divided into 5 PADDs for energy data reporting and analysis. Understanding PADDs is essential because product pricing, inventory levels, and trade flows are all reported by PADD.

- **PADD 1 (East Coast)**: Largest consumer region. 120M+ people. Depends on product imports from PADD 3 (via Colonial Pipeline, the largest product pipeline in the US at ~2.5M bbl/d) and overseas. Any disruption to Colonial Pipeline (like the 2021 Colonial Pipeline ransomware attack) causes immediate gasoline shortages on the East Coast.
- **PADD 2 (Midwest)**: Both refining and consumption center. Receives Canadian crude, produces and consumes products regionally. Chicago and Group 3 (Tulsa) are key pricing hubs.
- **PADD 3 (Gulf Coast)**: The engine room of US refining. ~10M bbl/d capacity. Exports refined products to PADD 1, Latin America, Europe, and West Africa. Sets the marginal product price for the Atlantic Basin. Hurricane risk is the primary supply concern.
- **PADD 4 (Rockies)**: Small, isolated. Higher local product prices. Supplied by a handful of small refineries processing local crude.
- **PADD 5 (West Coast)**: Isolated from the rest of the US (mountains, no product pipelines to PADD 3). California's CARB gasoline specification is the strictest in the US, making West Coast gasoline the most expensive. Refinery outages cause immediate local price spikes because there is no easy way to bring in replacement product.

## Key Refined Products Trades

- **Crack spreads**: 3:2:1, 2:1:1, 5:3:2, or individual 1:1 product cracks. The bread and butter of products trading. Express a view on refinery margins and product tightness.
- **Gasoline calendar spreads**: Especially around the RVP transition (February-April). The March/April RBOB spread captures the winter-to-summer blend shift and turnaround impact. Summer months trade at a premium to winter.
- **Gas-diesel spread**: RBOB vs. ULSD relative value. Captures macro cycles and seasonal demand shifts.
- **RBOB vs. Brent crack**: International refining margin perspective. European gasoline pricing vs. international crude.
- **Fuel oil spreads**: HSFO vs. VLSFO (the IMO 2020 scrubber economics trade). HSFO vs. crude (the "fuel oil discount" or coking margin).
- **Product calendar spreads**: ULSD summer/winter (heating oil seasonality), RBOB driving season vs. shoulder months.

## Reading

- <a class="source-link" data-source="oil101">Oil 101</a> — chapters 9-11. Covers the refining process, refinery economics, and product specifications. Essential for understanding crack spread dynamics.
- <a class="source-link" data-source="eia">EIA Today in Energy</a> — the Q1 2026 petroleum price review covers product price dynamics alongside crude.
- <a class="source-link" data-source="primer">A Primer on Energy Trading</a> — Section 4 (Spread Trading), specifically crack spreads. Covers the 3:2:1 structure and what drives refining margins.

Also recommended: <a class="source-link" data-source="otherlinks">EIA Refinery Yield data</a> (free dataset of US refinery product yields by PADD) and the <a class="source-link" data-source="otherlinks">EIA Weekly Petroleum Status Report</a> — the most market-moving energy report in the world, released every Wednesday at 10:30 ET.`

## Why Power Is Different

Electricity is fundamentally unlike other energy commodities:
- **Non-storable** (mostly): must be produced and consumed simultaneously. The grid must balance supply and demand in real-time, every second.
- **Locational pricing**: price varies by physical node on the grid. Two points 50 miles apart can have dramatically different prices if a transmission line between them is congested.
- **Extreme price range**: from -$100/MWh (renewables oversupply, paying generators to curtail) to $5,000-$9,000/MWh (scarcity pricing during heat waves or cold snaps). No other major commodity has this range.
- **Real-time clearing**: Day-ahead markets clear hourly. Real-time markets clear every 5 minutes. Prices are recalculated continuously.

## US Power Market Structure

The US grid is managed by Independent System Operators (ISOs) / Regional Transmission Organizations (RTOs):

| ISO/RTO | Region | Capacity (~GW) | Market Type | Key Feature |
|---------|--------|----------------|-------------|-------------|
| PJM | Mid-Atlantic + Ohio Valley + Midwest | ~185 GW | Capacity market | Largest US power market. 65M+ customers. |
| ERCOT | Texas | ~90 GW | Energy-only | Isolated grid (not connected to US East/West). Extreme volatility. |
| CAISO | California | ~80 GW | Capacity (RA) | Highest renewables penetration. Duck curve. Negative pricing. |
| MISO | Upper Midwest + South | ~175 GW | Capacity market | Large wind penetration. Complex zonal pricing. |
| SPP | Central US (KS, OK, NE) | ~90 GW | Energy-only | Wind-heavy (~40% of energy from wind). |
| NYISO | New York | ~40 GW | Capacity market | Congested. NYC (Zone J) trades at large premium. |
| ISO-NE | New England | ~30 GW | Capacity market | Gas-dependent. Winter gas supply constraints = power price spikes. |

## Locational Marginal Pricing (LMP)

\`\`\`
LMP = Energy Component + Congestion Component + Loss Component
\`\`\`

**Energy component**: The marginal cost of the most expensive generator needed to serve demand at that moment. If a gas plant with a $45/MWh marginal cost is the last unit dispatched, all generators receive $45/MWh — even nuclear plants with $5/MWh marginal cost. This is why gas prices drive power prices.

**Congestion component**: When a transmission line is at capacity, generators on the constrained side must run even if they are more expensive than generators on the other side. The price difference across the constraint is the congestion component. Example: PJM West Hub at $40/MWh while NYISO Zone J (NYC) is at $80/MWh — the $40 difference is congestion into NYC.

**Loss component**: Energy is lost during transmission (~2-5% depending on distance). Nodes farther from generation pay slightly more.

## The Generation Stack (Merit Order)

Generators are dispatched cheapest first:

| Fuel | Marginal Cost | Role | Notes |
|------|--------------|------|-------|
| Wind / Solar | ~$0/MWh | Must-run (when available) | Zero fuel cost. Output depends on weather. |
| Nuclear | ~$5-10/MWh | Baseload, must-run | Very low marginal cost but inflexible (can't ramp quickly). |
| Coal | ~$20-40/MWh | Baseload/intermediate | Declining share. Competes with gas on fuel cost. |
| Gas CCGT | ~$25-50/MWh | Intermediate/baseload | Most efficient gas plants. **Usually the marginal unit that sets price.** |
| Gas Peaker (CT) | ~$50-100+/MWh | Peak only | High heat rate (10-14 MMBtu/MWh). Runs only during demand peaks. |
| Oil | ~$100-200+/MWh | Emergency | Rarely dispatched. Only during extreme scarcity. |

The marginal unit sets the price for ALL generators. When demand is low, efficient CCGTs set the price. When demand is high (summer afternoon, winter cold snap), expensive peakers set the price — and all generators earn the peaker price.

## Spark Spread

\`\`\`
Spark Spread = Power Price ($/MWh) - Gas Price ($/MMBtu) x Heat Rate (MMBtu/MWh)

Example:
PJM Western Hub: $55/MWh
Henry Hub gas: $3.50/MMBtu
Heat rate: 7.0 MMBtu/MWh (efficient CCGT)

Spark = $55 - ($3.50 x 7.0) = $55 - $24.50 = $30.50/MWh profit per MWh generated
\`\`\`

**Implied heat rate** = Power price / Gas price = $55 / $3.50 = 15.7 MMBtu/MWh. This means even a plant with a 15.7 heat rate is marginally profitable — indicating the market is very tight (inefficient peakers are needed).

**Spark spread variants**:
- **7x24**: All hours. Blended average.
- **On-peak**: Weekdays 7am-11pm (hours ending 8-23). Higher value — demand is highest during business hours.
- **Off-peak**: Nights + weekends. Lower prices, narrower sparks.
- **Clean spark spread**: Subtracts carbon cost per MWh (relevant in markets with carbon pricing like RGGI, EU ETS).

**The duck curve shape**:
- **Morning** (6-10am): demand ramps up as people wake up. Solar is just starting. Moderate prices.
- **Midday** (10am-3pm): solar generation peaks (~15-20 GW in CAISO). Supply floods the grid. Prices collapse — often to $0 or negative.
- **Evening** (4-8pm): solar drops off rapidly as sun sets. Demand stays high or rises (cooking, heating/cooling). Net demand ramps up steeply ("the neck of the duck"). Gas peakers must fire up. Prices spike.
- **Night** (8pm-6am): moderate demand, gas + nuclear serve baseload.

**Trading implications**: The duck curve creates opportunities in peak/off-peak spreads, battery storage economics (charge at negative midday, discharge at evening peak), and ramping services. Gas peakers become more valuable for the evening ramp, even as their total hours of operation decline.

**Negative prices**: When renewables output exceeds demand, prices go negative. Generators are effectively paying the grid to take their power (because shutting down and restarting is more expensive). This happens regularly in CAISO, SPP, and increasingly in ERCOT and MISO.

## Capacity Markets vs. Energy-Only

**Capacity markets** (PJM, NYISO, ISO-NE): Generators are paid to be *available*, even if they don't produce. Capacity prices are set through auctions (e.g., PJM Base Residual Auction). This ensures sufficient generation capacity for peak demand. Typical capacity payment: $30-150/MW-day depending on the market and zone.

**Energy-only markets** (ERCOT): No capacity payments. Generators earn money only by selling electricity. During scarcity, the administratively-set price cap ($5,000/MWh in ERCOT) allows prices to spike high enough to compensate generators for running only a few hundred hours per year. This design creates extreme price volatility but avoids the cost of capacity payments.

## ERCOT — The Trader's Market

ERCOT (Electric Reliability Council of Texas) is uniquely interesting for trading:
- **Isolated grid**: Not connected to the US Eastern or Western interconnections. Cannot import emergency power from other states.
- **Energy-only**: No capacity market. Generators must recover all fixed costs from energy sales. Creates extreme price spikes.
- **Weather extremes**: Texas heat (summer peaks ~80 GW demand) and Texas cold (winter heating surges + equipment freezing).

**Winter Storm Uri (February 2021)**: The most severe power crisis in US history.
- Extreme cold snap: temperatures 30-40°F below normal across Texas for 5+ days
- Gas supply failure: wellheads and pipelines froze. Gas production dropped ~50%. Gas price spiked from $3 to $23/MMBtu at Houston Ship Channel (and $400+ at some hubs).
- Generator failures: 48+ GW of capacity went offline (gas plants couldn't get fuel, wind turbines froze, coal piles froze)
- ERCOT imposed rolling blackouts for 4+ days. 4.5 million homes lost power.
- Power prices hit $9,000/MWh (the cap) for ~4 consecutive days
- Estimated financial losses: $47+ billion. Several retail power providers went bankrupt. Generators who stayed online made fortunes.
- **Lessons**: (1) Gas and power are deeply linked — gas supply failure = power failure. (2) Energy-only markets create extreme tail risks. (3) Winter risk in southern markets is underpriced.

## Key Power Trades

- **Spark spread**: Long power / short gas. Isolates generator profitability.
- **Congestion / FTRs (Financial Transmission Rights)**: Bet on congestion between two nodes. Buy an FTR from A to B = you receive the congestion payment when power flows from A to B.
- **Peak vs. off-peak**: Buy cheap off-peak, sell expensive on-peak. Captures daily demand cycle.
- **Calendar spreads**: Summer vs. winter power. Seasonal demand patterns.
- **Basis trades**: PJM vs. NYISO, or within-ISO hub-to-zone spreads.
- **Virtual bidding**: Bid into the day-ahead market, settle vs. real-time price. Pure price prediction between DA and RT clearing.
- **Battery/storage dispatch**: Charge at low/negative prices, discharge at peak prices. Increasingly important.

## Reading

- <a class="source-link" data-source="eia">EIA Today in Energy</a> — the article on rooftop solar in Puerto Rico illustrates how distributed renewables reshape power market dynamics (duck curve, midday price suppression).
- <a class="source-link" data-source="primer">A Primer on Energy Trading</a> — Section 4 (Spread Trading), specifically spark spreads. Covers how gas prices link to power prices through heat rates.

Also recommended: **PJM Learning Center** — free online resource explaining LMP calculation, capacity markets, FTRs, and market settlement. **Monitor Analytics** (PJM) and **Potomac Economics** (ERCOT/MISO) publish State of the Market reports — dense but invaluable.`

## Contract Specifications

Memorize these — every P&L calculation, position sizing decision, and margin requirement depends on them.

| Contract | Symbol | Size | Tick Size | Tick Value | Delivery | Expiry Rule |
|----------|--------|------|-----------|------------|----------|-------------|
| WTI Crude | CL | 1,000 bbl | $0.01/bbl | $10 | Physical, Cushing | 3 biz days before 25th of prior month |
| Brent Crude | BZ | 1,000 bbl | $0.01/bbl | $10 | Cash settled | Last business day, 2 months prior |
| Henry Hub Gas | NG | 10,000 MMBtu | $0.001/MMBtu | $10 | Physical, Henry Hub | 3 biz days before 1st of delivery month |
| RBOB Gasoline | RB | 42,000 gal | $0.0001/gal | $4.20 | Physical, NY Harbor | Last biz day of prior month |
| ULSD | HO | 42,000 gal | $0.0001/gal | $4.20 | Physical, NY Harbor | Last biz day of prior month |
| E-mini WTI | QM | 500 bbl | $0.025/bbl | $12.50 | Cash settled | Same as CL |

**Month codes**: F=Jan, G=Feb, H=Mar, J=Apr, K=May, M=Jun, N=Jul, Q=Aug, U=Sep, V=Oct, X=Nov, Z=Dec. Example: CLZ26 = WTI December 2026. NGH27 = Gas March 2027.

**P&L math examples**:
\`\`\`
Long 10 WTI (CL) at $78.50, exit at $79.25:
P&L = 10 x 1,000 x ($79.25 - $78.50) = 10 x 1,000 x $0.75 = +$7,500

Short 5 Henry Hub (NG) at $3.45, gas drops to $3.22:
P&L = 5 x 10,000 x ($3.45 - $3.22) = 5 x 10,000 x $0.23 = +$11,500

Notional value of 1 CL at $80 = 1,000 x $80 = $80,000
Initial margin ~$6,000 → Leverage = $80,000 / $6,000 = 13.3x
A 7.5% adverse move wipes out your entire margin.
\`\`\`

## Margin and Mark-to-Market

**Initial margin**: Deposit required to open a position (~5-10% of notional). Set by the exchange based on volatility. Changes periodically — margin increases during high-vol periods, which can force liquidation at the worst time.

**Maintenance margin**: Lower threshold (~70-80% of initial). Falling below triggers a margin call — you must deposit funds immediately or your position is liquidated.

**Mark-to-market**: Every day at the close, your position is re-valued. Gains are credited, losses debited in cash. This means you can lose more than your initial margin over multiple days.

\`\`\`
Day 1: Buy 10 CL at $80.00. Deposit $60,000 margin.
Day 1 settle: $79.00. Loss = -$10,000. Account = $50,000. Maintenance = $45,000. OK.
Day 2 settle: $77.50. Loss = -$15,000. Account = $35,000 < $45,000. MARGIN CALL.
Must deposit $25,000 to restore to $60,000.
If you can't, your position is liquidated at a loss.
\`\`\`

## Forward Curve Terminology

\`\`\`
Front month (prompt) → 2nd month → 3rd month → ... → back months (deferred)
\`\`\`

- **Cal strip**: Average of all 12 months in a calendar year. "Cal27 WTI" = average of Jan-Dec 2027 WTI prices.
- **Prompt spread**: M1 - M2. The most liquid and most watched spread. Reflects immediate S/D tightness.
- **Calendar spread**: Any two different months. Long Jun / Short Dec = buy June, sell December.
- **Butterfly (fly)**: Long A + Short 2B + Long C. Example: Jun-Jul-Aug fly = (Jun - Jul) - (Jul - Aug). Trades the curvature of the forward curve.
- **Condor**: Like a fly but with 4 legs spanning a wider range.

## Options on Energy Futures

Energy options are American-style (exercisable any time) and exercise into the underlying futures contract.

\`\`\`
Example:
WTI at $80. Buy the $82 call for $1.50/bbl.
Cost = $1.50 x 1,000 = $1,500 per contract.
Breakeven at expiry = $82 + $1.50 = $83.50.
WTI goes to $90: profit = ($90 - $83.50) x 1,000 = $6,500
WTI stays at $78: loss = $1,500 (max loss = premium paid)
\`\`\`

**The Greeks in energy context**:

| Greek | What It Measures | Energy-Specific Notes |
|-------|-----------------|---------------------|
| Delta | $/$ move in underlying | ATM ~0.50, ITM→1.0, OTM→0. Net portfolio delta = your directional bet. |
| Gamma | Rate of delta change | Highest ATM near expiry. Energy gamma near expiry is extreme — $2 WTI move flips options ITM/OTM. Short gamma = where blowups happen. |
| Theta | Time decay per day | Accelerates in last 30 days. ATM WTI with 2-3 months: ~$0.01-0.03/bbl/day. |
| Vega | Sensitivity to IV | Critical in energy — vol has strong seasonal patterns. Winter gas IV 50-60% vs summer 30-40%. |

**Energy-specific dynamics**:
- **Positive skew**: calls are more expensive than puts (supply disruptions cause upside spikes). Opposite of equities.
- **Fat tails**: 5-sigma events happen regularly (2020 negative WTI, 2021 Uri, 2022 gas $10). Black-Scholes underprices these.
- **Seasonal vol**: Winter gas options carry higher IV than summer. Gasoline vol rises in spring (RVP transition).

## Swaps (OTC)

- **Fixed-for-floating swap**: One party pays a fixed price, the other pays the floating (spot/index) price. Most common OTC structure.
- Cleared through ICE Clear or CME ClearPort (reduces counterparty risk, standardizes margin).
- **Basis swaps**: Lock in the differential between two locations (e.g., Waha vs. Henry Hub).
- **Crack spread swaps**: OTC swaps referencing the crack spread directly.
- **Calendar swaps**: Lock in the difference between two delivery periods.

| Feature | Exchange (Futures) | OTC (Swaps, Forwards) |
|---------|-------------------|----------------------|
| Standardized | Yes | Customizable (tenor, location, index) |
| Transparency | Full price transparency | Bilateral, less transparent |
| Counterparty risk | Clearinghouse guarantees | Bilateral (unless cleared) |
| Liquidity | Deep in benchmarks | Can be thin in exotic points |
| Regulation | CFTC (US) | Dodd-Frank clearing mandates |

## Order Types

- **Limit**: execute at your price or better. Use for entries.
- **Market**: execute immediately at best available. Use only when you must get in/out now.
- **Stop**: becomes market order at trigger. Use for risk management (stop losses).
- **Stop-limit**: becomes limit order at trigger. Avoids bad fills but may not fill.
- **Iceberg**: shows only partial size. Use for large orders to avoid signaling.

**Practical advice**: Limit orders for entries. Stop orders for risk management. Never use market orders in illiquid back-month contracts (bid-ask can be $0.10-0.50+ wide). Voice brokers still handle many OTC products and illiquid instruments.

## The Roll and Roll Yield

When the front month approaches expiry, positions must be "rolled" to the next month.

\`\`\`
Roll yield in contango (e.g., front at $78, next month at $79):
Sell front at $78, buy next at $79. Cost = -$1.00/bbl per contract.
Over 12 months at $1/month contango = -$12/bbl annual drag.

Roll yield in backwardation (e.g., front at $82, next month at $80):
Sell front at $82, buy next at $80. Gain = +$2.00/bbl per contract.
\`\`\`

Passive long-only investors (ETFs like USO) hemorrhage money to negative roll yield in contango. Active traders can trade the roll directly, optimize roll timing, or use calendar spreads to avoid roll costs.

## Time Series Analysis for Energy

### Stationarity and Why It Matters

Most energy prices are **non-stationary** — they wander without a fixed mean. You cannot reliably apply mean-reversion strategies to raw prices. But **returns**, **spreads**, and **deviations from seasonal norms** are often stationary. This is why spread trading dominates energy: spreads mean-revert, flat prices do not.

**Testing stationarity**:
\`\`\`python
from statsmodels.tsa.stattools import adfuller

# Raw price: likely non-stationary
result = adfuller(df['wti_price'].dropna())
print(f'WTI price ADF p-value: {result[1]:.4f}')  # Typically p > 0.05 → non-stationary

# Spread: likely stationary
result = adfuller(df['wti_brent_spread'].dropna())
print(f'WTI-Brent spread ADF p-value: {result[1]:.4f}')  # Often p < 0.05 → stationary
\`\`\`

### Cointegration — The Foundation of Spread Trading

Two price series are **cointegrated** if their linear combination is stationary — they may wander individually, but they move together in the long run. This is the formal justification for pairs/spread trading.

\`\`\`python
from statsmodels.tsa.stattools import coint

# Test if WTI and Brent are cointegrated
score, pvalue, _ = coint(df['wti'], df['brent'])
print(f'Cointegration p-value: {pvalue:.4f}')  # p < 0.05 → cointegrated

# Find the hedge ratio (how much Brent per unit of WTI)
import statsmodels.api as sm
model = sm.OLS(df['wti'], sm.add_constant(df['brent'])).fit()
hedge_ratio = model.params[1]
spread = df['wti'] - hedge_ratio * df['brent']  # This spread should be stationary
\`\`\`

**Energy pairs that are typically cointegrated**: WTI-Brent, RBOB-ULSD, Henry Hub-regional basis hubs, adjacent month futures (same commodity). When cointegration breaks down temporarily, it may be a trading signal — or it may signal a structural regime change. Always check the fundamentals.

### Seasonality — The Strongest Edge in Energy

Energy has more predictable seasonality than any other asset class. Gas prices are higher in winter. Gasoline cracks widen in summer. Crude demand follows economic cycles but also has seasonal patterns (refinery maintenance in spring and fall).

## Building a Storage Model

A gas storage model is one of the first practical tools an energy analyst builds. The goal: estimate the EIA Thursday gas storage number before it is released, and profit from the difference between your estimate and consensus.

**Inputs**:
- **Weather** (HDD/CDD): heating and cooling degree days drive residential and power sector gas demand
- **Gas production**: EIA weekly proxy, supplemented by daily pipeline flow estimates
- **LNG feedgas**: how much gas is flowing to LNG export terminals (trackable via pipeline nominations)
- **Power burn**: gas consumed for electricity generation (function of power demand and gas price vs. coal)
- **Industrial demand**: relatively stable, estimated from seasonal patterns

\`\`\`python
# Simplified weekly gas balance
def estimate_storage_change(week_data):
    """Estimate weekly gas storage injection/withdrawal in Bcf."""
    supply = (
        week_data['dry_production_bcfd'] * 7 +  # ~105 Bcf/d x 7
        week_data['lng_imports_bcfd'] * 7 +      # ~0 (negligible)
        week_data['canada_imports_bcfd'] * 7      # ~5-8 Bcf/d
    )
    demand = (
        week_data['residential_commercial_bcfd'] * 7 +  # HDD-driven
        week_data['power_burn_bcfd'] * 7 +               # CDD + price-driven
        week_data['industrial_bcfd'] * 7 +                # ~22 Bcf/d
        week_data['lng_exports_bcfd'] * 7 +               # ~12-14 Bcf/d
        week_data['mexico_exports_bcfd'] * 7              # ~6 Bcf/d
    )
    implied_storage_change = supply - demand  # Positive = injection, negative = withdrawal
    return implied_storage_change

# Compare your estimate to Bloomberg consensus
# If your model says +52 Bcf and consensus is +68 Bcf → you expect a bearish miss
# Position: short gas ahead of the report (or if you can't time it, build a track record first)
\`\`\`

**The payoff**: A consistent 5-10 Bcf edge over consensus translates directly into a tradeable signal. At $0.03-0.05/MMBtu per 5 Bcf miss, on 100 contracts (1M MMBtu), that is $30,000-50,000 per correct call.

## Regression Modeling for Energy

Regression is the workhorse of energy analytics. The goal is to identify the fair value of a spread given observable fundamentals, and trade the residual when it diverges.

### Crack Spread Regression

\`\`\`python
import statsmodels.api as sm

# Model: 3:2:1 crack = f(refinery utilization, gasoline deficit, distillate deficit, VIX)
X = df[['refinery_util', 'gasoline_deficit', 'distillate_deficit', 'vix']].dropna()
y = df['crack_321'].loc[X.index]
X = sm.add_constant(X)

model = sm.OLS(y, X).fit()
print(model.summary())

# Fair value vs. actual
df['crack_fair_value'] = model.predict(X)
df['crack_residual'] = y - df['crack_fair_value']

# Trade signal: residual > 1.5 std → crack is rich → sell crack
# Trade signal: residual < -1.5 std → crack is cheap → buy crack
df['crack_zscore'] = df['crack_residual'] / df['crack_residual'].std()
\`\`\`

### Gas Price Regression

\`\`\`python
# Henry Hub gas = f(storage deficit, HDD forecast, LNG feedgas, production)
X = df[['storage_deficit_bcf', 'hdd_forecast', 'lng_feedgas_bcfd', 'dry_production_bcfd']]
y = df['henry_hub']
X = sm.add_constant(X.dropna())
y = y.loc[X.index]

model = sm.OLS(y, X).fit()

# Key output: R² tells you how much of gas price variation fundamentals explain
# Typical R² for monthly gas: 0.50-0.70
# The unexplained 30-50% is sentiment, positioning, and short-term noise — that's where alpha hides
\`\`\`

### Regression Pitfalls in Energy

- **Multicollinearity**: storage deficit and production are correlated → coefficients become unstable. Check VIF (variance inflation factor). Drop redundant variables.
- **Non-stationarity**: regressing one non-stationary series on another produces spurious results. Use spreads, changes, or cointegrated pairs.
- **Structural breaks**: the shale revolution, LNG export boom, and COVID each created regime changes. A model trained on 2010-2014 data may be useless for 2020+ data. Use rolling windows (2-3 year lookback).
- **Overfitting**: 5 explanatory variables for 60 monthly observations = overfit. Keep the ratio of observations to variables above 10:1. Prefer 2-4 variables max.

## Backtesting Energy Strategies

### Framework

\`\`\`python
class EnergyBacktest:
    def __init__(self, data, lookback=60, transaction_cost=0.02):
        self.data = data
        self.lookback = lookback
        self.tc = transaction_cost  # $/bbl or $/MMBtu per round trip

    def generate_signals(self):
        """Z-score mean reversion on a spread."""
        spread = self.data['spread']
        signals = pd.Series(0, index=spread.index)

        for i in range(self.lookback, len(spread)):
            window = spread.iloc[i-self.lookback:i]
            z = (spread.iloc[i] - window.mean()) / window.std()

            if z < -1.5:
                signals.iloc[i] = 1    # Spread cheap → buy
            elif z > 1.5:
                signals.iloc[i] = -1   # Spread rich → sell
            else:
                signals.iloc[i] = signals.iloc[i-1]  # Hold

        return signals

    def run(self):
        signals = self.generate_signals()
        daily_returns = self.data['spread'].diff()

        # P&L = signal * next day's spread change - transaction cost on trades
        trades = signals.diff().abs()  # 1 when signal changes
        pnl = signals.shift(1) * daily_returns - trades * self.tc

        return {
            'total_pnl': pnl.sum(),
            'sharpe': pnl.mean() / pnl.std() * np.sqrt(252),
            'max_dd': (pnl.cumsum() - pnl.cumsum().cummax()).min(),
            'win_rate': (pnl[pnl != 0] > 0).mean(),
            'n_trades': int(trades.sum() / 2),
        }
\`\`\`

### Avoiding Common Pitfalls

**Lookahead bias**: The deadliest mistake. If your signal uses today's close to trade today's close, your backtest is wrong. Always: \`signal[t]\` → \`return[t+1]\`.

**Survivorship bias**: Energy markets have structural breaks (negative WTI, $200+ TTF). If your data excludes these, your model looks better than reality.

**Transaction costs**: WTI front month bid-ask: ~$0.01/bbl (negligible). Back month: $0.05-0.20/bbl. OTC products: $0.10-0.50. Gas: $0.002-0.01/MMBtu. Cracks: $0.05-0.15 per leg. Include realistic costs per product.

**Overfitting**: If your backtest has a 4.0 Sharpe with 15 parameters, it is overfit. The best energy strategies use 2-4 parameters. A 1.2 Sharpe that is robust out-of-sample is worth 100x a 4.0 Sharpe that falls apart.

**Out-of-sample discipline**: Split data 60/20/20 (train/validate/test). Develop on training set, tune on validation set, run ONCE on test set. If your test-set Sharpe drops below 0.5x your training-set Sharpe, you are overfit.

## Statistical Measures for Evaluating Trades

| Metric | Formula | Good | Great | Notes |
|--------|---------|------|-------|-------|
| Sharpe Ratio | Ann. return / Ann. vol | >1.0 | >2.0 | The primary metric. Below 0.5 = not worth the risk. |
| Max Drawdown | Peak-to-trough loss | <15% | <8% | How much pain you endure. Determines if you survive to recover. |
| Calmar Ratio | Ann. return / Max DD | >1.0 | >2.0 | Return per unit of worst-case pain. Better than Sharpe for risk-adjusted evaluation. |
| Win Rate | % of trades profitable | >50% | >55% | High win rate + small avg win is worse than 45% win rate + large avg win. |
| Profit Factor | Gross profit / Gross loss | >1.3 | >2.0 | Below 1.0 = losing money. Simple sanity check. |
| Avg Win / Avg Loss | Mean win / Mean loss | >1.2 | >2.0 | Measures asymmetry. Cut losers fast, let winners run. |
| Sortino Ratio | Return / Downside vol | >1.5 | >3.0 | Only penalizes downside volatility. Better than Sharpe for skewed strategies. |

## Machine Learning in Energy Trading

### Where ML Works

**Weather post-processing**: Numerical weather prediction (NWP) models (GFS, ECMWF) have systematic biases. ML models (random forests, gradient boosting) trained on historical model-vs-actual errors can improve 7-14 day temperature forecasts by 0.5-1.5°F. In gas/power trading, a 1°F forecast improvement is worth millions annually.

**Load forecasting**: Predicting power demand 24-48 hours ahead using temperature forecasts, day-of-week, holidays, and economic variables. XGBoost and neural networks achieve <2% MAPE on day-ahead load. Critical for power trading desks.

**Anomaly detection**: Detecting unusual patterns in EIA data (e.g., a refinery outage implied by unexpected inventory build), pipeline flow data, or vessel tracking data. Isolation forests and autoencoders work well.

**NLP on news and reports**: Parsing EIA reports, OPEC communiques, earnings call transcripts for sentiment. BERT-based models can classify bullish/bearish signals from text faster than manual reading.

### Where ML Fails

**Flat price prediction**: Predicting whether WTI goes up or down tomorrow. The signal-to-noise ratio is too low. Random forests, LSTMs, and transformers all fail to consistently beat a coin flip on energy flat price direction. Academic papers claiming otherwise are overfit.

**Regime changes**: ML models trained on 2015-2019 data catastrophically fail during COVID, Uri, or Russia-Ukraine. Energy markets have genuine structural breaks that violate the stationarity assumption underlying all ML.

**Small sample sizes**: You get ~250 trading days per year, ~52 EIA reports. With 10 features, you have maybe 5:1 observation-to-feature ratio. This is statistically insufficient for complex models. Use simple models (linear, logistic) with 2-4 features.

**Start simple**: Linear regression → seasonal models → z-score mean reversion → gradient boosting → only then consider deep learning. Most profitable energy strategies at hedge funds are surprisingly simple quantitatively. The edge is in the data and the fundamental insight, not the algorithm.

## Why Spreads Dominate Energy Trading

Most professional energy P&L comes from spread trading, not directional bets. At Citadel, Millennium, or Balyasny energy pods, the PM runs a book of 20-50 spread positions across crude, gas, products, and power. Flat price directional trades are rare and typically small relative to the relative value book.

**Why spreads are superior for professional trading**:

| | Outright (Flat Price) | Spread |
|---|---|---|
| Margin | WTI: ~$6,000/contract | WTI calendar: ~$1,000-2,000 |
| Daily P&L vol | $1,500/contract (WTI at $1.50/bbl daily vol) | $200-500/contract (spread daily vol $0.20-0.50) |
| Drivers | Macro, OPEC, geopolitics, sentiment, flows | Specific fundamentals: storage, refinery, weather, logistics |
| Edge source | Extremely hard to predict | Quantifiable with S/D models, seasonal patterns, physical knowledge |
| Sharpe ratio (typical) | 0.3-0.8 | 1.0-3.0 |
| Drawdown risk | Can lose 30%+ in weeks | Typically <10% unless concentrated |

The key insight: spreads **isolate** specific fundamental drivers by removing common factors. A crack spread doesn't care if crude rallies $5 on OPEC — it only moves if products rally more or less than crude. This makes the trade analyzable and modelable.

## Calendar Spreads (Time Spreads)

Buy one delivery month, sell another in the same commodity. You are trading the **shape of the forward curve**, not the price level.

### Prompt Spread (M1 - M2)

The most liquid and most important calendar spread. It directly reflects near-term supply/demand tightness.

**WTI prompt spread**:
- Typical range: -$2.00 (deep contango) to +$3.00 (strong backwardation)
- Driven by: Cushing inventory levels, EIA weekly report surprises, refinery demand, pipeline flow changes
- Deep contango (-$2+): Cushing >65M bbl, storage filling up, oversupply
- Strong backwardation (+$2+): Cushing <25M bbl, barrels scarce, drawdowns accelerating

**Henry Hub prompt spread**:
- Typical range: -$0.50 to +$1.00
- Driven by: weather (HDD/CDD), storage vs. 5-year average, production changes
- Tends to be in contango during injection season (surplus going into storage)
- Flips to backwardation during cold winter withdrawals

### Seasonal Spreads

**Winter/Summer gas** (e.g., Jan-Jul or the "Winter Strip - Summer Strip"):
- Winter premium typically $0.50-2.00/MMBtu
- Driven by: end-of-injection storage level, winter weather expectations, LNG export demand
- When October storage is projected low (<3.2 Tcf), winter premium expands
- When storage is abundant (>3.9 Tcf), winter premium compresses

\`\`\`
Worked example — Winter/Summer gas spread:
Jan 2027 Henry Hub: $4.20/MMBtu
Jul 2027 Henry Hub: $3.30/MMBtu
Spread (Jan - Jul): $0.90

Historical range for this time of year: $0.50 - $1.80
Current storage: 3.1 Tcf (200 Bcf below 5yr avg)
Thesis: storage deficit will widen → winter premium should expand to $1.30+
Trade: Buy Jan / Sell Jul (long the winter/summer spread)
\`\`\`

### The Widowmaker — Mar/Apr Gas

The most famous (and dangerous) calendar spread in energy. March is the last month of winter withdrawal season. April is the first month of injection season. The spread between them captures the transition from winter scarcity to spring surplus.

**Why "widowmaker"**:
- Range: historically -$0.20 to +$3.00, but can spike to $5.00+ in extreme cold
- The spread can move $0.50-1.00 in a single day on weather model shifts
- Amaranth ($6B loss in 2006) was killed by positions in winter gas calendar spreads including this one
- Low margin (~$500-1,000/spread) tempts traders to put on massive size, amplifying losses

**What drives it**:
- Late-winter weather: a February/March cold blast extends withdrawals → March prices spike → spread widens
- End-of-winter storage: if storage exits winter below 1.5 Tcf, March can trade at extreme premiums
- Injection season outlook: strong spring production growth narrows the spread as the market expects easy refill

### Butterfly (Fly)

Long Month A + Short 2x Month B + Long Month C. Trades the **curvature** of the forward curve between three adjacent months.

\`\`\`
Butterfly example (WTI Jun-Jul-Aug):
Entry: Jun $80.00, Jul $79.50, Aug $79.20
Fly = (Jun - Jul) - (Jul - Aug) = $0.50 - $0.30 = $0.20

If Jun tightens relative to Jul more than Jul tightens vs. Aug:
Exit: Jun $80.80, Jul $79.80, Aug $79.40
Fly = ($80.80 - $79.80) - ($79.80 - $79.40) = $1.00 - $0.40 = $0.60
Profit = $0.60 - $0.20 = $0.40/bbl = $400 per 1-lot fly

Margin: ~$500-800 per fly (very capital efficient)
\`\`\`

Butterflies are lower risk than outright calendar spreads because they cancel most directional and curve-level risk. They isolate very specific kinks in the curve — often caused by refinery turnarounds, seasonal transitions, or contract expiry dynamics.

## Crack Spreads (Refining Margins)

Crack spreads represent the refinery's gross margin: the difference between the value of refined products and the cost of crude oil input.

### Structure Deep Dive

**3:2:1 Crack** (industry standard):
- Buy 3 barrels crude → Sell 2 barrels gasoline + 1 barrel diesel
- Formula: (2 x RBOB $/bbl + 1 x ULSD $/bbl) / 3 - WTI $/bbl
- This approximates a simple US Gulf Coast refinery's product slate

**Execution on exchange**:
\`\`\`
To put on a 3:2:1 crack (10 lots):
Buy 30 CL contracts (30,000 barrels crude)
Sell 20 RB contracts (20 x 42,000 gal = 840,000 gal = 20,000 bbl)
Sell 10 HO contracts (10 x 42,000 gal = 420,000 gal = 10,000 bbl)

Margin: ~$2,500-4,000 per "crack" (3 CL + 2 RB + 1 HO)
Compare: 3 outright CL would require ~$18,000 margin
\`\`\`

### What Drives Crack Spreads

**Refinery utilization**: The single most important driver. US Gulf Coast refinery utilization typically runs 88-96%. During spring/fall turnarounds, utilization drops to 85-90%, reducing product supply and widening cracks. Unplanned outages widen cracks immediately.

**Seasonal patterns**:
- **Q1 (Jan-Mar)**: Turnaround season. Utilization drops. Cracks moderate. Heating oil demand supports ULSD crack.
- **Q2 (Apr-Jun)**: Post-turnaround restarts. Utilization rises to 93-96%. Driving season demand ramps. Gasoline cracks widen sharply. This is typically the strongest period for 3:2:1 cracks.
- **Q3 (Jul-Sep)**: Peak driving season. Gasoline demand peaks (9.5M+ bbl/d). 3:2:1 cracks at seasonal highs ($25-40/bbl). Hurricane risk can widen cracks further (refinery shutdowns on Gulf Coast).
- **Q4 (Oct-Dec)**: Driving season ends. Gasoline cracks narrow. Diesel/heating oil cracks strengthen (winter heating demand, export demand for European distillate).

**Inventory levels**: Gasoline inventories below the 5-year average = bullish gasoline cracks. Distillate inventories below average = bullish diesel cracks. The deficit relative to seasonal norms is the key metric, not the absolute level.

**Historical crack spread ranges (3:2:1, $/bbl)**:
| Environment | Range | Conditions |
|-------------|-------|------------|
| Depressed | $5-15 | Recession, high utilization, oversupply (2019-2020) |
| Normal | $15-25 | Balanced market, seasonal utilization patterns |
| Elevated | $25-40 | Low product inventories, turnarounds, strong demand |
| Extreme | $40-60+ | Post-COVID restocking (2022), severe refinery outages |

**The 2022 crack spike**: After Russia invaded Ukraine, the loss of ~1M bbl/d of Russian refined product exports (especially diesel to Europe) pushed the 3:2:1 above $50/bbl for weeks. ULSD cracks alone hit $70-80/bbl. Traders who were long cracks made generational returns. This was a structural supply shock, not a seasonal pattern.

### Gasoline vs. Diesel (RB-HO Spread)

The spread between gasoline and diesel cracks is itself a tradeable spread — it isolates which product is tighter.

\`\`\`
RBOB-ULSD spread (in $/bbl):
RBOB at $2.50/gal = $105.00/bbl
ULSD at $2.80/gal = $117.60/bbl
Spread = $105.00 - $117.60 = -$12.60 (diesel at premium)

Seasonal pattern:
Spring/Summer: Gasoline cracks > Diesel cracks → spread narrows or flips positive
Fall/Winter: Diesel cracks > Gasoline cracks → spread widens negative
\`\`\`

Trading this spread isolates the seasonal gasoline/diesel demand balance without crude price exposure.

## Spark Spreads (Power Generation Margin)

**Spark spread = Power price - (Gas price x Heat rate)**

The spark spread is the power generator's gross margin, analogous to the crack spread for refiners.

### Detailed Mechanics

\`\`\`
PJM Western Hub on-peak power: $65/MWh
Henry Hub gas: $3.80/MMBtu
Heat rate of efficient CCGT: 7.0 MMBtu/MWh
Heat rate of peaker CT: 10.5 MMBtu/MWh

CCGT spark = $65 - ($3.80 x 7.0) = $65 - $26.60 = $38.40/MWh (profitable)
Peaker spark = $65 - ($3.80 x 10.5) = $65 - $39.90 = $25.10/MWh (profitable — scarcity)

Implied heat rate = $65 / $3.80 = 17.1 MMBtu/MWh
→ Even a plant with a 17 heat rate is marginal. Market is very tight.
\`\`\`

**What the implied heat rate tells you**: If the implied heat rate is 7-8, only efficient CCGTs are running — ample supply. If 10-12, peakers are needed — moderate tightness. If 15+, extreme scarcity — even the worst plants are being called. During Winter Storm Uri, ERCOT implied heat rates hit 100+.

### Spark Spread Variants

- **7x24**: All hours, blended. Used for long-dated financial hedging.
- **On-peak** (HE8-HE23, weekdays): Higher value. Demand is strongest during business hours and evening.
- **Off-peak** (HE1-HE7, weekends): Lower prices, sometimes negative in high-renewables markets.
- **Clean spark**: Spark spread minus carbon cost per MWh. Relevant in carbon-priced markets (EU ETS, RGGI).

\`\`\`
Clean spark = Power - (Gas x HR) - (Carbon price x Emission factor)
EU example:
Power: €85/MWh, Gas: €35/MWh(th), HR: 2.0 MWh(th)/MWh(e)
Carbon: €60/tCO2, Gas emission factor: 0.37 tCO2/MWh(th)
Clean spark = €85 - (€35 x 2.0) - (€60 x 0.37 x 2.0) = €85 - €70 - €44.40 = -€29.40
→ Gas plant is uneconomic. Coal-to-gas switching at this carbon price.
\`\`\`

## Locational Spreads (Basis)

Same commodity, different delivery location. Every basis spread is a transportation economics question.

### Natural Gas Basis — Where the Alpha Is

Gas basis is one of the most active and profitable areas of energy spread trading because the US gas pipeline system has chronic bottlenecks.

**Key gas basis spreads**:

| Spread | Description | Typical Range | Driver |
|--------|-------------|---------------|--------|
| Waha - Henry Hub | Permian gas to Gulf Coast | -$2.00 to +$0.50 | Permian associated gas production vs. pipeline capacity. Often deeply negative. |
| Algonquin - Henry Hub | New England delivery | $0.00 to +$30.00 | Winter pipeline constraints into New England. Can spike violently during cold. |
| SoCal Border - Henry Hub | California delivery | -$1.00 to +$5.00 | Western pipeline congestion, CA gas demand, renewable displacement. |
| Chicago - Henry Hub | Midwest delivery | -$0.30 to +$1.50 | Moderate; well-connected pipeline system. |
| Dominion South - Henry Hub | Appalachian (Marcellus) | -$1.50 to +$0.20 | Marcellus production exceeding takeaway capacity. Persistently discounted. |

**Waha basis** is the most dramatic example. The Permian Basin produces ~25 Bcf/d of associated gas (produced alongside oil — operators drill for oil and gas comes out whether they want it or not). Pipeline capacity out of the Permian is ~23-24 Bcf/d. When production exceeds capacity, Waha gas prices collapse — sometimes going **negative** (producers pay to dispose of gas rather than shut in oil wells). This is a structural trade that persists until new pipeline capacity is built.

**Algonquin basis** is the most volatile. New England has limited pipeline capacity and virtually no LNG import capacity since the Everett LNG terminal's role diminished. During cold snaps, gas for heating and power generation competes for limited pipeline space. Algonquin basis has spiked to $20-30/MMBtu above Henry Hub during polar vortex events — a 10x+ premium over normal.

### Crude Oil Basis

| Spread | Description | Typical Range | Driver |
|--------|-------------|---------------|--------|
| WTI Midland - WTI Cushing | Permian to pipeline hub | -$5.00 to +$0.50 | Permian pipeline capacity. Blew out to -$15 in 2018 before new pipes. |
| WTI - Brent | US vs. international | -$8.00 to +$3.00 | US export capacity, Cushing inventory, global disruptions. |
| LLS - WTI | Gulf Coast vs. Cushing | -$1.00 to +$5.00 | Gulf Coast refinery demand, export economics. |
| WCS - WTI | Canadian heavy vs. US light | -$25.00 to -$10.00 | Pipeline capacity from Alberta, diluent costs, heavy demand. |

## Inter-Commodity Spreads

### Frac Spread (NGL vs. Gas)

\`\`\`
Frac spread = NGL price ($/gal) x 42 - Gas price ($/MMBtu) x ~6.0 shrink factor

Example (ethane):
Ethane: $0.25/gal = $10.50/bbl
Gas equivalent of ethane recovered: ~0.06 MMBtu/gal processing input
Gas: $3.50/MMBtu
Frac spread drives the economics of gas processing plants:
→ Wide frac spread = profitable to process wet gas into NGLs
→ Narrow frac spread = ethane rejection (leave NGLs in the gas stream)
\`\`\`

The frac spread determines how much wet gas processing occurs. When the frac spread widens (NGL prices rise relative to gas), processors run at capacity and gas production effectively increases. When it narrows, ethane is rejected — reducing gas liquids supply and increasing effective gas pipeline volumes.

### LNG Arbitrage

\`\`\`
JKM (Japan Korea Marker): $14.00/MMBtu
Henry Hub: $3.50/MMBtu
Gross arbitrage: $10.50/MMBtu

Less:
Liquefaction fee: $2.50/MMBtu (tolling charge at Sabine Pass, Cameron, etc.)
Shipping (USGC to Asia): $1.50-3.00/MMBtu (varies with charter rates)
Regas fee: $0.50/MMBtu
Insurance/loss: $0.30/MMBtu
Total cost: $4.80-6.30/MMBtu

Net arbitrage: $10.50 - $5.55 (mid) = ~$4.95/MMBtu → trade is OPEN
When JKM-HH < ~$5.00 → arbitrage closes → LNG flows to Asia slow
\`\`\`

LNG arbitrage is the mechanism that links US gas (Henry Hub) to European gas (TTF) and Asian gas (JKM). When the arb is open, US LNG exports run at max capacity (~14 Bcf/d). When it closes, cargoes get diverted or deferred. Tracking this arb tells you about global gas supply rebalancing.

### Gas-Coal Switching

In power markets, the relative price of gas vs. coal determines which fuel generators burn. When gas is cheap relative to coal (adjusted for heat rate and carbon cost), gas plants displace coal → gas demand increases, coal demand decreases. When gas is expensive, coal plants run more.

\`\`\`
Gas plant cost: Gas price x Gas HR = $3.50 x 7.0 = $24.50/MWh
Coal plant cost: Coal price x Coal HR + Carbon = ($2.50/MMBtu x 10.0) + ($5 x 0.95) = $29.75/MWh
→ Gas is cheaper → gas displaces coal → more gas demand

If gas rises to $5.00: Gas cost = $5.00 x 7.0 = $35.00/MWh > Coal $29.75
→ Coal is cheaper → coal runs more → gas demand falls
Switching price: ~$4.25/MMBtu at these coal/carbon levels
\`\`\`

The switching price is a soft floor/ceiling on gas demand — it provides natural mean-reversion for gas prices.

## Option Structures in Energy

### Collar — The Most Common Producer Hedge

A producer sells a call (gives up upside above strike) and buys a put (protects downside below strike). The call premium finances the put → zero-cost or low-cost protection.

\`\`\`
Producer hedge example:
WTI at $80. Producer sells $90 call and buys $70 put. Zero-cost collar.
- WTI falls to $60: Put pays $10/bbl protection. Producer receives $70 effective.
- WTI stays at $80: Both options expire worthless. Producer sells at $80.
- WTI rallies to $100: Call is exercised. Producer capped at $90 effective.

The collar is essentially: "I'm willing to give up prices above $90 in exchange for guaranteed floor at $70."
\`\`\`

When many producers put on collars at similar levels, the collective options market flow suppresses volatility. The hedging flow creates resistance at the call strike (price ceiling) and support at the put strike (price floor). Track producer hedging activity (reported in 10-Qs) for options market intelligence.

### Straddle / Strangle — Volatility Trades

\`\`\`
WTI at $80. Buy $80 straddle (long $80 call + long $80 put).
Premium: $3.50/bbl (call) + $3.20/bbl (put) = $6.70/bbl total cost.
Breakeven: Below $73.30 or above $86.70 (need a $6.70 move in either direction).

This trade profits from a large move in EITHER direction.
Use before binary events: OPEC meetings, EIA reports, geopolitical escalation.
The risk: if nothing happens and vol crushes, you lose the full premium.
\`\`\`

**Energy-specific dynamics**: Straddles before OPEC meetings are priced expensively because the market knows the event is coming. The key is whether the actual move exceeds what the straddle prices in. If the straddle costs $6.70 and WTI moves $10, you profit. If it moves only $4, you lose even though "something happened."

### Calendar Option Spreads — Trading Vol Term Structure

Buy an option in one month, sell an option in another month at the same strike. This trades the **term structure of implied volatility**.

\`\`\`
Winter gas vol is typically 50-60%. Summer gas vol is 30-40%.
Buy Jan $4.00 call (high IV) for $0.50
Sell Jul $4.00 call (low IV) for $0.20
Net cost: $0.30/MMBtu

You're long winter vol and short summer vol. If winter vol increases or summer vol decreases, you profit.
\`\`\`

## Thinking About Spread Trades — The Framework

Every spread trade should answer these six questions:

**1. What is my fundamental view?**
"Gasoline demand will exceed expectations this summer because VMT data is trending 3% above prior year, and Gulf Coast turnarounds are heavier than normal, constraining supply."

**2. What does the spread currently price in?**
"The Q3 3:2:1 crack is at $28/bbl, which is the 35th percentile of the 5-year range for this week of year. The market is pricing normal demand and normal utilization."

**3. What is the historical range?**
"This spread has ranged from $15 to $55 over 5 years, with a seasonal average of $32 for this period."

**4. What would make me wrong?**
"A recession, which would reduce driving demand. Or a crude supply disruption that pushes crude up faster than products."

**5. What is my stop?**
"I am wrong if the crack breaks below $22, which would imply demand is weaker than even bearish scenarios. Max loss: $6/bbl."

**6. How does the spread behave near expiry?**
"Crack spreads converge to actual refinery economics as physical delivery approaches. If physical margins are strong, the spread should hold or widen."

## Reading

- <a class="source-link" data-source="primer">A Primer on Energy Trading</a> — Section 4 (Spread Trading) is the core reference. Covers crack spreads, spark spreads, basis spreads, and calendar spreads with worked examples.
- <a class="source-link" data-source="oil101">Oil 101</a> — chapters 9-10 (refining) provide the physical context behind crack spreads. Chapter 7 (transportation) explains why basis exists.
- <a class="source-link" data-source="eia">EIA Today in Energy</a> — the Middle East tanker rate article shows how physical supply disruptions drive basis and inter-regional spread opportunities in real time.

Also recommended: **Energy Trading & Investing** by Davis Edwards. The most practical book on energy trading. Covers every spread type with real P&L examples — essential for fund interview prep.

## Why Energy Risk Is Different

Risk management in energy is not an afterthought — it is the difference between a career and a blowup. Energy markets have characteristics that make them more dangerous than equities or rates:

**Fat tails**: Energy returns have kurtosis of 5-15 (vs. ~3 for a normal distribution). A 5-sigma event in equities is once-in-a-lifetime. In energy, 5-sigma events happen every 2-3 years: negative WTI (2020), $200 TTF gas (2022), $9,000/MWh ERCOT (2021), WTI $147 to $32 (2008). Your risk framework must assume that the worst thing you can imagine will eventually happen.

**Gap risk**: Prices can gap overnight on OPEC decisions, geopolitical events, or weather shifts. A stop loss at $78 is meaningless if WTI opens at $72 after an OPEC surprise. Gaps are more frequent in energy than in deeply liquid equity index futures.

**Correlation instability**: WTI and Brent are 95% correlated in normal markets. During the April 2020 WTI negative event, the correlation dropped to <50% because the stress was specific to WTI's delivery mechanism. A "hedged" WTI-Brent book could have lost on both legs simultaneously. Spread traders live and die by correlation stability.

**Structural leverage**: Futures require only 5-10% margin, creating 10-20x implicit leverage. A $6,000 margin on one WTI contract controls $80,000 of crude. A 7.5% adverse move wipes the margin entirely.

## Position Sizing

### Volatility-Based Sizing

The most common approach at professional shops. Size the position so that a normal day's adverse move costs a tolerable amount.

\`\`\`
Position size = Target daily risk ($) / (Daily $ vol per contract)

Daily $ vol per contract = Daily price volatility x Contract multiplier

Example — WTI:
Target daily risk: $100,000
WTI 20-day realized vol: 2.0% annualized → daily vol = 2.0% x $80 / √252 = $1.01/bbl
But more practically: WTI daily range averages ~$1.50/bbl (1 std dev of daily changes)
Daily $ vol per contract = $1.50 x 1,000 = $1,500
Position size = $100,000 / $1,500 = 67 contracts

Example — Henry Hub gas:
Target daily risk: $50,000
Gas daily vol: ~$0.08/MMBtu (1 std dev)
Daily $ vol per contract = $0.08 x 10,000 = $800
Position size = $50,000 / $800 = 62 contracts

Example — Calendar spread (WTI M1-M2):
Target daily risk: $30,000
Prompt spread daily vol: ~$0.15/bbl
Daily $ vol per spread = $0.15 x 1,000 = $150
Position size = $30,000 / $150 = 200 spreads
\`\`\`

**Critical principle**: Size to the volatility, not to the conviction. A high-conviction trade with 2x normal size will blow you up when you are wrong at the worst time. The market does not care about your conviction.

### Adjusting for Volatility Regime

Vol regimes change. WTI daily vol in a quiet period might be $1.00/bbl. After an OPEC surprise, it could be $3.00/bbl for weeks. If you sized for $1.00 vol and the regime shifts to $3.00, your position is 3x too large.

\`\`\`
Approach: Use a 20-day rolling volatility measure. Recalculate position sizes weekly.

Low vol (daily vol < $1.00/bbl): Size up. Take advantage of cheap risk.
Normal vol ($1.00-2.00): Standard sizing.
High vol ($2.00-3.50): Cut size 30-50%.
Crisis vol (>$3.50): Cut to half or less. Capital preservation mode.
\`\`\`

### Correlation-Adjusted Sizing

If you are long the WTI-Brent spread AND long the WTI prompt spread, these positions are correlated (both benefit from WTI front-month strength). Your combined risk is higher than the sum of individual risks.

\`\`\`
Portfolio VaR = √(VaR₁² + VaR₂² + 2 × ρ × VaR₁ × VaR₂)

Example:
Position A: WTI-Brent spread, daily VaR = $50K
Position B: WTI prompt spread, daily VaR = $30K
Correlation between A and B: ρ = 0.6

Portfolio VaR = √($50K² + $30K² + 2 × 0.6 × $50K × $30K)
            = √($2,500M + $900M + $1,800M)
            = √$5,200M = $72.1K

Without correlation adjustment: $50K + $30K = $80K (overstates if ρ < 1)
With full correlation (ρ = 1): $80K (worst case)
With zero correlation (ρ = 0): $58.3K (diversified)
\`\`\`

Size each position knowing the combined portfolio risk. If the portfolio VaR exceeds your limit, cut the more marginal position.

## Value at Risk (VaR)

### Three Approaches

**Parametric VaR** (simplest):
\`\`\`
VaR = Portfolio value × z-score × σ_daily × √(holding period)

Example: $10M WTI position, 95% confidence, 1-day, daily vol 2%
VaR = $10M × 1.65 × 0.02 × √1 = $330,000

"There is a 5% chance of losing more than $330K tomorrow."
\`\`\`

**Problem**: Assumes returns are normally distributed. They are not. Energy returns have fat tails. Parametric VaR underestimates tail risk by 30-50%.

**Historical VaR** (better for energy):
\`\`\`
1. Collect the last 500 daily P&L changes for the position
2. Sort from worst to best
3. 95% VaR = the 25th worst day (5% × 500)
4. 99% VaR = the 5th worst day

This captures the actual distribution including fat tails.
\`\`\`

**Monte Carlo VaR** (most flexible):
\`\`\`
1. Estimate the return distribution (mean, vol, skew, kurtosis) for each risk factor
2. Simulate 10,000+ scenarios using correlated random draws
3. Calculate portfolio P&L for each scenario
4. VaR = the 5th percentile of the P&L distribution
\`\`\`

Monte Carlo can incorporate non-linear payoffs (options), time-varying volatility, and complex correlations. This is what most fund risk teams run.

### Expected Shortfall (CVaR) — Beyond VaR

VaR tells you the threshold. It does NOT tell you how bad it gets beyond the threshold. Expected Shortfall (also called CVaR or Conditional VaR) answers: **"Given that we are in the 5% tail, what is the average loss?"**

\`\`\`
Example:
95% VaR = $500K
95% Expected Shortfall = $850K

Interpretation: On a normal bad day (one in 20), you lose $500K.
On a truly bad day (average of the worst 5%), you lose $850K.
\`\`\`

Expected Shortfall is a better risk metric for energy because it captures the fat tails that VaR ignores. A portfolio with the same VaR but higher ES has more tail risk — which is exactly where energy blowups happen.

## Stress Testing

VaR works in normal markets. Stress tests are for crises — the events that actually kill firms.

Run your current portfolio through each of these past events. Calculate the P&L and margin impact.
