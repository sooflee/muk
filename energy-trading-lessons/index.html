**Demand destruction**: High prices in the 1970s triggered conservation (fuel efficiency standards, thermostat regulations), fuel switching (oil-to-gas and oil-to-nuclear in power generation), and new supply (North Sea, Alaska North Slope, Mexico\u2019s Cantarell field). Global oil demand fell from 66M bbl/d in 1979 to 58M in 1983 \u2014 an 8M bbl/d decline. By 1985, OPEC\u2019s market share had fallen from 50% to 30%.

## Part V: The Modern Era (1990s\u2013)

**Gulf War I (1990\u201391)**: Saddam Hussein invaded Kuwait on August 2, 1990, immediately removing ~4.5M bbl/d from the market (Kuwait + Iraqi exports). Oil spiked from $17 to $41 in weeks. The coalition\u2019s liberation of Kuwait was followed by Saddam setting 700+ Kuwaiti oil wells on fire \u2014 the largest environmental disaster in oil history. Prices collapsed back below $20 once supply was restored and the fires extinguished.

*Stefano Fiorenzani, Samuele Ravelli, Enrico Edoli*

## Overview

A quantitative reference for energy trading, covering the mathematical models behind pricing, hedging, and risk management of energy derivatives. More technical than Edwards\u2019 *Energy Trading & Investing* \u2014 this book is for analysts and quants who need the formulas. The treatment is rigorous but applied: every model is motivated by a real trading problem.

## Key Topics

### Storage Valuation

Storage (gas caverns, crude tanks, even virtual pipeline capacity) is one of the most valuable real options in energy. The book covers three approaches in increasing sophistication:

- **Intrinsic value**: The value based purely on the current forward curve. Identify the optimal injection/withdrawal schedule that maximizes the spread between buy (inject) and sell (withdraw) prices, subject to capacity and rate constraints. This is a linear programming problem. It gives the minimum value of storage \u2014 the guaranteed profit from the current curve shape.

- **Rolling intrinsic**: Re-optimize the dispatch monthly (or weekly) as the curve evolves. Each re-optimization captures incremental value from curve movements that weren\u2019t present at the initial valuation. In practice, rolling intrinsic captures 60\u201380% of the full extrinsic value with far less model risk.

- **Extrinsic (option) value**: Storage is a real option \u2014 the right to inject or withdraw at any time within physical constraints. This optionality has value above intrinsic because you can react to future price changes. Valued using:
  - **Trinomial/binomial trees**: Discretize the price process and solve backwards from expiry. Handles injection/withdrawal constraints well.
  - **Least-squares Monte Carlo (Longstaff-Schwartz)**: Simulate thousands of price paths, regress continuation values, and determine optimal exercise at each node. More flexible for multi-factor models.
  - **Stochastic dynamic programming**: The theoretically optimal approach but computationally expensive for realistic multi-factor models with constraints.

**Practical insight**: The intrinsic-extrinsic split matters for how storage is monetized. Physical storage operators capture intrinsic at inception (locking in the curve spread) and then trade the extrinsic by adjusting dispatch as the market moves. Financial traders who buy storage capacity in auctions must pay a premium that reflects the market\u2019s estimate of full (intrinsic + extrinsic) value.

### Energy Price Modeling

The book covers the key stochastic models used for energy derivative pricing:

- **One-factor mean-reverting models (Schwartz 1997)**: Price follows an Ornstein-Uhlenbeck process \u2014 it reverts to a long-run mean with random shocks. Good for gas and power where mean-reversion is strong. Parameters: mean-reversion speed (\u03ba), long-run mean (\u03bc), volatility (\u03c3). Calibrate to the current forward curve and options market.

- **Two-factor models (Schwartz-Smith 2000)**: Decompose the price into a short-term mean-reverting component and a long-term random-walk component. The short-term component captures seasonal deviations and temporary supply/demand shocks. The long-term component captures structural shifts (technology, regulation, demand trends). Superior for pricing calendar spreads and long-dated options.

- **Jump-diffusion models**: Add discrete jumps to capture the spikes common in power and gas (Winter Storm Uri, polar vortex events). Jumps are modeled as a Poisson process with random jump size. Essential for pricing OTM options in power markets where 5\u201310x intraday price spikes occur.

- **Multi-factor models with seasonality**: Add deterministic seasonal functions to the drift term. Gas prices have strong seasonal patterns (winter premium) that must be modeled explicitly. The seasonal function is typically fitted using Fourier series or monthly dummy variables.

### Seasonal Spread Modeling

- Gas seasonal spreads (e.g., winter/summer) modeled as mean-reverting processes with seasonal drift. The mean-reversion reflects the physical storage constraint: the spread cannot exceed the cost of carry (injection + storage + withdrawal) for long, because arbitrageurs inject gas until the spread compresses.
- **Calibration**: Fit the mean-reversion speed, volatility, and seasonal function to historical spread data. Use the last 5\u201310 years but weight recent data more heavily (structural changes in LNG exports, shale gas growth).
- **Optimal entry/exit thresholds**: For a mean-reverting spread, the optimal strategy is to enter when the spread deviates >1.5\u20132.0 standard deviations from its seasonal mean and exit when it returns to the mean. The book derives the exact thresholds using the Hamilton-Jacobi-Bellman equation for the optimal stopping problem.
- **Connection to storage value**: The seasonal spread is the financial expression of storage economics. A wide winter/summer spread = profitable storage injection. The spread fair value should approximate: intrinsic storage value + time value of the storage option.

### Forward Curve Construction

Building a consistent forward curve from market data is harder than it looks:

- **Liquid points**: Front 2\u20133 months, Cal strips, and seasonal strips have direct market quotes. These anchor the curve.
- **Illiquid gaps**: Many intermediate months have no liquid quotes. The book covers interpolation methods:
  - **Piecewise linear**: Simple, preserves market quotes exactly, but creates unrealistic kinks
  - **Cubic spline**: Smooth, but can introduce oscillations between data points
  - **Maximum smoothness**: Minimizes the integral of squared second derivatives while fitting market quotes. Produces the most "natural" looking curve.
  - **Arbitrage-free constraints**: The curve must not create negative calendar spreads where storage costs would make them impossible (no-arbitrage condition).
- **Shaping with seasonality**: For gas, apply a seasonal shape function derived from historical patterns, then shift/scale to match current liquid quotes.

### Swing and Tolling Contracts

**Swing contracts** are common in physical gas supply agreements:
- The buyer has the right (but not obligation) to take daily volumes within a range, e.g., 50\u2013150% of the base daily contract quantity (DCQ).
- Annual take-or-pay: must take at least 80\u201390% of the annual contract quantity (ACQ) or pay for it anyway.
- This flexibility is a strip of daily options. Valued by simulating price paths and optimizing the exercise strategy subject to the min/max daily and annual constraints.
- **Key insight**: Swing value increases with price volatility (more option value) and with the width of the min-max range (more flexibility).

**Tolling agreements** give the holder the right to convert gas into power at a specific plant:
- Economically equivalent to a strip of spark spread call options, one for each hour of the tolling period.
- The \u201cstrike\u201d of each hourly option is the gas cost at the plant\u2019s heat rate plus variable O&M costs.
- Valued using multi-factor models of gas price and power price (which are correlated but not perfectly).
- **Virtual power plant (VPP)**: A financial tolling agreement without physical plant ownership. Traded OTC between banks and utilities.

### Risk Metrics for Energy Portfolios

Standard financial risk metrics need adaptation for energy:

- **VaR with fat tails**: Energy returns have kurtosis of 5\u201315 (normal = 3). The book recommends historical simulation or EVT (Extreme Value Theory) over parametric VaR. EVT fits a generalized Pareto distribution to the tail of the return distribution, providing more accurate estimates of extreme losses.

- **Greeks across the forward curve**: In energy, delta is not a single number \u2014 it\u2019s a vector of sensitivities to each contract month on the curve. A storage position has positive delta for injection months and negative delta for withdrawal months. Managing the "delta profile" (the shape of sensitivities across the curve) is a core skill for energy options traders.

- **Correlation risk**: The book quantifies how correlations between energy commodities (crude/gas, gas/power, crude/products) change in stress regimes. A copula-based approach captures the fact that correlations increase during crises (tail dependence), which standard correlation matrices miss.

- **Scenario-weighted VaR**: Instead of equal-weighting all historical scenarios, weight recent and stress-period scenarios more heavily. This is more responsive to regime changes than standard historical VaR.

## How to Use This Book

This is a **reference**, not a cover-to-cover read. Use it when you need:
- The mathematical framework for valuing storage, swing, or tolling contracts
- Stochastic models for energy price dynamics (mean-reverting, jump-diffusion, multi-factor)
- Quantitative methods for forward curve construction and arbitrage-free shaping
- Risk models specifically designed for energy (fat-tailed VaR, curve-level Greeks, correlation stress)
- Calibration techniques for mean-reverting energy price models
- Optimal trading rules (entry/exit thresholds) for seasonal spread strategies

|---------|-------------------|-------|

let currentLang = 'en';
try { const l = localStorage.getItem('lang'); if (l === 'zh') currentLang = 'zh'; } catch(e) {}

function t(key) {
  return (I18N[currentLang] && I18N[currentLang][key]) || I18N.en[key] || key;
}

// Chinese translations for lesson/source content
// Loaded from translations.js when available
const MODULES_ZH = (typeof MODULES_ZH_DATA !== 'undefined') ? MODULES_ZH_DATA : {};
const SOURCES_ZH = (typeof SOURCES_ZH_DATA !== 'undefined') ? SOURCES_ZH_DATA : {};
const GLOSSARY_MAP = (typeof GLOSSARY !== 'undefined') ? GLOSSARY : {};

// Pre-build glossary regex (longest terms first to prefer longer matches)
const _glossaryTerms = Object.keys(GLOSSARY_MAP).sort((a, b) => b.length - a.length);
const _escapeRe = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
const _glossaryPattern = _glossaryTerms.length > 0 ? new RegExp(
  '(' + _glossaryTerms.map(t => {
    const esc = _escapeRe(t);
    const sb = /[A-Za-z0-9]/.test(t[0]) ? '\\b' : '';
    const eb = /[A-Za-z0-9]/.test(t[t.length - 1]) ? '\\b' : '';
    return sb + esc + eb;
  }).join('|') + ')',
  'g'
) : null;

function annotateGlossary(rootElement) {
  if (!_glossaryPattern) return;

  function walk(node) {
    if (node.nodeType === 3) { // TEXT_NODE
      const text = node.nodeValue;
      _glossaryPattern.lastIndex = 0;
      if (!_glossaryPattern.test(text)) return;
      _glossaryPattern.lastIndex = 0;

      const frag = document.createDocumentFragment();
      let lastIdx = 0;
      let match;
      while ((match = _glossaryPattern.exec(text)) !== null) {
        const term = match[0];
        const def = GLOSSARY_MAP[term];
        if (!def) continue;

        if (match.index > lastIdx) {
          frag.appendChild(document.createTextNode(text.substring(lastIdx, match.index)));
        }
        const span = document.createElement('span');
        span.className = 'glossary';
        span.setAttribute('tabindex', '0');
        span.textContent = term;
        span.setAttribute('data-tooltip', def[currentLang] || def.en);
        frag.appendChild(span);
        lastIdx = match.index + term.length;
      }
      if (lastIdx > 0) {
        if (lastIdx < text.length) {
          frag.appendChild(document.createTextNode(text.substring(lastIdx)));
        }
        node.parentNode.replaceChild(frag, node);
      }
    } else if (node.nodeType === 1) { // ELEMENT_NODE
      const tag = node.tagName;
      if (tag === 'CODE' || tag === 'PRE' || tag === 'A' || tag === 'SCRIPT' || tag === 'STYLE' || tag === 'SVG') return;
      if (node.classList && node.classList.contains('glossary')) return;
      const children = Array.from(node.childNodes);
      children.forEach(walk);
    }
  }
  walk(rootElement);
}

function render() {
  renderSidebar();

  if (currentView === 'home') {
    renderHome();
  } else if (currentView === 'dashboard') {
    renderDashboard();
  } else {
    let content;
    if (currentView === 'module') {
      const m = MODULES[currentModule];
      content = (currentLang === 'zh' && MODULES_ZH[m.id]) ? MODULES_ZH[m.id] : m.lesson;
    } else {
      const s = SOURCES[currentSource];
      content = (currentLang === 'zh' && SOURCES_ZH[s.id]) ? SOURCES_ZH[s.id] : s.content;
    }
    // Escape single tildes so marked doesn't treat "(~60%" as strikethrough
    const safeContent = content.replace(/~/g, '&#126;');
    const lessonView = document.getElementById('lessonView');
    lessonView.innerHTML = marked.parse(safeContent);
    annotateGlossary(lessonView);

    document.querySelectorAll('.content-area a.source-link').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const id = a.dataset.source;
        const idx = SOURCES.findIndex(s => s.id === id);
        if (idx !== -1) { currentView = 'source'; currentSource = idx; render(); }
      });
    });

    if (currentView === 'module') {
      const nav = document.createElement('div');
      nav.className = 'module-nav';
      const prevIdx = currentModule - 1;
      const nextIdx = currentModule + 1;

      if (prevIdx >= 0) {
        const prev = MODULES[prevIdx];
        const btn = document.createElement('div');
        btn.className = 'module-nav-btn prev';
        btn.innerHTML = `<div class="module-nav-label">\u2190 ${t('prev')}</div><div class="module-nav-title">${t('m_' + prev.id) || prev.name}</div>`;
        btn.onclick = () => { currentModule = prevIdx; render(); };
        nav.appendChild(btn);
      }
      if (nextIdx < MODULES.length) {
        const next = MODULES[nextIdx];
        const btn = document.createElement('div');
        btn.className = 'module-nav-btn next';
        btn.innerHTML = `<div class="module-nav-label">${t('next')} \u2192</div><div class="module-nav-title">${t('m_' + next.id) || next.name}</div>`;
        btn.onclick = () => { currentModule = nextIdx; render(); };
        nav.appendChild(btn);
      }
      if (nav.children.length) lessonView.appendChild(nav);
    }
  }

  applyFontSize();
  document.getElementById('contentScroll').scrollTop = 0;
}

  h += `<div class="dash-subtitle">${t('morningDashSubtitle')}</div>`;

  // Panel 1: Prices
  h += `<div class="dash-panel"><div class="dash-panel-title">${t('prices')}</div><div class="dash-grid">`;
  C.prices.forEach(f => {
    h += `<div class="dash-input-group">
      <label>${f.label} <span>${f.unit}</span></label>
      <input type="number" step="0.01" data-key="${f.key}" placeholder="${f.placeholder}">
    </div>`;
  });
  h += '</div></div>';

  // Panel 2: Spreads
  h += `<div class="dash-panel"><div class="dash-panel-title">${t('computedSpreads')}</div>`;
  C.spreads.forEach((s, i) => {
    h += `<div class="dash-spread-row">
      <span class="dash-spread-label">${s.label}</span>
      <span class="dash-spread-value" id="sv-${i}">\u2014</span>
      <span class="dash-indicator neutral" id="si-${i}">\u2014</span>
    </div>`;
  });
  h += '</div>';

  // Panel 3: Inventories
  h += `<div class="dash-panel"><div class="dash-panel-title">${t('inventories')}</div>`;
  C.inventories.forEach(inv => {
    h += `<div class="dash-inv-row">
      <label>${t('inv_' + inv.key)}</label>
      <input type="number" step="${inv.step}" data-key="${inv.key}" placeholder="${inv.placeholder}">
      <span class="dash-unit">${inv.unit}</span>
      <span class="dash-indicator neutral" id="ii-${inv.key}">\u2014</span>
    </div>`;
  });
  h += '</div>';

  // Panel 4: Events
  h += `<div class="dash-panel"><div class="dash-panel-title">${t('keyEvents')}</div>`;
  C.events.forEach(ev => {
    const timeStr = ev.time ? ev.time + ' \u2014 ' : '';
    h += `<div class="dash-event-row">
      <span class="dash-event-day">${t(ev.daykey)}</span>
      <span class="dash-event-desc">${timeStr}${t(ev.desckey)}</span>
    </div>`;
  });
  h += '</div>';

  // Panel 5: Checklist (full width)
  h += `<div class="dash-panel" style="grid-column:1/-1"><div class="dash-panel-title">${t('morningChecklist')}</div><div class="dash-checklist">`;
  C.checklist.forEach((clkey, i) => {
    const checked = dashboardState['_chk_' + i] ? ' checked' : '';
    h += `<label><input type="checkbox" data-chk="${i}"${checked}><span>${t(clkey)}</span></label>`;
  });
  h += '</div></div>';

  // Timestamp
  h += `<div class="dash-timestamp" style="grid-column:1/-1">${t('lastUpdated')}: <span id="dashTs">` +
    (dashboardState._ts || '\u2014') + '</span></div>';

  h += '</div>';

  document.getElementById('lessonView').innerHTML = h;

  // Restore saved values
  document.querySelectorAll('.dashboard input[type="number"]').forEach(inp => {
    const key = inp.dataset.key;
    if (dashboardState[key] !== undefined) inp.value = dashboardState[key];
  });

  // Attach input listeners (delegated)
  const dashEl = document.querySelector('.dashboard');
  dashEl.addEventListener('input', (e) => {
    const inp = e.target;
    if (inp.type === 'number' && inp.dataset.key) {
      dashboardState[inp.dataset.key] = inp.value;
      recalcDashboard();
    }
    if (inp.type === 'checkbox' && inp.dataset.chk !== undefined) {
      dashboardState['_chk_' + inp.dataset.chk] = inp.checked;
      saveDashState();
    }
  });

  recalcDashboard();
}

function recalcDashboard() {
  const C = DASHBOARD_CONFIG;

  // Gather prices
  const p = {};
  C.prices.forEach(f => { p[f.key] = parseFloat(dashboardState[f.key]) || 0; });

  // Compute spreads
  C.spreads.forEach((s, i) => {
    const valEl = document.getElementById('sv-' + i);
    const indEl = document.getElementById('si-' + i);
    if (!valEl) return;

    const hasInputs = s.needs.every(k => p[k] !== 0);
    if (!hasInputs) {
      valEl.textContent = '\u2014';
      indEl.textContent = '\u2014';
      indEl.className = 'dash-indicator neutral';
      return;
    }

    const val = s.calc(p);
    valEl.textContent = (val >= 0 ? '+' : '') + val.toFixed(s.dp) + ' ' + s.unit;

    if (val < s.thresholds.bearishBelow) {
      indEl.textContent = t('bearish'); indEl.className = 'dash-indicator bearish';
    } else if (val > s.thresholds.bullishAbove) {
      indEl.textContent = t('bullish'); indEl.className = 'dash-indicator bullish';
    } else {
      indEl.textContent = t('neutral'); indEl.className = 'dash-indicator neutral';
    }
  });

  // Inventory indicators
  C.inventories.forEach(inv => {
    const val = parseFloat(dashboardState[inv.key]);
    const indEl = document.getElementById('ii-' + inv.key);
    if (!indEl) return;
    if (isNaN(val)) {
      indEl.textContent = '\u2014'; indEl.className = 'dash-indicator neutral'; return;
    }
    if (inv.thresholds.bearishAbove !== undefined && val > inv.thresholds.bearishAbove) {
      indEl.textContent = t('bearish'); indEl.className = 'dash-indicator bearish';
    } else if (inv.thresholds.bullishBelow !== undefined && val < inv.thresholds.bullishBelow) {
      indEl.textContent = t('bullish'); indEl.className = 'dash-indicator bullish';
    } else {
      indEl.textContent = t('neutral'); indEl.className = 'dash-indicator neutral';
    }
  });

  // Update timestamp
  const now = new Date();
  const ts = now.toLocaleDateString('en-US', {month:'short',day:'numeric'}) + ' ' +
    now.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'});
  dashboardState._ts = ts;
  const tsEl = document.getElementById('dashTs');
  if (tsEl) tsEl.textContent = ts;

  saveDashState();
}

function saveDashState() {
  try { localStorage.setItem('dashState', JSON.stringify(dashboardState)); } catch(e) {}
}

function openSidebar() {
  // On desktop with hidden sidebar, show it; on mobile, slide it in
  if (window.innerWidth > 640) {
    document.querySelector('.app').classList.remove('sidebar-hidden');
    try { localStorage.setItem('sidebarHidden', '0'); } catch(e) {}
  } else {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('mobileOverlay').classList.add('show');
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('show');
}

function hideSidebar() {
  // Desktop-only: collapse sidebar
  document.querySelector('.app').classList.add('sidebar-hidden');
  try { localStorage.setItem('sidebarHidden', '1'); } catch(e) {}
}

const FONT_SIZES = ['sm', 'md', 'lg'];
const FONT_LABELS = { sm: 'A', md: 'A\u207a', lg: 'A\u207a\u207a' };
let currentFontSize = 'sm';
try { const f = localStorage.getItem('fontSize'); if (FONT_SIZES.includes(f)) currentFontSize = f; } catch(e) {}

function applyFontSize() {
  const el = document.getElementById('lessonView');
  if (!el) return;
  el.classList.remove('font-md', 'font-lg');
  if (currentFontSize === 'md') el.classList.add('font-md');
  else if (currentFontSize === 'lg') el.classList.add('font-lg');
  const btn = document.getElementById('fontToggle');
  if (btn) btn.textContent = FONT_LABELS[currentFontSize];
}

function cycleFontSize() {
  const i = FONT_SIZES.indexOf(currentFontSize);
  currentFontSize = FONT_SIZES[(i + 1) % FONT_SIZES.length];
  try { localStorage.setItem('fontSize', currentFontSize); } catch(e) {}
  applyFontSize();
}

    document.querySelector('.app').classList.add('sidebar-hidden');
  }
} catch(e) {}
render();
