| Mar 2022 Russia-Ukraine | 2 weeks | Brent $90→$130 | TTF €100→€220 | Diesel $60+ crack | EU power €300+ | Geopolitical supply shock |

**For each scenario, calculate**:
1. **P&L impact**: Reprice every position using the historical stress moves
2. **Margin calls**: Would your margin call exceed available cash? If yes, you'd be forced to liquidate at the worst time
3. **Correlation breakdown**: Which positions that were "hedged" would fail to hedge? (WTI-Brent during the WTI negative event, gas-power during Uri)
4. **Liquidity**: Could you actually exit? During April 2020, WTI front-month liquidity dried up. During Uri, gas basis points were untradeable. If you can't exit, your mark-to-market loss could be the actual loss.

### Hypothetical Stress Scenarios

Build forward-looking scenarios that haven't happened yet:

- **Strait of Hormuz closure**: Brent +$30-50, gas +$5-10, products +$20-30, tanker rates 5x. Duration: weeks to months.
- **US strategic petroleum reserve release (500M bbl)**: WTI -$15-20 over months. Front-end contango.
- **ERCOT summer blackout**: ERCOT power to $5,000+, gas basis spikes, rolling blackouts. Duration: days.
- **Global recession**: Crude -40%, gas -30%, cracks -50% initially then recovery. Duration: 6-12 months.

## The Greeks in Energy Context

### Delta Management

Net portfolio delta = your total directional crude exposure, expressed in barrels-equivalent. Sum the deltas from all positions: outright futures + spread legs + option deltas.

\`\`\`
Portfolio:
Long 50 WTI = +50,000 bbl delta
Short 30 Brent = -30,000 bbl delta
Long 20 gasoline cracks (= short 20 CL) = -20,000 bbl crude delta
Long 10 WTI $85 calls (delta = 0.35) = +3,500 bbl delta

Net crude delta = +50,000 - 30,000 - 20,000 + 3,500 = +3,500 bbl
→ Roughly flat. A $1/bbl move in crude costs ~$3,500.
\`\`\`

**Risk**: If you think you're hedged but your deltas are wrong, you have hidden directional exposure. Recalculate daily.

### Gamma Risk — Where Blowups Happen

Gamma is the rate of change of delta. It is highest for near-expiry, at-the-money options. Short gamma positions lose money on large moves in either direction and are the mechanism behind many energy blowups.

\`\`\`
You sold 100 WTI $80 puts expiring in 3 days. WTI at $80.50.
Delta: ~-0.45 per contract → position delta: +45,000 bbl (you're long from the short puts)
Gamma: 0.08 per $1 move

WTI drops $2 to $78.50:
New delta: -0.45 - (0.08 × 2 × 100) = now you're short ~61,000 bbl equivalent
The puts are now ITM and you owe $2.00 × 100 × 1,000 = $200,000 in intrinsic value
Plus you need to adjust your hedge → buying 16,000 bbl of delta at worse prices

Short gamma near expiry in energy is a widow-maker. The speed of energy price moves
near binary events (EIA report, OPEC) can make gamma hedging impossible.
\`\`\`

### Vega — Seasonal Opportunities

Energy implied volatility has strong seasonal patterns:
- **Winter gas IV**: 50-70% (high uncertainty about heating demand)
- **Summer gas IV**: 25-40% (more predictable demand)
- **Hurricane season crude IV**: Elevated June-November
- **OPEC meeting windows**: IV spikes 1-2 weeks ahead, crushes after

**Vega trade**: In April, buy Jan gas straddles (high vega) when winter IV is at its seasonal low. As October approaches and winter uncertainty increases, winter IV rises. Sell the straddle. You profited from the seasonal IV increase without needing the price to move.

## Correlation Risk — The #1 Killer of Spread Traders

### Why Correlations Break

Spread trading assumes that the two legs of the spread move together (high correlation). The spread P&L comes from the small divergence between them. But in crises, correlations break down:

**WTI vs. Brent (normal ρ ≈ 0.95)**:
- April 2020: WTI went negative while Brent stayed at $20+. The stress was specific to WTI's Cushing delivery point. A long WTI/short Brent spread lost $55+/bbl.
- A trader who sized the WTI-Brent spread assuming ρ = 0.95 (low spread vol) would have been ruined.

**Gas vs. Power (normal ρ ≈ 0.80-0.90)**:
- Winter Storm Uri: Gas spiked to $23 but power spiked to $9,000. A short power/long gas spark spread that was "hedged" lost $8,970/MWh because power moved 400x more than gas.

**Adjacent month futures (normal ρ ≈ 0.99)**:
- Calendar spread between March and April gas: normally moves $0.05-0.20/day. The Widowmaker can move $1.00+/day during winter weather shifts. ρ drops from 0.99 to 0.85.

### Managing Correlation Risk

1. **Use recent correlation, not long-term**: A 5-year correlation of 0.95 is meaningless if the last 3 months show 0.80. Use 60-day rolling correlations.
2. **Stress-test with low correlation**: Ask "what happens if ρ drops to 0.50?" Size so that a correlation breakdown doesn't exceed your max loss tolerance.
3. **Diversify correlation exposure**: Don't have all your risk in one correlation assumption. If you are long WTI-Brent AND long LLS-WTI AND long WTI M1-M2, all three depend on WTI front-month stability.
4. **Use options for tail protection**: Buy cheap OTM puts or calls as insurance against correlation breakdown. The cost of protection is small relative to the tail loss.

## Liquidity Risk

### How to Measure It

| Metric | What It Tells You | Where to Find It |
|--------|-------------------|-----------------|
| Bid-ask spread | Cost to enter/exit | Exchange data, broker screens |
| Average daily volume (ADV) | How much trades daily | CME, ICE data |
| Open interest | Total outstanding positions | Exchange data |
| Your position / ADV | Days to exit at normal volumes | Calculate yourself |
| Market depth (Level 2) | Orders sitting in the book | Exchange data feeds |

**Rules of thumb**:
- **Position / ADV < 5%**: Comfortable. Can exit in 1 day with minimal impact.
- **Position / ADV = 5-20%**: You are a significant participant. Exit will move the market. Plan 2-5 days.
- **Position / ADV > 20%**: You ARE the market. Amaranth territory. Don't get here.

### Liquidity Across the Energy Curve

| Product | Front Month ADV | 6-Month Out | 12-Month Out | 24-Month Out |
|---------|----------------|-------------|--------------|--------------|
| WTI (CL) | ~900K contracts | ~100K | ~30K | ~5K |
| Henry Hub (NG) | ~350K | ~80K | ~20K | ~3K |
| RBOB (RB) | ~100K | ~20K | ~5K | <1K |
| ULSD (HO) | ~100K | ~20K | ~5K | <1K |

Back-month liquidity drops 90-99% from front-month. This means:
- Wider bid-ask spreads (cost more to trade)
- More market impact (your order moves the price)
- Harder to exit in a crisis (no one to buy from you)

**Size back-month positions based on back-month liquidity, not front-month.**

## Risk Limits — The Professional Framework

| Limit Type | Typical Level | Purpose | Who Enforces |
|------------|--------------|---------|--------------|
| Daily P&L stop | -$X (e.g., -$1M) | Stop trading after a bad day | Auto-enforced by risk system |
| Weekly P&L stop | -$X (e.g., -$2M) | Prevent compounding daily losses | Risk team |
| Drawdown limit | -5% triggers review, -10% shutdown | Protect capital | CRO/Management |
| Position limit per product | Max lots per contract month | Prevent concentration | Risk team |
| VaR limit | Max daily VaR (e.g., $5M at 95%) | Portfolio-level risk cap | Risk team |
| Concentration limit | No single trade > 20-25% of VaR | Diversification mandate | Risk team/PM |
| Gross notional limit | Max total long + short notional | Prevent excess leverage | Risk team |
| Delta limit | Max net directional exposure | Control flat-price risk | PM + risk team |

### The Drawdown Trigger Mechanism

At multi-strategy funds, the drawdown trigger is the most consequential risk limit:

\`\`\`
Peak NAV: $500M
-3% ($485M): PM gets a call from risk team. "What's going on? Do you need to reduce?"
-5% ($475M): Risk budget cut 25-50%. PM must reduce positions. On formal watch.
-7% ($465M): Risk budget cut 50-75%. Only defensive trades allowed.
-10% ($450M): Pod SHUT DOWN. All positions liquidated. PM may be terminated.
\`\`\`

The survival game at a multi-strat is: **never hit -10%**. This means:
- Size so that a 3-sigma day costs <2% of capital
- Diversify across 15-30 uncorrelated positions
- Have exit plans for every position before entry
- Cut losers at predefined stops, don't "hope"

## The Amaranth Case Study — In Full

### The Setup

Amaranth Advisors was a $9.2 billion multi-strategy hedge fund. Trader Brian Hunter, age 32, ran the natural gas book from Calgary. In 2005, Hunter made $1 billion for the fund (mainly from Hurricane Katrina-related gas trades), earning a personal payout of ~$75 million.

### The Trade

Hunter was massively long winter natural gas calendar spreads:
- Long March 2007 and March 2008 gas futures
- Short April and summer 2007/2008 gas futures
- The trade: winter gas will be expensive relative to summer (curve will steepen)

The position was enormous: ~100,000 NYMEX contracts (~1 Tcf notional). This was **30-40% of total Henry Hub open interest for some months**. The market knew the position existed and who held it.

### The Collapse

In September 2006, three things went wrong simultaneously:

1. **Weather forecasts turned warm**: Mild winter forecasts reduced the winter premium → winter/summer spreads narrowed
2. **Natural gas production was rising**: Shale gas (early Haynesville/Barnett) was adding supply → long-term bearish for winter scarcity
3. **Amaranth tried to exit but couldn't**: Their position was so large relative to market liquidity that every attempt to sell pushed prices further against them. The market moved to extract maximum pain.

### The Numbers

- **September 1-6**: Lost ~$560 million as spreads narrowed
- **September 7-14**: Lost another ~$2 billion trying to exit
- **September 15-21**: Transferred remaining positions to JP Morgan and Citadel at fire-sale prices. Additional ~$3 billion loss.
- **Total loss**: ~$6.6 billion in 3 weeks
- **Fund's remaining NAV**: ~$3 billion (from $9.2B). Fund shut down within weeks.

### The Lessons (Burned Into Every Energy Risk Manager's Memory)

1. **Position size relative to market liquidity, not portfolio size**: Amaranth's position was 30-40% of open interest. If you need 5+ days to exit at full size, you are too big. Rule: your position should be <5% of ADV for comfortable exit.

2. **Calendar spreads are NOT low risk**: Low exchange margin tempted Amaranth into massive notional. Margin of ~$1,000 per spread × 100,000 spreads = $100M margin, but the spread moved $2-5/MMBtu × 100,000 × 10,000 = $2-5 BILLION loss.

3. **Concentrated positions create existential risk**: All of Amaranth's gas risk was in one trade structure (winter/summer calendar spreads). A diversified book of 20+ uncorrelated spread positions across crude, gas, products, and power would have limited the damage.

4. **Risk limits must be enforced**: Amaranth's risk team reportedly flagged the concentration but was overruled by the PM's profitability. When a trader is making $1 billion, it is hard to tell them to cut size. Risk teams must have authority to force reductions, independent of PM objections.

5. **Past success is the most dangerous input**: Hunter made $1B in 2005 from a similar trade (Katrina-driven gas spike). This confirmed his bias that winter gas always pays. He sized 2006 based on 2005's success. The market doesn't repeat.

## The Metallgesellschaft Case — Hedging Gone Wrong

In 1993, Metallgesellschaft AG's US subsidiary (MG Refining & Marketing) lost $1.3 billion on oil hedging:

**The trade**: MGRM sold long-term fixed-price oil contracts to customers (5-10 year delivery). To hedge, they bought rolling front-month futures (a "stack-and-roll" hedge). The idea: roll the long front-month position each month, maintaining the hedge.

**What went wrong**: Oil prices fell in 1993. The long futures hedge lost money immediately (mark-to-market losses). But the long-term fixed-price customer contracts gained in value — the customers were locked in at above-market prices. The problem: the gains were unrealized (delivered over 5-10 years), while the losses were immediate cash margin calls.

**The liquidity mismatch**: MGRM faced $900M+ in margin calls from exchange-traded futures losses. The parent company panicked and liquidated the entire position — crystallizing losses. Had they held and continued rolling, the hedge would have worked over the full contract life.

**Lesson**: Cash flow mismatch kills. A hedge can be economically correct but operationally fatal if you cannot fund the margin calls. Treasury and liquidity management are as important as the hedge itself.

## How Energy Hedge Funds Operate

### Fund Types

**Macro/Directional** (e.g., Andurand Capital, Westbeck Capital):
Large directional bets on commodity prices. Pierre Andurand made hundreds of millions in 2022 being long crude ahead of Russia-Ukraine. Annual return volatility: 30-60%. Can be up 100%+ or down 50%+ in a year. Sharpe: 0.5-1.5. These funds live and die by the PM's conviction and timing. Team: typically small (PM + 2-5 analysts). AUM: $500M-5B.

**Relative Value / Spread** (e.g., Citadel commodities, Millennium pods, Balyasny):
Trade mispricings between related instruments — crack spreads, calendar spreads, basis, inter-commodity. Steadier returns, higher Sharpe (1.5-3.0+), smaller drawdowns. This is where most institutional energy capital sits and where most of the jobs are. The bread-and-butter: 20-50 concurrent spread positions, actively managed. Team: PM + 1-3 analysts per pod.

**Systematic/Quant** (e.g., Millennium quant pods, AHL/Man Group, Two Sigma):
Algorithmic strategies using statistical models, trend-following, mean-reversion, or ML. Edge is speed, data processing, and discipline. Lower per-trade conviction but higher trade frequency. Sharpe: 1.0-2.5. Growing demand for quant talent in energy. Team: PM + quant researchers + engineers.

**Physical/Commercial** (e.g., Freepoint, Castleton, Hartree, Gunvor):
Trade physical cargoes and optimize logistics using financial derivatives to hedge. Owning or leasing storage, pipeline capacity, or terminal access creates real options — the right (but not obligation) to move, store, or blend physical commodities. These real options have measurable value. Historical Sharpe: 2.0+. Edge is physical infrastructure and operational knowledge.

**Multi-Strategy Pod Model** (e.g., Citadel, Millennium, Balyasny, Point72):
The dominant institutional model. Fund is organized into semi-independent "pods," each run by a PM with a dedicated analyst team and risk budget. Energy is one vertical among many (alongside equities, rates, credit, macro). PMs are compensated 15-20% of their net P&L above a hurdle. The fund provides capital, risk management, technology, and operational infrastructure. Fund-level Sharpe: 2.0-4.0+ (through diversification across pods).

### The Pod Structure In Detail

**Portfolio Manager (PM)**: The decision-maker. Runs the book, sizes positions, approves all trades. Typically 5-15 years of experience. Started as an analyst, progressed to junior trader, then PM. Compensation: 15-20% of net P&L (pass-through). A PM making $30M in a year takes home $4.5-6M. A PM losing money takes home base salary (~$200-400K) and is at risk of pod shutdown.

**Analysts (1-3 per pod)**: Build and maintain S/D balance models, monitor inventory data, maintain spread models, produce trade memos, run quant screens. **This is the most common entry point for new hires.** An analyst who demonstrates good trade ideas and risk awareness can progress to co-PM or launch their own pod in 3-5 years. Compensation (junior): $150-250K total (base + bonus). Senior analyst: $300-600K.

**Risk budget**: Expressed as a VaR limit (e.g., $50M in 95% daily VaR) or gross notional limit. PM deploys this budget across any energy trades they choose. The risk team monitors utilization in real-time.

**Independent risk team**: Reports to the CRO, NOT the PM. Monitors positions real-time, enforces limits, runs stress tests. Can force position reductions — PM cannot override. This independence is critical: the risk team's job is to protect the fund from individual PMs, including the most profitable ones.

**Drawdown triggers**: The ruthlessly Darwinian mechanism:
- **-3% from peak**: Informal discussion. "What's going on?"
- **-5% from peak**: On formal watch. Risk budget may be cut 25-50%.
- **-7% from peak**: Risk budget cut 50-75%. Only defensive/reducing trades.
- **-10% from peak**: Pod is SHUT DOWN. All positions liquidated. PM may be terminated.

The -10% hard stop means: if you start with $500M in capital, losing $50M ends your pod. Given that a normal position might have a daily VaR of $2-5M, a bad 2-week stretch can put you in danger. This is why diversification and stop discipline are existential — not just good practice.

\`\`\`

Good year:

Fixed costs (salaries, data, technology): ~$3-5M/year

## Idea Generation — The 4 Pillars

### Pillar 1: Fundamental Analysis

Every trade should be grounded in a supply/demand thesis. The goal is to build a more accurate S/D balance than the market consensus.

**Crude oil S/D balance framework**:
\`\`\`
Supply:
  OPEC crude production        ~27.0 M bbl/d
  OPEC+ allies (Russia, etc.)  ~13.5 M bbl/d
  US crude                     ~13.6 M bbl/d
  Other non-OPEC               ~17.5 M bbl/d
  Processing gains              ~2.5 M bbl/d
  TOTAL SUPPLY                 ~74.1 M bbl/d (crude only)

Demand:
  OECD (US, Europe, Japan, etc.)  ~46.0 M bbl/d
  China                           ~16.5 M bbl/d
  India                            ~5.5 M bbl/d
  Other non-OECD                  ~35.0 M bbl/d
  TOTAL DEMAND                   ~103.0 M bbl/d (total liquids)

Note: Supply includes NGLs, biofuels, and other liquids to get to ~103 M bbl/d total.

Implied stock change = Supply - Demand
If supply > demand → inventory builds → bearish
If demand > supply → inventory draws → bullish

Your edge: a better estimate of any one of these components than the market.
\`\`\`

**Key data sources for fundamental analysis**:
- **EIA Weekly Petroleum Status** (Wed 10:30 ET): US crude, gasoline, distillate inventories, refinery utilization, imports, exports. The single most market-moving energy report.
- **EIA Thursday Gas Storage** (Thu 10:30 ET): Weekly gas storage change. Build your own model to estimate ahead of the report.
- **Baker Hughes Rig Count** (Fri 1:00 ET): Leading indicator of US shale production (6-month lag).
- **IEA Monthly Oil Market Report** (~15th): Most respected independent global S/D analysis.
- **OPEC Monthly Report** (~12th): OPEC's own view. Tends to be more optimistic on demand.
- **Kpler/Vortexa** (real-time): Satellite-tracked tanker and cargo flows. See physical trade as it happens.
- **IIR Energy** (subscription): Refinery turnaround schedules. Know exactly which units are offline.

### Pillar 2: Quantitative Screens

Systematic screening identifies where spreads are statistically anomalous relative to history.

**Z-score screen**:
\`\`\`
For each spread in your universe (50-100 spreads across crude, gas, products, power):
1. Calculate the 60-day rolling mean and standard deviation
2. Compute z-score = (current - mean) / std
3. Flag any spread with |z| > 1.5

Result: a daily list of "extreme" spreads that warrant fundamental investigation.
Warning: a spread at z = +2.5 may be extreme for a REASON (structural change).
Always check fundamentals before trading a quant signal.
\`\`\`

**Seasonal deviation screen**:
\`\`\`
For each spread:
1. Calculate the 10-year average level for this week of year
2. Calculate the 10-year standard deviation for this week of year
3. Compute: current level vs. seasonal average
4. Flag spreads 1.5+ std devs from seasonal average

Example:
3:2:1 crack, Week 15 (mid-April):
10yr average: $30/bbl
10yr std dev: $8/bbl
Current: $22/bbl
Deviation: -1.0 std devs (mildly cheap but not extreme)
→ Watch list, not an immediate trade
\`\`\`

**Regression residual screen**:
\`\`\`
Run regression: Crack = f(utilization, gasoline deficit, VIX)
Model says fair value: $28
Actual: $22
Residual: -$6 (crack is $6 cheap vs. model)
→ If the model is correctly specified, this is a buy signal
→ Check: has a structural change (new refinery capacity, demand shift) invalidated the model?
\`\`\`

### Pillar 3: Event-Driven Catalysts

**OPEC+ meetings**: The most important scheduled event for crude. Pre-meeting, develop 3 scenarios:
1. Base case (what consensus expects) → no trade
2. Hawkish surprise (deeper cut or extended timeline) → long crude, long backwardation
3. Dovish surprise (smaller cut, compliance slippage, price war) → short crude, long contango

The trade = decision minus expectation. Position for the scenario you think is underpriced.

**EIA report trading**: Build your own estimate. If your model says -4M bbl crude draw and consensus says -1.5M, you have a directional signal going into the report.

**Weather model shifts**: GFS and ECMWF run 4x daily (00Z, 06Z, 12Z, 18Z). A cold-to-warm shift in the 8-14 day forecast kills gas and power prices. A warm-to-cold shift rallies them. The key: be early to the model shift. The first run showing a new pattern moves gas $0.10-0.20. By the third confirming run, the move is priced.

### Pillar 4: Market Microstructure

**Options market signals**:
- **Skew**: If WTI call skew (OTM calls expensive relative to puts) is at 1-year highs, the market is pricing upside tail risk. Ask why.
- **Put/call ratio**: Extreme put buying (ratio > 1.5) = hedging/fear. Can signal a local bottom if fundamentals are neutral.
- **Implied vol term structure**: If 1-month IV is higher than 3-month IV (inverted term structure), the market expects a near-term event.

**Positioning (COT data)**:
- **Managed money net long at 90th+ percentile**: Market is crowded long. Vulnerable to liquidation cascade on bearish news. Not a timing tool — but if you have a bearish view, the crowded positioning amplifies the potential move.
- **Managed money net short at 10th percentile**: Crowded short. Vulnerable to short squeeze. A bullish catalyst will move prices further than usual.

**Open interest by month**: A sudden surge in OI in a specific back month signals that a large player is building a position. Track daily changes.

## Portfolio Construction

### Diversification Principles

**Across time horizons**:
- **Tactical** (days to weeks): EIA report trades, weather model shifts, OPEC positioning. High turnover, lower conviction per trade, many small bets.
- **Fundamental** (weeks to months): Crack spread seasonals, storage trajectory trades, basis infrastructure plays. Core book. Higher conviction, larger size.
- **Structural** (months to quarters): Energy transition themes, long-term S/D imbalances, regulatory regime changes. Smaller positions, long time to thesis realization.

**Across spread types**:
- Calendar spreads (5-10 positions): WTI prompt, gas winter/summer, seasonal rolls
- Crack spreads (3-5 positions): 3:2:1, gasoline vs. diesel, seasonal cracks
- Basis spreads (5-10 positions): WTI-Brent, Waha-HH, regional gas, crude differentials
- Inter-commodity (2-3 positions): Frac spread, LNG arb, gas-coal switching
- Directional (0-2 positions): Only with high conviction AND catalyst. Small relative to spread book.
- Options (2-5 positions): Vol trades, tail hedges, event-driven

**Correlation-aware sizing**: Two gasoline crack trades (Q2 and Q3) are highly correlated (~0.85). Treat them as one combined position for risk purposes. The portfolio VaR is NOT the sum of individual position VaRs — it is the correlation-weighted sum.

### The Carry vs. Convexity Balance

**Carry trades** provide steady positive P&L:
- Selling options premium (collect theta)
- Harvesting backwardation roll yield (long in backwardated markets)
- Calendar spreads that converge predictably

**Convex trades** provide asymmetric payoffs:
- Buying cheap OTM options before binary events
- Tail hedges (deep OTM puts on crash scenarios)
- Event-driven trades with large potential move and limited downside

**The right mix**: Carry trades fund the portfolio's day-to-day operations. Convex trades protect against tail events and generate outsized returns when the market surprises. A portfolio of only carry trades will be profitable 11 months and blow up in the 12th. A portfolio of only convex trades will bleed premium while waiting for the event. The ideal: 60-70% carry, 30-40% convex.

## Performance Measurement

| Metric | Target (RV/Spread) | Target (Directional) | Notes |
|--------|--------------------|--------------------|-------|
| Annual Return | 10-25% | 15-40%+ | Directional more volatile |
| Sharpe Ratio | 1.5-3.0 | 0.5-1.5 | Sharpe >2.0 = institutional quality |
| Max Drawdown | <8% | <20% | Pod hard stop at -10% |
| Win Rate | 52-60% | 45-55% | Higher for RV due to mean-reversion |
| Avg Win / Avg Loss | 1.2-1.8x | 1.5-3.0x | Directional needs bigger winners |
| Calmar Ratio | >2.0 | >1.0 | Return / max drawdown |
| Monthly Hit Rate | 70-80% positive months | 55-65% | Consistency matters for capital retention |

**P&L attribution**: Decompose returns into:
- **Alpha** (from spread selection and timing): the PM's skill
- **Beta** (from directional energy exposure): not skill — any index can do this
- **Carry** (from roll yield and time decay): structural, not timing-dependent
- **Volatility** (from options positions): vega and gamma P&L

Institutional allocators want alpha, not beta. A PM who returns 20% with 15% from directional crude exposure and 5% from alpha is less valuable than a PM who returns 12% with 10% from alpha.

## Breaking Into Energy Trading

### Entry Points (Ranked by Frequency)

**1. Analyst at energy trading fund** (most common):
- Role: Research, model building, trade idea generation
- Requires: Energy fundamentals knowledge, Python, Excel, ability to write trade memos
- Firms: Citadel, Millennium, Balyasny, Point72 (pod shops); Freepoint, Castleton, Hartree (physical/commercial); Andurand, Westbeck (directional)
- Comp (Y1): $150-250K total. Y3-5: $300-600K with good performance.
- Path: Analyst → Senior Analyst → Co-PM → PM (5-8 years)

**2. Physical trading trainee** (highest ceiling):
- Role: Learn to trade physical cargoes. Rotational programs through different desks.
- Firms: Vitol, Trafigura, Glencore, Gunvor, Mercuria, bp, Shell trading
- Requires: Strong academics, language skills (Mandarin, Spanish, Arabic are valued), personality fit (high energy, relationship-builder)

**3. Quant/developer at commodities fund**:
- Role: Build models, data infrastructure, signals, execution algorithms
- Requires: Python, C++, SQL, statistics, time series analysis, ML
- Firms: Citadel, Millennium, Two Sigma, AHL/Man Group, systematic energy shops
- Comp: Competitive with tech ($200-500K+). Lower ceiling than PM track but more stable.

**4. Sell-side energy research** (good training ground):
- Role: Publish research, build models, support institutional clients
- Firms: Goldman Sachs, Morgan Stanley, JP Morgan, Citi commodity research
- Comp (Y1): $150-200K. Director-level: $400-800K.
- Path: Analyst → Associate → VP → Director, then transition to buy-side PM

**5. Commercial/corporate energy**:
- Role: Hedge corporate energy exposure (airline fuel, utility gas, E&P production)
- Firms: Airlines (Southwest, Delta), utilities, E&P companies (ConocoPhillips, EOG)
- Comp: Lower than hedge fund but better work-life balance. Analyst: $100-150K. Manager: $200-350K.

### What They Look For

**1. Fundamentals knowledge** — Can you discuss the crude S/D balance with specificity?
Bad answer: "I think oil is going up because of tensions in the Middle East."
Good answer: "Global demand is ~103M bbl/d. OPEC+ is producing ~34M including Russia at ~9M with weak compliance from Iraq and Kazakhstan. The call on OPEC crude for Q3 is ~28.5M bbl/d at current demand, implying ~1M bbl/d of draws if OPEC holds quotas. Cushing is at 32M bbl, below the 5-year average. I think Q3 backwardation should widen."

**2. Quantitative skills** — Python (pandas, matplotlib, statsmodels), Excel (can you build a quick S/D model in 30 minutes?), SQL (if quant-oriented), statistics (regression, time series, hypothesis testing).

**3. Trade idea articulation** — Present in memo format, from memory, under pressure. You should be able to give current prices, the fundamental setup, your directional view, the spread you'd trade, entry/target/stop, and sizing. Vague answers are disqualifying.

**4. Intellectual curiosity** — Do you read energy news daily? Can you discuss what moved this week? Do you follow the EIA reports? If your interviewer asks "What did the EIA report show this morning?" and you say "I didn't check," the interview is over.

**5. Risk awareness** — Every trade idea must include "what could go wrong" and how you'd manage it. Funds hire traders who will survive, not just traders who will make money for two years then blow up.

### Interview Preparation

**"Give me a trade idea."**
Have 2-3 ready. Present in memo format: Trade, direction, current level, target, stop, thesis, fundamental support, quant support, risks, sizing. Specific numbers throughout. Not "I like oil long-term" — that's not a trade.

**"Walk me through the crude oil S/D balance."**
Global demand by region. Supply by source (OPEC, US, non-OPEC). Net implied stock change. Compare EIA, IEA, OPEC forecasts. Where do you think consensus is wrong?

**"Why is gas in contango/backwardation right now?"**
Storage economics framework. Current inventories vs. 5-year average. Cost of carry vs. calendar spread. Injection/withdrawal rate vs. norms. LNG export levels. Production trends.

**"How would you size a position in [spread X]?"**
Vol-based sizing formula. Risk budget → daily vol → contract multiplier → position. Then check: "Is this position <5% of the contract month's ADV? Can I exit in 1-2 days?"

**"What happened in energy this week?"**
You must know: EIA inventory report results and surprises, any OPEC news, notable price moves (WTI, Brent, gas, cracks), the narrative driving the market. Prepare daily.

**"Explain the 3:2:1 crack spread."**
Formula. Physical logic (why 3:2:1 approximates a refinery). Calculate with current prices. What drives it (utilization, inventories, seasonality). Is the crack currently rich or cheap vs. seasonal norms?

**"Tell me about a time you were wrong."**
Describe a specific trade or analytical error. Focus on what you learned about your process, not the outcome. "I was short gas going into a polar vortex because my weather model weighted GFS more than ECMWF. I learned to weight the models equally and keep stops tighter around weather-sensitive positions." Never blame luck.

**Brainteaser: "$10M, 100:1 leverage on WTI — what's your strategy?"**
The correct answer: "I would NOT use 100:1 leverage. At 100:1, a 1% WTI move ($0.80) wipes out the entire $10M. WTI routinely moves 2-3% daily. The correct approach: 5-10x leverage, deployed across 10-15 uncorrelated spread positions, each sized so a 3-sigma day costs no more than 1-2% of capital. Target Sharpe: 1.5+, Max DD: <10%."

### How to Stand Out

**1. Paper trade track record**: Document 6-12 months of trades in memo format. Track results honestly. Include losers with post-mortems. This is the single most differentiating thing a candidate can bring to an interview. Attach a summary: total return, Sharpe, max drawdown, win rate.

**2. Original analysis**: Download EIA data via API. Build a Permian production model. Create a seasonal crack spread visualization. Write up a non-obvious view on an energy spread with data. Post on LinkedIn or send directly to people at target firms.

**3. Know the market cold**: On any given day, you should know: WTI, Brent, Henry Hub, RBOB, ULSD, TTF spot prices (± 5%). Last week's EIA report numbers. OPEC+ policy and next meeting date. Forward curve shape and why. 2-3 live trade ideas.

**4. Network**: Energy trading is small and relationship-driven. Conferences: CERAWeek (Houston, March), APPEC (Singapore, October), IP Week (London, February), FT Commodities Summit. Industry events: local commodity meetups, university energy clubs. LinkedIn: follow and engage with energy analysts and traders.

**5. Physical trading experience**: If you can get a physical rotation at Vitol, Trafigura, Glencore, bp trading, or Shell trading — take it. Physical knowledge is a durable edge that financial-only traders never acquire. Understanding how cargoes are priced, loaded, shipped, and delivered gives you pattern recognition that no model replicates.

## Part I: The Basics

### Chapter 1 — A Brief History of Oil

The modern oil industry began in 1859 when Edwin Drake drilled the first commercial well in Titusville, Pennsylvania. Within a decade, John D. Rockefeller consolidated refining under Standard Oil, which at its peak controlled 90% of US refining capacity. The 1911 Supreme Court breakup of Standard Oil created the companies that became ExxonMobil, Chevron, and others.

After World War II, seven companies (the "Seven Sisters") dominated global production: Exxon, Mobil, Chevron, Texaco, Gulf, BP, and Shell. Their control eroded when producing nations nationalized their oil industries in the 1960s-70s, creating national oil companies (Saudi Aramco, NIOC, PDVSA, etc.) and OPEC.

Key events that shaped the modern market:
- **1973 Arab Oil Embargo**: OPEC weaponized oil supply. Prices quadrupled. Proved oil's geopolitical power.
- **1979 Iranian Revolution**: Second oil shock. Prices doubled again.
- **1986 Saudi flood**: Saudi Arabia opened the taps to punish OPEC cheaters. Prices collapsed from $30 to $10. Established Saudi Arabia as swing producer.
- **2003-2008 supercycle**: China's industrialization drove demand. Oil went from $25 to $147.
- **2014-2016 shale vs. OPEC**: US shale production surged. Saudi refused to cut. Prices fell from $100 to $26. Proved shale's disruptive power.
- **April 2020**: COVID demand destruction + full storage → WTI went negative ($-37.63/bbl).

**For trading**: The oil market oscillates between periods of producer control (OPEC managing supply) and market-driven price discovery (shale, demand shocks). Understanding which regime you're in determines whether mean-reversion or trend-following strategies work better.

### Chapter 2 — Oil's Role in the Modern World

Oil provides approximately 31% of global primary energy and remains irreplaceable in transportation (~60% of consumption). Breakdown of global oil demand by sector:

| Sector | Share | Key Products |
|--------|-------|-------------|
| Road transport | ~44% | Gasoline, diesel |
| Petrochemicals | ~14% | Naphtha, LPG, ethane |
| Aviation | ~7% | Jet fuel (Jet A-1) |
| Shipping | ~5% | Fuel oil, VLSFO, marine gasoil |
| Industrial/heating | ~10% | Diesel, fuel oil |
| Power generation | ~4% | Fuel oil, diesel (declining) |
| Other | ~16% | Asphalt, lubricants, waxes |

Global oil demand is approximately 103-104 million bbl/d. Demand growth has averaged ~1-1.5 million bbl/d per year, driven primarily by emerging markets (China, India, Southeast Asia). OECD demand has been flat or declining due to efficiency gains and EV adoption.

Petrochemicals are the fastest-growing demand segment. Plastics, synthetic fibers, fertilizers, pharmaceuticals, and solvents all derive from oil. Even in aggressive EV scenarios, petrochemical demand continues growing.

**For trading**: Demand is not monolithic. Gasoline demand is seasonal (driving season) and sensitive to pump prices. Diesel demand tracks economic activity (trucking, construction, manufacturing). Jet fuel demand tracks travel. Each product has its own demand cycle, which is why crack spreads between products diverge.

### Chapter 3 — Measuring Oil

**API gravity** measures crude density relative to water (higher = lighter):
- Light crude: >31° API (e.g., WTI at 39.6°, Brent at 38.3°)
- Medium crude: 22-31° API (e.g., Mars at 28.9°, Arab Medium at 30.4°)
- Heavy crude: <22° API (e.g., Western Canadian Select at 20.5°, Venezuelan Merey at 16°)

Light crude yields more gasoline and diesel per barrel. Heavy crude yields more fuel oil and residual products, requiring complex (expensive) refineries to upgrade into valuable products.

**Sulfur content** determines sweet vs. sour:
- Sweet: <0.5% sulfur (e.g., WTI at 0.24%, Brent at 0.37%)
- Sour: >0.5% sulfur (e.g., Mars at 1.93%, Arab Heavy at 2.87%)

Sour crude requires hydro-desulfurization (expensive), so it trades at a discount to sweet crude. The sweet-sour differential widens when:
- Environmental regulations tighten (more desulfurization needed)
- Simple refineries are marginal (they can't process sour)
- Sour supply is abundant relative to complex refining capacity

**Key unit conversions**:
- 1 barrel = 42 US gallons = 158.99 liters
- 1 metric ton of crude ≈ 7.33 barrels (varies with API gravity: lighter crude = more barrels per ton)
- 1 barrel of crude contains ~5.8 million BTU of energy

**For trading**: Every physical cargo is priced as a benchmark plus or minus a quality differential. WTI-Mars spread reflects the light-heavy differential. WTI-Urals reflects light-sweet vs. medium-sour. These differentials are tradeable and driven by refinery demand for specific crude qualities.

## Part II: Exploration & Production

### Chapter 4 — Finding Oil

Oil forms from ancient marine organisms buried under sediment for millions of years, subjected to heat and pressure. It migrates upward until trapped by impermeable rock formations. Geological structures that trap oil:

- **Anticlines**: upward folds in rock layers (most common trap type)
- **Fault traps**: faults create barriers that block migration
- **Salt domes**: salt intrusions push up through sediment, creating traps around the edges
- **Stratigraphic traps**: changes in rock type/permeability create barriers

**Exploration process**:
1. **Geological surveys**: surface mapping, satellite imagery, gravity surveys
2. **Seismic surveys**: sound waves bounced off subsurface layers, recorded by geophones. 2D seismic → 3D seismic → 4D seismic (time-lapse). Cost: $50K-$500K+ per survey.
3. **Exploration drilling**: wildcat wells test the most promising structures. Success rate: 10-30% depending on basin maturity. Cost: $5M-$100M+ per well (deepwater wells are most expensive).

**Lead times**: From discovery to first oil: 3-5 years onshore, 5-10+ years offshore/deepwater. This is why supply cannot respond quickly to price signals — the infrastructure takes years to build.

**For trading**: Exploration data creates long-lead supply forecasts. Short-term (0-6 months), production is largely fixed — you can't drill fast enough to change supply meaningfully. Medium-term (6-18 months), shale responds. Long-term (2-5+ years), conventional projects come online. This time-structure is why short-term prices are driven by demand and inventory, while long-term prices are driven by the cost of new supply.

### Chapter 5 — Producing Oil

**Recovery phases**:
- **Primary**: Natural reservoir pressure pushes oil up the wellbore. Recovers ~10-15% of original oil in place (OOIP). Cheapest method. Production declines as pressure drops.
- **Secondary**: Injection of water or gas to maintain reservoir pressure. Adds ~15-25% recovery. Most conventional fields use water flooding.
- **Tertiary/EOR (Enhanced Oil Recovery)**: CO2 injection, steam injection (for heavy oil), chemical flooding, microbial methods. Adds ~5-15% recovery but is expensive ($10-30/bbl incremental cost). Only economic at higher oil prices.

Total recovery is typically 30-50% of OOIP. Over half the oil stays in the ground — this is why "reserves" are always an economic estimate, not a physical constant. Higher prices → more recoverable oil.

**Decline curves**: Every oil well follows a decline curve. Production peaks shortly after completion and then declines, typically following an exponential or hyperbolic pattern.
- Conventional wells: 5-15% annual decline rate
- Shale wells: 60-75% decline in year 1, then slowing to 10-15% by year 3-4
- Mature fields: 3-8% annual decline

The global crude base decline rate (what happens without new investment) is approximately 4-5 million bbl/d per year. This means the industry must add 4-5 million bbl/d of new production annually just to stay flat — before any demand growth.

**For trading**: Decline rates are the fundamental reason oil prices can't stay low forever. At low prices, investment drops, production declines accelerate, and the supply deficit eventually pushes prices up. This mean-reversion tendency is strongest over 2-5 year cycles.

### Chapter 6 — The US Shale Revolution

**How it works**: Shale oil (tight oil) is trapped in low-permeability rock. Two technologies unlocked it:
1. **Horizontal drilling**: Drill vertically to the shale layer, then turn horizontal and drill 1-2 miles through the formation, maximizing contact with the rock
2. **Hydraulic fracturing**: Pump water, sand, and chemicals at extreme pressure to create fractures in the rock, allowing oil to flow

**Key shale basins**:

| Basin | Location | Production (~) | Key Characteristics |
|-------|----------|---------------|-------------------|
| Permian | TX / NM | ~6.0 million bbl/d | Largest US basin. Multiple stacked formations (Wolfcamp, Bone Spring, Spraberry). Also produces significant associated gas. |
| Eagle Ford | TX | ~1.1 million bbl/d | More oil-weighted. Closer to Gulf Coast refineries and export terminals. |
| Bakken | ND / MT | ~1.1 million bbl/d | Lighter crude. Constrained by limited pipeline capacity historically. |

**Shale economics**:
- Breakeven costs: $35-55/bbl WTI for most Permian wells (varies by operator, acreage quality)
- Well cost: $5-8 million for a typical Permian horizontal well
- Time to first oil: 2-4 weeks from spud to completion
- IP (initial production) rates: 500-1,500+ bbl/d for top-tier Permian wells
- Decline: 60-75% in year 1. A well producing 1,000 bbl/d at IP will produce ~300 bbl/d a year later.
- EUR (estimated ultimate recovery): 500K-1.5M barrels per well over its lifetime

**DUC wells (drilled but uncompleted)**: Wells that have been drilled but not yet hydraulically fractured. They represent latent supply that can be brought online in 2-4 weeks (vs. 4-6 months for a new well from scratch). The DUC inventory is a key metric — when it draws down, it means future supply growth requires more active drilling.

**US production trajectory**: US crude production grew from ~5 million bbl/d in 2008 to 13+ million bbl/d, making the US the world's largest producer. This fundamentally changed global oil dynamics — the US is now a net exporter, OPEC's market share has shrunk, and the WTI-Brent relationship has inverted (WTI now typically trades at a discount to Brent, reflecting US oversupply).

**For trading**: Shale responds to price with a ~6 month lag. When WTI rises above $60-70, drilling activity increases (watch Baker Hughes rig count, published every Friday). This lag creates a cyclical pattern: high prices → more rigs → more production → lower prices → fewer rigs → less production → higher prices. Calendar spreads and the shape of the forward curve are directly affected by the market's expectation of shale supply response.

### Chapter 7 — Moving Oil

**Pipelines** (~65% of US crude transport):
- Cheapest per barrel over land ($2-5/bbl for long-haul)
- Fixed routes, fixed capacity — takes 2-5 years to build new pipelines
- Major US crude pipelines: Keystone (Canada → Gulf), DAPL (Bakken → IL), Permian basin takeaway (Permian → Corpus Christi/Houston)

**Tankers** (~35% of global crude transport):
- VLCC (Very Large Crude Carrier): ~2 million barrels, the workhorse for long-haul (Middle East → Asia)
- Suezmax: ~1 million barrels, max size for the Suez Canal
- Aframax: ~750K barrels, used for shorter routes and smaller ports
- **Freight rates** are quoted in Worldscale (a reference rate) or $/bbl. Rates are extremely volatile — driven by vessel supply (fleet size, scrapping), demand (trade flows), and disruptions (wars, sanctions, weather)
- Dirty tanker rates are a tradeable market (FFA — Forward Freight Agreements)

**Key chokepoints** (disruption risk):
- **Strait of Hormuz**: ~21 million bbl/d (30% of seaborne oil). Iran controls the northern shore. A closure would be the most severe supply disruption in history.
- **Strait of Malacca**: ~16 million bbl/d. Route from Middle East to Asia.
- **Suez Canal/SUMED pipeline**: ~7-9 million bbl/d. Disruptions (like Houthi attacks) reroute tankers around the Cape of Good Hope, adding 10-14 days and increasing freight costs.
- **Bab el-Mandeb**: ~6 million bbl/d. Entrance to the Red Sea.
- **Turkish Straits (Bosphorus)**: ~3 million bbl/d. Russian and Caspian crude to the Mediterranean.

**For trading**: Transportation logistics are the physical foundation of basis trading. Every price differential between two locations reflects the cost (and availability) of moving oil between them. When a chokepoint is disrupted, the entire basis structure reshifts: crude trapped behind the bottleneck cheapens, crude beyond it strengthens, and tanker rates spike. The Strait of Hormuz is the single biggest geopolitical risk in oil markets.

### Chapter 8 — Storing Oil

**Commercial storage**:
- Global commercial crude storage capacity: ~4.5 billion barrels
- **Cushing, Oklahoma**: ~90 million barrel capacity. The delivery point for WTI futures. Cushing storage levels are reported weekly by the EIA and directly affect the WTI front-month price.
  - Cushing operational minimum: ~20 million barrels (tank bottoms, working minimum)
  - Cushing near full: >80 million barrels → extreme contango, price collapse risk
  - In April 2020, Cushing filled to ~65 million barrels and was approaching operational limits → WTI went negative

**Strategic Petroleum Reserve (SPR)**:
- US government emergency stockpile stored in underground salt caverns along the Gulf Coast
- Capacity: ~714 million barrels. Current level: ~400 million barrels (drawn down significantly 2021-2022)
- Release requires presidential authorization. Historically used during Gulf War (1991), Hurricane Katrina (2005), Libya crisis (2011), and the 2022 post-Russia/Ukraine release
- SPR releases are bearish for front-month prices but the impact depends on market expectations

**Floating storage**:
- When the forward curve is in steep contango (future prices much higher than spot), it becomes profitable to buy physical crude, store it on a tanker, and sell it forward
- **Storage trade profit** = Forward price - Spot price - Storage cost - Financing cost - Insurance
- VLCC storage cost: ~$30K-50K/day → roughly $0.50-0.75/bbl/month
- When contango > storage costs, floating storage builds. When backwardation sets in, floating storage unwinds.

**Storage as a buffer**:
- When production > consumption → inventory builds → spot price weakens (contango)
- When consumption > production → inventory draws → spot price strengthens (backwardation)
- The **rate of inventory change** matters more than the absolute level. A smaller-than-expected build is bullish. A larger-than-expected draw is very bullish.
- Storage relative to the **5-year average** is the key metric traders watch. Storage above the 5-year average = bearish. Below = bullish.

**For trading**: Cushing inventory is the most important weekly data point for WTI trading. Every Wednesday at 10:30 ET, the EIA reports crude, gasoline, and distillate inventories. The market moves on the deviation from consensus expectations, not the absolute number. Build a model that tracks inventory vs. 5-year average and vs. consensus — that's the foundation of fundamental crude analysis.

## Part IV: Refining

### Chapter 9 — The Refining Process

A refinery converts crude oil into usable products through three main processes:

**1. Distillation (atmospheric and vacuum)**
- Crude is heated to ~700°F and fed into a distillation column
- Different hydrocarbons boil off at different temperatures and are collected at different heights:
  - Top: gases (butane, propane) — lightest, lowest boiling point
  - Upper middle: naphtha and gasoline — light
  - Middle: kerosene and jet fuel — medium
  - Lower middle: diesel and heating oil — medium-heavy
  - Bottom: residual fuel oil, asphalt — heaviest, highest boiling point
- Atmospheric distillation handles the first pass. Vacuum distillation further processes the heavy bottoms.

**2. Conversion (cracking)**
- Heavy molecules are "cracked" into lighter, more valuable products
- **Fluid catalytic cracking (FCC)**: breaks heavy gas oil into gasoline and lighter products. Most common conversion unit.
- **Hydrocracking**: uses hydrogen and catalysts to break heavy molecules. Produces more diesel/jet fuel than FCC. More expensive but higher quality output.
- **Coking**: processes the heaviest residual into lighter products + petroleum coke. Used for very heavy, sour crudes.

**3. Treatment and blending**
- **Hydrotreating/desulfurization**: removes sulfur from products to meet environmental specs (ULSD requires <15 ppm sulfur)
- **Reforming**: restructures naphtha molecules to increase octane for gasoline blending
- **Alkylation**: combines light molecules into high-octane gasoline blendstock
- Final products are blended to meet exact specifications (octane, vapor pressure, sulfur, cetane)

**A typical US barrel yields approximately**:

| Product | Yield | Price Benchmark |
|---------|-------|----------------|
| Gasoline | ~45% | RBOB ($/gal × 42 = $/bbl) |
| Diesel/Heating Oil | ~27% | ULSD ($/gal × 42 = $/bbl) |
| Jet Fuel | ~10% | Platts Jet (OTC assessment) |
| Heavy Fuel Oil | ~4% | 3.5% HSFO, VLSFO |
| LPG (propane, butane) | ~4% | Mont Belvieu propane/butane |
| Petroleum Coke | ~5% | Pet coke market |
| Other (asphalt, lubricants) | ~5% | Various |

**For trading**: The refinery is a physical spread trade. The 3:2:1 crack spread approximates this: buy 3 barrels crude, sell 2 barrels gasoline + 1 barrel diesel. When you trade a crack spread, you are taking a view on refining profitability — which is driven by product demand, refinery utilization, and crude supply.

### Chapter 10 — Refinery Economics

**Refinery configurations**:
- **Simple (hydroskimming)**: Distillation + hydrotreating only. Can only process light, sweet crude. Low capital cost but low margin. Yields a lot of fuel oil.
- **Complex (cracking)**: Adds FCC or hydrocracker. Can upgrade heavy fractions into gasoline/diesel. Higher capital cost but much higher margin.
- **Very complex (deep conversion/coking)**: Adds coker. Can process the cheapest, heaviest, sourest crudes and convert nearly everything into light products. Highest capital cost ($10B+) but captures the full light-heavy spread.

**Refinery complexity determines which crudes are economic to run**. A complex Gulf Coast refinery (e.g., Motiva Port Arthur, 630K bbl/d) can buy cheap heavy sour crude from Canada or Saudi Arabia and still produce high-value gasoline and diesel. A simple European refinery must buy expensive light sweet crude and has thinner margins.

**Refinery utilization**:
- US capacity: ~18 million bbl/d across ~130 refineries
- PADD 3 (Gulf Coast) has ~55% of US capacity — dominates
- Normal utilization: 90-95% in peak season
- Turnaround season: spring (Feb-April) and fall (Sept-Nov). Refineries shut units for scheduled maintenance. Utilization drops to 85-88%.
- Unplanned outages (fires, storms, equipment failure) can cause sudden supply disruptions

**Turnaround schedules matter for trading**:
- Spring turnarounds reduce gasoline production → gasoline cracks widen → RBOB strengthens
- Fall turnarounds reduce distillate production → diesel/heating oil cracks widen before winter
- The EIA weekly report shows refinery utilization (% of operable capacity) — a key input

**Margin calculation** (simplified 3:2:1 crack):
\`\`\`
Crack Spread = (2 × RBOB $/bbl + 1 × ULSD $/bbl) / 3 - WTI $/bbl

Example:
RBOB = $2.50/gal = $105/bbl
ULSD = $2.80/gal = $117.60/bbl
WTI = $78/bbl

Crack = (2 × 105 + 117.60) / 3 - 78 = 109.20 - 78 = $31.20/bbl
\`\`\`

Historical 3:2:1 crack range: $10-25/bbl is normal. >$30 is very wide (strong product demand or constrained refining). In 2022, cracks hit $60+/bbl due to post-COVID demand recovery, low inventories, and Russian supply disruptions.

### Chapter 11 — Refined Product Specifications

**Gasoline (RBOB)**:
- RVP (Reid Vapor Pressure): measures volatility. Summer-grade gasoline has lower RVP (≤7.8 psi in most areas) to reduce evaporative emissions. Winter-grade allows higher RVP (≤15 psi), making it cheaper to produce.
- The **summer/winter blend transition** happens in spring (Feb-Mar production, April-May distribution). Summer-grade is more expensive to produce → RBOB cracks typically rise in spring.
- Octane rating: Regular 87, Mid-grade 89, Premium 91-93. Higher octane requires more reforming/alkylation.
- RBOB (Reformulated Blendstock for Oxygenate Blending) is the gasoline benchmark. Ethanol is blended at the terminal (10% ethanol = E10, the US standard).

**Diesel / Heating Oil (ULSD)**:
- Ultra-Low Sulfur Diesel: ≤15 ppm sulfur (regulation since 2006)
- Cetane number measures ignition quality (analogous to octane for gasoline). Higher cetane = better diesel.
- Diesel and heating oil are chemically very similar — essentially the same product, taxed differently
- Demand: diesel is tied to economic activity (trucking/freight accounts for ~75% of diesel demand). Heating oil demand is concentrated in the Northeast US and is seasonal (winter).

- Kerosene-type fuel with strict freeze point, flash point, and energy density specs
- Largely un-hedgeable via exchange-traded futures (no liquid jet fuel future). Airlines hedge with crude, heating oil, or crack spreads and accept basis risk.
- Jet fuel demand tracks air travel — collapsed 70% during COVID, recovered gradually.

**Fuel Oil**:
- **High Sulfur Fuel Oil (HSFO)**: 3.5% sulfur. Cheap, dirty. Used to be the standard marine fuel.
- **Very Low Sulfur Fuel Oil (VLSFO)**: 0.5% sulfur. Required for maritime since IMO 2020.
- **Marine Gasoil (MGO)**: Distillate-quality marine fuel. Most expensive marine option.
- IMO 2020 created a structural shift: HSFO demand dropped, VLSFO and MGO demand rose. Refineries that can desulfurize fuel oil or produce VLSFO have a margin advantage.

**For trading**: Product specs create seasonal and regulatory-driven spread opportunities. The RVP transition in spring drives gasoline cracks higher. IMO 2020 permanently changed fuel oil spreads. Knowing when spec changes happen and how they affect refinery operations gives you a structural edge in product spread trading.

### Chapter 12 — How Oil Is Priced

**Benchmarks**:
The oil market uses a small number of benchmarks as reference prices. Every physical cargo in the world is priced as a benchmark plus or minus a differential.

- **WTI (West Texas Intermediate)**: Light sweet crude (39.6° API, 0.24% sulfur). Delivered at Cushing, OK. Traded on NYMEX/CME. The US domestic benchmark.
- **Brent**: Light sweet crude (38.3° API, 0.37% sulfur). Originally from the North Sea Brent field, now based on a basket (Brent, Forties, Oseberg, Ekofisk, Troll — "BFOET"). Traded on ICE. The international benchmark — approximately 80% of global crude is priced off Brent.
- **Dubai/Oman**: Medium sour crude (~31° API, 2% sulfur). The benchmark for Middle East crude sold to Asia. Traded on DME (Dubai Mercantile Exchange).

**Differentials**:
Every physical cargo is quoted as benchmark +/- $/bbl. Examples:
- Saudi Aramco prices Arab Light to Asia as: Dubai/Oman + Official Selling Price (OSP)
- A Gulf of Mexico Mars cargo is priced as: WTI + Mars differential (typically WTI -$2 to -$5, reflecting heavy/sour quality discount)
- Nigerian Bonny Light is priced as: Dated Brent + premium (light sweet quality premium)

**Price reporting agencies (PRAs)**:
- **S&P Global Platts**: Assesses physical crude and product prices daily through the "Market on Close" (MOC) process — a transparent window where traders submit bids and offers
- **Argus Media**: Competes with Platts on price assessments, especially strong in fuel oil and products
- These assessments become the official prices that physical contracts reference

**The Brent complex**:
Brent pricing is actually a layered system:
1. **Dated Brent**: The physical price for cargoes loading 10-25 days forward
2. **Cash BFOE**: Forward contracts for BFOET cargoes
3. **ICE Brent futures**: Cash-settled financial futures that converge to the ICE Brent Index
4. **CFDs (Contracts for Differences)**: Swaps between dated Brent and forward Brent

Understanding this structure matters because the layers can diverge — creating arbitrage and relative value opportunities.

### Chapter 13 — Oil Trading and Financial Markets

**Exchanges**:
- **NYMEX/CME**: WTI (CL), Henry Hub gas (NG), RBOB (RB), ULSD (HO). Physically delivered (WTI) or cash-settled.
- **ICE (Intercontinental Exchange)**: Brent (B), Gasoil (G), TTF gas. Mostly cash-settled.
- **DME (Dubai Mercantile Exchange)**: Oman crude. Physical delivery.

**Market size**: Daily trading volume in WTI futures alone exceeds 1 million contracts (~1 billion barrels/day notional) — roughly 10x actual global crude production. The financial market dwarfs the physical market.

**Contract structure**:
- Monthly expiry. WTI expires 3 business days before the 25th calendar day of the month prior to delivery.
- Rolling: most participants close positions before expiry and re-open in the next month. The "roll" is a significant P&L event.
- Physical delivery: WTI allows physical delivery at Cushing. In practice, <1% of contracts go to delivery. But the threat of delivery is what keeps futures prices anchored to physical reality.

**Forward curve dynamics**:

**Contango** (future > spot):
- Reflects: oversupply, weak near-term demand, abundant storage
- Economics: buy spot + store + sell forward = riskless profit (if spread > carry cost)
- Who benefits: storage operators, floating storage plays
- Roll impact: rolling long positions costs money (sell cheap front, buy expensive deferred)

**Backwardation** (spot > future):
- Reflects: tight supply, strong near-term demand, low inventories
- Economics: no storage incentive. Inventories draw down.
- Who benefits: producers (sell at high spot), long rolling positions (positive roll yield)
- Roll impact: rolling long positions earns money (sell expensive front, buy cheap deferred)

The curve shape is the market's real-time assessment of supply/demand balance over time. It is NOT a forecast of future spot prices.

### Chapter 14 — OPEC and Geopolitics

**OPEC structure**:
- 13 member countries: Saudi Arabia, Iraq, Iran, UAE, Kuwait, Venezuela, Nigeria, Libya, Algeria, Angola, Congo, Equatorial Guinea, Gabon
- OPEC controls ~35% of global production and holds ~70% of proven reserves
- **OPEC+**: Since 2016, OPEC has coordinated with non-OPEC producers (Russia, Kazakhstan, Mexico, Oman, etc.), forming OPEC+

**How OPEC works**:
- Member countries agree to production quotas at regular meetings (typically every 1-2 months)
- Saudi Arabia has the most spare capacity (~2-3 million bbl/d that can be activated within 30-90 days). This makes them the de facto leader.
- Compliance varies: some members (Saudi, UAE) comply strictly; others (Iraq, Nigeria) often exceed quotas
- **Spare capacity** is the key metric. Global spare capacity <2 million bbl/d = tight market, vulnerable to disruptions. >4 million bbl/d = comfortable buffer.

**OPEC decision framework**:
- OPEC balances three objectives: (1) high enough prices for government revenue, (2) low enough prices to not destroy demand or incentivize too much competing supply, (3) maintaining market share
- When OPEC cuts: prices rise but market share falls to non-OPEC (especially shale)
- When OPEC floods: prices fall but market share rises and high-cost competitors are squeezed out

**Key geopolitical risks**:
- **Sanctions**: US/EU sanctions on Iran and Russia constrain supply. Sanction enforcement, waivers, and workarounds (shadow fleet tankers) affect actual vs. nominal supply.
- **Conflict**: Middle East wars, Nigerian militancy, Libyan civil war all cause supply disruptions
- **Regime change**: Venezuela's collapse took ~1.5 million bbl/d off the market
- **Maritime risk**: Houthi attacks on Red Sea shipping, Strait of Hormuz tensions

**For trading**: OPEC meetings are the single most important scheduled events for oil prices. The market moves on the deviation between the decision and expectations — not the decision itself. If the market expects a 500K bbl/d cut and OPEC delivers 1M, that's bullish. If they deliver 500K, it's priced in. Always know: (1) when the next meeting is, (2) what the market expects, (3) where the key disagreements are within OPEC.`

*CME Group Education*

---

## Section 1: Introduction to Energy Markets

### Why Energy Futures Exist

Energy prices are among the most volatile in financial markets. Crude oil can move 5-10% in a day on OPEC decisions or geopolitical events. Natural gas can move 10-15% on a single weather model shift. This volatility creates real economic risk for:

- **Producers** (oil companies, E&P firms): need to lock in future revenue to justify drilling investments
- **Consumers** (airlines, utilities, trucking companies): need to budget fuel costs
- **Intermediaries** (refiners, physical traders): need to manage the margin between what they buy and sell

Futures contracts solve this by allowing participants to lock in prices for future delivery. A producer can sell WTI futures to guarantee revenue. An airline can buy jet fuel swaps to cap fuel costs. The exchange (CME/NYMEX or ICE) acts as central counterparty to both sides, eliminating bilateral credit risk.

Speculators (hedge funds, prop traders, CTAs) provide the liquidity that makes hedging possible. Without speculators willing to take the other side, hedgers would face wide bid-ask spreads and poor execution.

### The Major Energy Contracts

| Contract | Symbol | Size | Tick Size | Tick Value | Delivery | Exchange |
|----------|--------|------|-----------|------------|----------|----------|
| WTI Crude Oil | CL | 1,000 bbl | $0.01/bbl | $10 | Physical (Cushing, OK) | NYMEX |
| Brent Crude Oil | BZ | 1,000 bbl | $0.01/bbl | $10 | Cash settled | NYMEX |
| Henry Hub Nat Gas | NG | 10,000 MMBtu | $0.001/MMBtu | $10 | Physical (Henry Hub, LA) | NYMEX |
| RBOB Gasoline | RB | 42,000 gal | $0.0001/gal | $4.20 | Physical (NY Harbor) | NYMEX |
| NY Harbor ULSD | HO | 42,000 gal | $0.0001/gal | $4.20 | Physical (NY Harbor) | NYMEX |
| E-mini WTI | QM | 500 bbl | $0.025/bbl | $12.50 | Cash settled | NYMEX |

**Notional value examples** (at $80/bbl WTI):
- 1 CL contract = 1,000 x $80 = $80,000 notional
- Initial margin ~$6,000 → leverage ratio ~13:1
- A $1/bbl move = $1,000 P&L per contract

**Trading hours**: CME Globex electronic trading runs nearly 23 hours/day (Sunday 5pm CT through Friday 4pm CT, with a daily 60-minute break). The most liquid period is 8am-2:30pm CT.

## Section 2: How Futures Trading Works

### Contract Mechanics

Every futures contract specifies quantity, quality, delivery location, delivery month, and last trading day.

**Delivery month codes** (memorize these):

| Code | Month | Code | Month |
|------|-------|------|-------|
| F | January | N | July |
| G | February | Q | August |
| H | March | U | September |
| J | April | V | October |
| K | May | X | November |
| M | June | Z | December |

Contract notation: **Product Code + Month Code + Year**
- CLZ26 = WTI Crude Oil, December 2026
- NGH27 = Natural Gas, March 2027
- RBK26 = RBOB Gasoline, May 2026

**Expiry dates**:
- WTI (CL): 3 business days before the 25th calendar day of the month prior to delivery
- Natural Gas (NG): 3 business days before the first calendar day of the delivery month
- RBOB/ULSD: Last business day of the month prior to delivery

If you hold a physically-delivered contract at expiry, you are obligated to make or take delivery. In practice, <1% go to delivery — most are closed or rolled.

### Margin and Mark-to-Market

**Initial margin**: Deposit required to open a position. Set by CME based on historical volatility. Typically 5-10% of notional value. This is a performance bond, not a down payment.

**Maintenance margin**: Lower threshold (~70-80% of initial). Falling below triggers a **margin call** — you must deposit funds to restore to initial margin.

**Mark-to-market**: Every day at the close, each position is re-valued at the settlement price. Gains credited, losses debited in cash.

\`\`\`
Example:
Day 1: Buy 10 WTI at $80/bbl. Margin deposited: $60,000.
Day 1 close: WTI settles $79. P&L: 10 x 1,000 x (-$1) = -$10,000.
Account: $50,000. Maintenance: $45,000. No margin call.

Day 2 close: WTI settles $77.50. P&L: -$15,000.
Account: $35,000. Maintenance: $45,000. MARGIN CALL.
Must deposit $25,000 to restore to $60,000.
\`\`\`

At 13:1 leverage, a 7.7% adverse move wipes out your entire initial margin. This is why position sizing and stop losses are non-negotiable.

### Order Types

- **Market order**: immediate execution at best price. Guaranteed fill but risk of slippage in illiquid contracts.
- **Limit order**: execute at your price or better. Price control but may not fill.
- **Stop order**: inactive until trigger price is hit, then becomes a market order. Automates risk management.
- **Stop-limit**: like a stop but becomes a limit order. Avoids bad fills but may not fill in fast markets.
- **Iceberg/reserve orders**: show only a portion of your total size. Refills as the visible portion fills.

**Best practices**: Limit orders for entries, stop orders for risk management. Never use market orders in back-month contracts where bid-ask spreads can be wide.

## Section 3: The Forward Curve

### Contango and Backwardation

The forward curve plots futures prices for successive delivery months. Its shape reveals the market's S/D balance.

**Contango** (upward sloping: deferred > front):
- The "normal" state when supply is ample and storage is available
- Forward premium reflects the **cost of carry**: storage + financing + insurance
- Max theoretical contango = full cost of carry (~$0.30-0.80/bbl/month for crude)
- When contango exceeds carry cost, the **storage trade** is profitable: buy spot, store, sell forward, deliver at expiry
- Signals: inventory builds, weak near-term demand, OPEC+ increasing supply

**Backwardation** (downward sloping: front > deferred):
- Signals tight supply or strong immediate demand
- Front-month premium reflects **convenience yield**: the value of having physical oil now
- No theoretical limit — during crises, front premiums can be $5-15/bbl above deferred
- Discourages storage → inventories draw
- Signals: inventory draws, supply disruptions, OPEC+ cutting

**Reading the curve**:
- Prompt spread (M1-M2): most liquid, reflects immediate tightness/looseness
- 1-year spread (M1-M12): medium-term S/D outlook
- Kinks (e.g., December gas premium over November) reflect seasonal patterns
- Sudden steepening of backwardation signals an unexpected tightening event

The forward curve is NOT a forecast of future spot prices — it reflects current S/D dynamics and storage economics.

### Calendar Spreads

A calendar spread is simultaneous long and short positions in different months of the same commodity. Notation: Long Jun / Short Dec means buy June, sell December.

**Types**:
- **Prompt spread** (M1-M2): Most liquid. Directly reflects near-term S/D. Hedge funds trade massive size here.
- **Seasonal**: Exploiting known demand patterns (long winter gas / short summer gas)
- **Winter-winter** (e.g., Dec26-Dec27): Isolates year-over-year change, removes intra-year seasonality
- **Butterfly (fly)**: Long A, short 2x B, long C. Trades curvature. Example: (Jun-Jul) - (Jul-Aug).
- **Condor**: Like a butterfly but wider spacing between legs.

Calendar spreads receive **reduced margin** because the exchange recognizes lower risk. A WTI calendar spread might need $1,000-2,000 margin vs. $6,000+ outright — letting you run larger notional for the same capital.

**The Widowmaker (March/April Natural Gas)**: Crosses the winter-summer boundary. If winter is cold and storage is tight, March spikes relative to April. Traders have been destroyed by this spread.

### Roll Mechanics

When the front month approaches expiry, traders "roll": close the expiring month, open the next.

**Roll yield**:
- **Contango**: rolling longs costs money. Sell cheap front, buy expensive next month. In $1/month contango, that's ~$12/bbl/year drag.
- **Backwardation**: rolling longs earns. Sell expensive front, buy cheap next month.

The "Goldman roll" and various index rebalancing schedules create predictable flows around roll dates that traders position around. Commodity ETFs (like USO) hemorrhage money to negative roll yield in contango markets.

## Section 4: Spread Trading

### Crack Spreads

A crack spread isolates the refiner's margin: product output value minus crude input cost.

**Structures**:

\`\`\`
1:1 Gasoline Crack = RBOB ($/gal x 42 = $/bbl) - WTI ($/bbl)
1:1 Diesel Crack  = ULSD ($/gal x 42 = $/bbl) - WTI ($/bbl)
3:2:1 Crack = (2 x RBOB $/bbl + 1 x ULSD $/bbl) / 3 - WTI $/bbl

Example:
RBOB $2.50/gal = $105/bbl. ULSD $2.80/gal = $117.60/bbl. WTI $78/bbl.
3:2:1 Crack = (2 x 105 + 117.60) / 3 - 78 = $31.20/bbl
\`\`\`

**What drives cracks**:
- **Refinery utilization**: lower utilization → less product supply → wider cracks. Track EIA weekly data.
- **Turnaround season**: spring (Feb-Apr) and fall (Sept-Nov) maintenance reduces throughput
- **Product inventories**: low gasoline or distillate stocks vs. 5-year average → wider cracks
- **Seasonal demand**: driving season (May-Sep) supports gasoline. Winter supports diesel/heating oil.
- **Crude quality shift**: if heavy/sour supply tightens, complex refineries lose their feedstock advantage

**Historical ranges**: Normal 3:2:1 = $10-25/bbl. Below $10 signals refinery stress. Above $30 signals strong product demand or constrained refining. In 2022, cracks hit $60+.

CME offers listed crack spread futures, or you can construct them leg-by-leg. Listed cracks have tighter bid-ask and lower margin.

### Spark Spreads

The spark spread measures gas-fired power plant profitability:

\`\`\`
Spark Spread = Power Price ($/MWh) - Gas Price ($/MMBtu) x Heat Rate (MMBtu/MWh)

Heat rates by plant type:
  Efficient CCGT:     6.5-7.5 MMBtu/MWh
  Less efficient CCGT: 8-9 MMBtu/MWh
  Peaker plant:        9-11 MMBtu/MWh
  Old/inefficient:     11-14 MMBtu/MWh

Example:
PJM Western Hub $45/MWh. Henry Hub $3.50/MMBtu. Heat rate 7.0.
Spark = $45 - ($3.50 x 7.0) = $20.50/MWh
\`\`\`

**Implied heat rate** = Power price / Gas price = $45 / $3.50 = 12.86. This tells you even a 12.86 HR plant is marginally profitable — meaning the market is tight (even inefficient peakers are needed).

**Drivers**: weather (heating/cooling demand), gas price levels, renewable output (high solar/wind compresses spark), generation outages, and carbon costs.

### Basis Spreads

Basis = Price at Location A - Price at Benchmark Location. Driven by transportation infrastructure, local S/D, and seasonal patterns.

**Crude basis examples**:
- **WTI Midland - WTI Cushing**: Permian pipeline spread. Hit -$18/bbl in 2018 when production exceeded pipeline capacity. Narrowed to -$1 to -$3 after pipeline buildout.
- **WTI - Brent**: US vs. international balance. Typical: WTI $2-5 below Brent.
- **LLS - WTI**: Gulf Coast export premium, typically +$1-4 above WTI.

**Natural gas basis examples**:
- **Waha (Permian) - Henry Hub**: Often -$1 to -$3. Can go deeply negative when Permian associated gas overwhelms pipeline capacity.
- **Algonquin Citygate (New England) - Henry Hub**: Spikes to +$10-20 in cold winter snaps due to limited pipeline capacity into New England. One of the most volatile US gas basis points.
- **SoCal Citygate - Henry Hub**: Typically +$1-3 premium. Spikes during pipeline outages or extreme California heat.

**Power basis**: Driven by transmission congestion. NYC (NYISO Zone J) trades at a large premium to PJM because of constrained transmission into the city.

Basis is where physical knowledge creates the most edge for financial traders. If you know the pipeline/transmission map, you can form high-conviction views.

## Section 5: Options on Energy Futures

### Option Fundamentals

- **Call**: Right to BUY the underlying future at the strike. Profits when underlying rises above strike + premium.
- **Put**: Right to SELL at the strike. Profits when underlying falls below strike - premium.
- **Premium**: Price paid. Maximum loss for buyer, maximum gain for seller.
- Energy options are typically American-style (exercisable any time) and exercise into the underlying future.

**Option value = Intrinsic Value + Time Value**

\`\`\`
Example:
WTI at $80/bbl. Buy $82 call for $1.50/bbl premium.
Cost = $1.50 x 1,000 = $1,500 per contract.
Breakeven at expiry: $83.50.
WTI goes to $90: profit = ($90 - $82 - $1.50) x 1,000 = $6,500
WTI stays at $80: loss = $1,500 (premium paid)
\`\`\`

### The Greeks

**Delta (Δ)**: Directional exposure per $1 move in the underlying.
- ATM options: ~0.50 delta. Deep ITM: approaches ±1.00. Deep OTM: approaches 0.
- Portfolio delta = sum of deltas across all positions = your net directional exposure.

**Gamma (Γ)**: Rate of change of delta per $1 move.
- Highest for ATM options near expiry.
- Long gamma: profits accelerate, losses decelerate. Short gamma: the opposite — this is where blowups happen.
- Energy gamma near expiry can be extreme — a $2 WTI move can flip an option from worthless to deep ITM.

**Theta (Θ)**: Time decay per day.
- Options lose value every day. Benefits sellers, hurts buyers.
- Accelerates in the last 30 days. ATM options have the highest theta in dollar terms.
- Typical ATM WTI theta with 2-3 months to expiry: ~$0.01-0.03/bbl/day.

**Vega (ν)**: Sensitivity to implied volatility changes.
- A 1-point IV rise increases the option price by the vega amount.
- Longer-dated options have more vega.
- In energy, vega is critical because vol itself has strong patterns.

### Energy-Specific Option Dynamics

**Positive skew**: Unlike equities (where puts are expensive due to crash fear), energy calls tend to be more expensive than puts. Supply disruptions cause upside spikes more often and violently than demand destruction causes crashes. A hurricane or OPEC cut can send prices +$10-20 in a day.

Skew shifts: widens when geopolitical tension rises, can flip to put skew during severe demand destruction (COVID 2020).

**Fat tails**: Energy returns have extreme outliers — 5-sigma events happen every few years (April 2020 negative WTI, 2022 gas at $10, Uri power at $9,000/MWh). Standard Black-Scholes underestimates these probabilities. This is why energy option sellers demand higher premiums — and why blowups happen when they don't.

**Seasonal implied volatility**: Vol is not flat across the curve.
- **Natural gas**: Winter (Dec-Feb) IV is structurally 50-60%, summer IV 30-40% (weather uncertainty)
- **Crude**: Flatter but spikes around OPEC meetings and geopolitical events
- **Products**: Gasoline vol rises in spring (RVP transition). Diesel vol rises ahead of winter.

Many energy option strategies are fundamentally vol trades, not directional bets. You can be right on direction but lose if you overpay for vol.

## Section 6: Risk Management and Regulation

### Position Limits

The CFTC sets speculative position limits to prevent manipulation and excessive speculation.

Published every Friday (reflecting prior Tuesday positions).

## Why This Book Matters for Trading

The Prize is the definitive history of the global oil industry from the 1850s through the first Gulf War. At 900+ pages it reads like a thriller. For an energy trader, it provides the deep historical pattern recognition that separates informed conviction from guessing. Every OPEC crisis, every price war, every supply shock has precedent in this book. Yergin followed it with **The Quest** (2011, covering the post-Cold War era through shale and renewables) and **The New Map** (2020, covering the shale revolution, Russia, China, and the energy transition).

## Part I: The Founders (1850s\u20131910s)

**The Drake Well (1859)**: Edwin Drake drilled the first commercial oil well in Titusville, Pennsylvania. Within 18 months, Oil Creek was producing 2,000 bbl/d. Prices swung from $20/bbl to $0.10/bbl within two years as supply overwhelmed demand. The immediate boom-bust cycle \u2014 overproduction, price collapse, consolidation \u2014 established the pattern that has repeated for 160+ years.

**John D. Rockefeller and Standard Oil**: Rockefeller understood that controlling refining and transportation (pipelines, rail) mattered more than controlling production. Standard Oil at its peak controlled 90% of US refining and used railroad rebate agreements to crush competitors. The 1911 Supreme Court breakup under the Sherman Antitrust Act created 34 companies, including those that became ExxonMobil, Chevron, and others.

**For trading**: The tension between producers (who want high prices) and refiners/consumers (who want low prices and reliable supply) is the central dynamic of oil markets. Rockefeller\u2019s insight \u2014 that midstream and downstream control creates more durable value than upstream \u2014 explains why physical trading houses (Vitol, Trafigura) focus on logistics and optionality. The Spindletop pattern of massive new supply crashing prices mirrors what happened with US shale after 2014.

## Part II: The Seven Sisters (1920s\u20131970s)

After WWI, seven companies dominated global oil: Exxon (Standard Oil of NJ), Mobil (Standard Oil of NY), Chevron (Standard Oil of CA), Texaco, Gulf, BP (Anglo-Persian), and Shell. Together they controlled the concessions that gave them exclusive rights to extract oil from the Middle East, Venezuela, and Indonesia.

**For trading**: The era of stable, managed prices (1930s\u20131970s) ended when producing nations realized they could extract more value by acting collectively. The transition from company-managed to OPEC-managed markets is the single most important structural shift in oil history. When you hear that "OPEC is losing relevance" today, the history shows they have been written off before \u2014 and come back.

## Part III: OPEC and the Oil Shocks (1960s\u20131980s)

**OPEC founded (1960)**: Saudi Arabia, Iran, Iraq, Kuwait, and Venezuela formed OPEC in Baghdad to resist price cuts imposed by the majors (who had unilaterally reduced posted prices twice in 1959\u201360). Initially weak and divided \u2014 it took 13 years for OPEC to flex real power.

**The Tehran and Tripoli Agreements (1971)**: Even before the embargo, Libya\u2019s Muammar Gaddafi had successfully pressured Occidental Petroleum into accepting higher prices and taxes. This emboldened other OPEC members. The Tehran Agreement raised posted prices by 35 cents/bbl and set a precedent for OPEC-negotiated pricing.

**1980\u20131988 Iran-Iraq War**: Iraq invaded Iran in September 1980. Both countries\u2019 production fell sharply. The "Tanker War" phase (1984\u201388) saw attacks on >400 commercial vessels in the Persian Gulf. The US Navy\u2019s Operation Earnest Will escorted reflagged Kuwaiti tankers through the Strait of Hormuz. First modern example of Hormuz risk premium \u2014 freight rates and war-risk insurance premiums spiked.
